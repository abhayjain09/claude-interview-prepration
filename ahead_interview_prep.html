<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AHEAD Interview Forge — Senior MLOps / AI Platform Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0e11; --bg2:#111418; --panel:#15191e; --panel2:#1b2026;
  --line:#262d35; --line2:#333c46;
  --ink:#e7e9ec; --muted:#9aa4b0; --faint:#6b7682;
  --amber:#e8b454; --amber-d:#c8973f;
  --cyan:#5ec8d8; --green:#7bd88f; --red:#e8786b; --violet:#b39ddb; --blue:#7aa2f7;
  --mono:'JetBrains Mono',monospace; --sans:'IBM Plex Sans',sans-serif; --display:'Fraunces',serif;
  --r:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(900px 600px at 88% -8%, rgba(232,180,84,.06), transparent 60%),
    radial-gradient(800px 700px at -5% 100%, rgba(94,200,216,.05), transparent 55%),
    var(--bg);
  color:var(--ink); font-family:var(--sans); line-height:1.6;
  -webkit-font-smoothing:antialiased; min-height:100vh;
}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#475061}
a{color:var(--cyan)}

/* ---- Layout ---- */
.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
.side{
  position:sticky;top:0;height:100vh;overflow-y:auto;
  background:linear-gradient(180deg,var(--bg2),var(--bg));
  border-right:1px solid var(--line);padding:0 0 40px;
}
.brand{padding:22px 22px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:linear-gradient(180deg,var(--bg2),rgba(17,20,24,.92));backdrop-filter:blur(6px);z-index:5}
.brand h1{font-family:var(--display);font-weight:600;font-size:21px;margin:0;line-height:1.15;letter-spacing:-.01em}
.brand .sub{font-family:var(--mono);font-size:10.5px;color:var(--amber);letter-spacing:.13em;text-transform:uppercase;margin-top:7px}
.brand .who{font-size:11.5px;color:var(--faint);margin-top:8px}
.progwrap{padding:14px 22px 6px}
.progbar{height:7px;background:var(--panel2);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.progfill{height:100%;background:linear-gradient(90deg,var(--amber),var(--cyan));width:0%;transition:width .5s ease}
.progtxt{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between}

.navsearch{margin:10px 18px 4px}
.navsearch input{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:9px 12px;font-family:var(--mono);font-size:12px;outline:none}
.navsearch input:focus{border-color:var(--amber-d)}

.navgroup{margin:12px 0 2px}
.navgroup .glabel{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;color:var(--faint);text-transform:uppercase;padding:6px 22px}
.nav a{display:flex;align-items:center;gap:10px;padding:7px 22px;color:var(--muted);text-decoration:none;font-size:13px;border-left:2px solid transparent;cursor:pointer;transition:.15s}
.nav a .ix{font-family:var(--mono);font-size:10px;color:var(--faint);min-width:20px}
.nav a:hover{background:var(--panel);color:var(--ink)}
.nav a.active{background:linear-gradient(90deg,rgba(232,180,84,.12),transparent);color:var(--amber);border-left-color:var(--amber)}
.nav a .dot{margin-left:auto;width:7px;height:7px;border-radius:50%;background:transparent;border:1px solid var(--line2)}
.nav a.done .dot{background:var(--green);border-color:var(--green)}
/* JS-generated nav classes */
.navgrp{margin:8px 0 2px}
.navgrplbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;color:var(--faint);text-transform:uppercase;padding:8px 22px 4px;display:block}
.navitem{display:block;padding:7px 22px;color:var(--muted);font-size:13px;border-left:2px solid transparent;cursor:pointer;transition:.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.navitem:hover{background:var(--panel);color:var(--ink)}
.navitem.active{background:linear-gradient(90deg,rgba(232,180,84,.12),transparent);color:var(--amber);border-left-color:var(--amber)}

/* ---- Main ---- */
.main{padding:0;min-width:0}
.topbar{position:sticky;top:0;z-index:8;display:flex;align-items:center;gap:14px;padding:14px 38px;background:rgba(12,14,17,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topbar .crumb{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.05em}
.topbar .crumb b{color:var(--amber);font-weight:500}
.topbar .modes{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.mbtn{font-family:var(--mono);font-size:11px;background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:7px 12px;border-radius:8px;cursor:pointer;transition:.15s}
.mbtn:hover{border-color:var(--amber-d);color:var(--ink)}
.mbtn.on{background:var(--amber);color:#15110a;border-color:var(--amber);font-weight:700}

.wrap{max-width:980px;margin:0 auto;padding:40px 38px 120px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber)}
h2.sectitle{font-family:var(--display);font-weight:600;font-size:40px;letter-spacing:-.02em;margin:10px 0 4px;line-height:1.05}
.lead{color:var(--muted);font-size:15.5px;max-width:760px}

.card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--r);padding:24px 26px;margin:20px 0}
.card h3{font-family:var(--display);font-weight:600;font-size:21px;margin:0 0 12px;display:flex;align-items:center;gap:10px}
.card h3 .bar{width:4px;height:20px;background:var(--amber);border-radius:3px}
.concept p{margin:0 0 12px;color:#cfd5dc}
.concept ul{margin:8px 0 14px;padding-left:18px;color:#cfd5dc}
.concept li{margin:5px 0}
.concept code,code.inline{font-family:var(--mono);background:#0a0c0f;border:1px solid var(--line);padding:1.5px 6px;border-radius:5px;font-size:12.5px;color:var(--cyan)}
.concept strong{color:#fff}
pre{background:#08090b;border:1px solid var(--line);border-radius:10px;padding:14px 16px;overflow-x:auto;font-family:var(--mono);font-size:12.5px;line-height:1.55;color:#cdd6e0;margin:12px 0}
pre .c{color:var(--faint)}
pre .k{color:var(--violet)}
pre .s{color:var(--green)}

/* question blocks */
.qfilter{display:flex;gap:7px;flex-wrap:wrap;margin:18px 0 6px}
.qchip{font-family:var(--mono);font-size:10.5px;padding:5px 11px;border-radius:20px;border:1px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer;text-transform:capitalize}
.qchip.on{background:var(--panel2);color:var(--ink);border-color:var(--line2)}
.q{border:1px solid var(--line);border-radius:12px;margin:12px 0;background:var(--bg2);overflow:hidden;transition:.2s}
.q.open{border-color:var(--line2)}
.q.open .qbody{display:block}
.qhead{display:flex;align-items:flex-start;gap:12px;padding:15px 18px;cursor:pointer}
.qhead:hover{background:var(--panel)}
.lvl{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 8px;border-radius:6px;white-space:nowrap;margin-top:2px}
.lvl.beginner{background:rgba(123,216,143,.13);color:var(--green)}
.lvl.intermediate{background:rgba(94,200,216,.13);color:var(--cyan)}
.lvl.advanced{background:rgba(179,157,219,.14);color:var(--violet)}
.lvl.scenario{background:rgba(122,162,247,.14);color:var(--blue)}
.lvl.troubleshooting{background:rgba(232,120,107,.14);color:var(--red)}
.lvl.architecture{background:rgba(232,180,84,.14);color:var(--amber)}
.lvl.leadership{background:rgba(255,255,255,.08);color:#dfe4ea}
.qtext{flex:1;font-size:14.5px;font-weight:500;color:var(--ink)}
.qtoggle{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:3px}
.qbody{display:none;padding:0 18px 18px;border-top:1px solid var(--line)}
.q.open .ans{padding:14px 0 0}
.ans .albl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--green);margin-bottom:6px}
.ans p{margin:0 0 10px;color:#cfd5dc;font-size:14px}
.ans ul{margin:6px 0 10px;padding-left:18px;color:#cfd5dc;font-size:14px}
.top1{margin-top:12px;background:linear-gradient(180deg,rgba(232,180,84,.07),transparent);border:1px solid rgba(232,180,84,.25);border-radius:10px;padding:12px 14px}
.top1 .albl{color:var(--amber)}
.top1 p{font-size:13.5px;color:#e4dcc8;margin:0}
.followups{margin-top:12px}
.followups .albl{color:var(--cyan)}
.followups li{font-size:13px;color:var(--muted);margin:4px 0}
.reveal-prompt{padding:14px 0 6px}
.reveal-btn{background:var(--panel);border:1px solid var(--amber-d);color:var(--amber);font-family:var(--mono);font-size:12px;padding:9px 20px;border-radius:8px;cursor:pointer;letter-spacing:.04em;transition:.15s}
.reveal-btn:hover{background:var(--amber-d);color:#000}
.selfrate{display:flex;gap:8px;align-items:center;margin-top:14px;flex-wrap:wrap}
.selfrate span{font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.1em}
.rate{font-family:var(--mono);font-size:11px;padding:5px 11px;border-radius:7px;border:1px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer}
.rate:hover{border-color:var(--line2);color:var(--ink)}
.rate.sel-good{background:var(--green);color:#0b1a0e;border-color:var(--green);font-weight:700}
.rate.sel-mid{background:var(--amber);color:#1a1405;border-color:var(--amber);font-weight:700}
.rate.sel-bad{background:var(--red);color:#1a0b08;border-color:var(--red);font-weight:700}

/* two-col lists */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px}
@media(max-width:760px){.grid2{grid-template-columns:1fr}}
.minicard{border:1px solid var(--line);border-radius:11px;padding:16px 18px;background:var(--bg2)}
.minicard .mt{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.minicard.mistakes .mt{color:var(--red)}
.minicard.best .mt{color:var(--green)}
.minicard.trade .mt{color:var(--cyan)}
.minicard ul{margin:0;padding-left:17px}
.minicard li{font-size:13px;color:#cfd5dc;margin:6px 0}

/* flashcard / mock */
.flash{max-width:720px;margin:30px auto;perspective:1600px}
.fcard{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line2);border-radius:18px;padding:44px 38px;min-height:300px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;transition:.25s;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.fcard:hover{border-color:var(--amber-d)}
.fcard .fq{font-family:var(--display);font-size:24px;font-weight:600;line-height:1.25}
.fcard .fa{margin-top:18px;font-size:14.5px;color:#cfd5dc;border-top:1px solid var(--line);padding-top:16px}
.fctrl{display:flex;justify-content:space-between;align-items:center;margin-top:22px;gap:12px}
.fctrl .cnt{font-family:var(--mono);font-size:12px;color:var(--muted)}
.bigbtn{font-family:var(--mono);font-size:13px;padding:11px 20px;border-radius:10px;border:1px solid var(--line2);background:var(--panel);color:var(--ink);cursor:pointer}
.bigbtn:hover{border-color:var(--amber-d)}
.bigbtn.primary{background:var(--amber);color:#15110a;border-color:var(--amber);font-weight:700}
.hint{font-family:var(--mono);font-size:11px;color:var(--faint);text-align:center;margin-top:12px}

/* scenario / outage */
.scn{border-left:3px solid var(--blue);background:rgba(122,162,247,.05);padding:16px 20px;border-radius:0 12px 12px 0;margin:16px 0}
.scn.outage{border-left-color:var(--red);background:rgba(232,120,107,.05)}
.scn .stag{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--blue)}
.scn.outage .stag{color:var(--red)}
.scn .sq{font-size:15px;font-weight:600;margin:6px 0 4px;color:#fff}
.scn details{margin-top:10px}
.scn summary{font-family:var(--mono);font-size:12px;color:var(--amber);cursor:pointer}
.scn details[open] summary{margin-bottom:8px}
.scn .sa{font-size:13.5px;color:#cfd5dc}
.scn .sa ol{padding-left:18px;margin:6px 0}
.scn .sa li{margin:5px 0}

.pill{display:inline-block;font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--line2);color:var(--muted);margin:0 6px 6px 0}
.hidden{display:none!important}
.empty{text-align:center;color:var(--faint);font-family:var(--mono);font-size:13px;padding:40px}
.footnote{font-family:var(--mono);font-size:11px;color:var(--faint);text-align:center;margin-top:40px;border-top:1px solid var(--line);padding-top:20px}
.mobnav{display:none}
@media(max-width:880px){
  .app{grid-template-columns:1fr}
  .side{display:none;position:fixed;z-index:50;width:300px}
  .side.show{display:block}
  .mobnav{display:inline-flex}
  .wrap{padding:28px 18px 100px}
  h2.sectitle{font-size:30px}
}
</style>
</head>
<body>
<div class="app">
  <aside class="side" id="side">
    <div class="brand">
      <h1>Interview Forge</h1>
      <div class="sub">AHEAD · MLOps Platform</div>
      <div class="who">Senior MLOps / AI Platform Engineer track · tuned to your S&amp;P Global profile</div>
    </div>
    <div class="progwrap">
      <div class="progbar"><div class="progfill" id="progfill"></div></div>
      <div class="progtxt"><span id="progcount">0 reviewed</span><span id="progpct">0%</span></div>
    </div>
    <div class="navsearch"><input id="navsearch" placeholder="search topics / questions…" autocomplete="off"/></div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <main class="main">
    <div class="topbar">
      <button class="mbtn mobnav" onclick="document.getElementById('side').classList.toggle('show')">☰</button>
      <div class="crumb" id="crumb">Loading…</div>
      <div class="modes">
        <button class="mbtn" id="mode-study" onclick="setMode('study')">Study</button>
        <button class="mbtn" id="mode-mock" onclick="setMode('mock')">Mock Interview</button>
        <button class="mbtn" id="mode-flash" onclick="setMode('flash')">Rapid Fire</button>
      </div>
    </div>
    <div class="wrap" id="view"></div>
  </main>
</div>
<script>
/* ============================ CONTENT DATA ============================ */
const TOPICS = [
{
 id:"terraform", name:"Terraform", ix:"01", group:"Infrastructure",
 concept:`<p><strong>Terraform</strong> is a declarative IaC tool that turns a desired-state HCL configuration into a dependency graph, then reconciles real infrastructure to match it. The mental model you must own at a senior level is the triad: <strong>configuration (desired) → state (last-known reality) → provider/cloud (actual reality)</strong>. <code>plan</code> is a three-way diff across these; <code>apply</code> walks the dependency DAG to converge.</p>
 <ul>
 <li><strong>State</strong> is the source of truth Terraform trusts. It maps resource addresses to real cloud IDs and caches attributes. Lose or corrupt it and Terraform will try to recreate everything. Production state lives in a <strong>remote backend</strong> (S3 + DynamoDB lock table, or Terraform Cloud) — never local, never in git.</li>
 <li><strong>Modules</strong> are the unit of reuse and the unit of blast-radius control. A good module exposes a small typed interface (variables + outputs) and hides implementation. You built 20+ reusable modules at S&amp;P — that's exactly the senior signal.</li>
 <li><strong>Workspaces vs separate state files</strong>: CLI workspaces share one backend key with a suffix; they're fine for ephemeral copies but a known foot-gun for prod isolation. The mature pattern is <strong>directory-per-environment</strong> (or separate backend keys) so dev/stage/prod can never share state.</li>
 <li><strong>Lifecycle</strong>: <code>create_before_destroy</code>, <code>prevent_destroy</code>, <code>ignore_changes</code> are how you survive zero-downtime swaps and drift from out-of-band changes.</li>
 </ul>
 <pre><span class="c"># remote backend with locking — the non-negotiable production setup</span>
terraform {
  backend <span class="s">"s3"</span> {
    bucket         = <span class="s">"acme-tfstate-prod"</span>
    key            = <span class="s">"platform/eks/terraform.tfstate"</span>
    region         = <span class="s">"us-east-1"</span>
    dynamodb_table = <span class="s">"tf-locks"</span>   <span class="c"># prevents concurrent apply corruption</span>
    encrypt        = true
  }
}</pre>`,
 questions:[
  {level:"beginner",q:"What is the Terraform state file and why does it matter?",
   a:"<p>State is Terraform's record of the mapping between your configuration's resource addresses (e.g. <code>aws_instance.web</code>) and the real-world object IDs the cloud assigned (e.g. <code>i-0abc…</code>), plus cached attribute values. <code>plan</code> compares config ↔ state ↔ real cloud to compute the minimal change set.</p><p>It matters because it's how Terraform knows what it already manages. Without it, Terraform can't tell the difference between 'create new' and 'this already exists'. It also stores metadata for performance (so it doesn't have to refresh every resource) and dependency ordering.</p>",
   top1:"A top candidate immediately flags that state contains secrets in plaintext (RDS passwords, private keys), so the backend must be encrypted-at-rest with tight IAM, and they'd mention state is a shared mutable resource that requires locking. They tie it back to a real incident: 'we once had two pipelines apply concurrently and corrupt state — that's why we moved to S3+DynamoDB locking.'",
   followups:["How do you recover from a corrupted or lost state file?","What's the difference between terraform refresh and the implicit refresh in plan?","Why should state never live in git?"]},
  {level:"intermediate",q:"Explain count vs for_each. When does using count cause production pain?",
   a:"<p><code>count</code> produces an ordered list indexed by integer; resources are addressed as <code>res[0]</code>, <code>res[1]</code>. <code>for_each</code> produces a map keyed by a stable string; addressed as <code>res[\"key\"]</code>.</p><p>The pain: with <code>count</code>, removing an element in the middle of the list shifts every subsequent index, so Terraform plans to destroy and recreate everything after the removed item. With <code>for_each</code>, each instance is keyed independently, so removing one only affects that one.</p><p><strong>Rule:</strong> use <code>count</code> only for a simple on/off toggle (count = var.enabled ? 1 : 0); use <code>for_each</code> for any collection of distinct things.</p>",
   top1:"They'll note for_each requires keys known at plan time (can't depend on a value computed during apply), and that converting an existing count resource to for_each requires moved blocks or state mv surgery to avoid destroying live infra. They'll mention the moved {} block as the modern, reviewable way to do that refactor.",
   followups:["How would you migrate a count-based resource to for_each without downtime?","What is a moved block and when did it ship?"]},
  {level:"advanced",q:"How do you manage drift, and what's your strategy when someone changes infra outside Terraform?",
   a:"<p>Drift = real cloud state diverging from Terraform state (someone clicked in the console, an autoscaler changed something, a sidecar mutated a tag). Detection: scheduled <code>terraform plan</code> in CI (e.g. nightly) that fails the build if a non-empty diff appears; tools like driftctl or Terraform Cloud drift detection.</p><p>Response strategy depends on intent: (1) if the out-of-band change should be permanent, codify it and apply; (2) if it's noise from another controller, use <code>lifecycle { ignore_changes = [...] }</code>; (3) if it's unauthorized, revert by applying. The deeper fix is <strong>preventing</strong> drift: restrict console write access in prod via SCPs/IAM, route all changes through pipelines.</p>",
   top1:"Top 1% frames drift as an organizational problem, not a tool problem: 'detection is cheap, the real work is making the pipeline the only paved road so drift can't happen — read-only console in prod, break-glass roles audited via CloudTrail.' They distinguish benign managed-by-another-controller drift (ASG desired count, EKS-managed tags) from genuine drift and handle each differently.",
   followups:["How do you ignore_changes safely without masking real problems?","How does drift interact with autoscaling-managed attributes?"]},
  {level:"scenario",q:"Your apply failed halfway through creating 40 resources. What's the state now, and what do you do?",
   a:"<p>Terraform writes state incrementally — resources created before the failure are recorded; the failed resource and everything after it are not. So state is partially applied but consistent (it reflects what actually exists). The lock may still be held if the process died hard.</p><p>Steps: (1) check for a stale lock and <code>force-unlock</code> only if you've confirmed no apply is running; (2) re-run <code>plan</code> to see the remaining delta; (3) fix the root cause (quota, IAM, dependency, a resource that half-created in the cloud but isn't in state → may need <code>import</code> or manual cleanup); (4) re-apply. Never edit state by hand as a first move.</p>",
   top1:"They mention the dangerous edge case: a resource that was created in the cloud but the create call timed out before Terraform recorded it — now it exists but isn't in state, so the next apply tries to create a duplicate (or fails on a name conflict). The fix is terraform import or tainting/cleanup. They also note targeted apply (-target) as an emergency tool but stress it's a smell if used routinely.",
   followups:["When is terraform import the right call vs deleting the orphaned resource?","How do you make applies more resumable / idempotent by design?"]},
  {level:"troubleshooting",q:"`terraform plan` shows a resource will be replaced (destroy/create) but you only changed a tag. Why, and how do you confirm?",
   a:"<p>A replace means a <strong>ForceNew</strong> attribute changed — the provider marks certain fields as immutable (e.g. an EC2 instance's subnet, an RDS engine, an EBS volume's AZ). If you 'only changed a tag,' the likely culprits are: (1) the tag change is incidental and something else changed too; (2) a value you think is stable is actually being recomputed (e.g. a name that includes a timestamp/random); (3) provider upgrade changed defaults.</p><p>Confirm with <code>terraform plan -out=tfplan</code> then <code>terraform show -json tfplan</code> and inspect the <code>replace_paths</code> / action_reason, or read the human plan output — Terraform prints <code>(forces replacement)</code> next to the offending attribute.</p>",
   top1:"They know to read the '# forces replacement' annotation directly and to use create_before_destroy in lifecycle for resources where replacement is unavoidable but downtime isn't acceptable. They also flag provider-version pinning: an unpinned provider upgrade silently changing a default is a classic surprise-replacement cause.",
   followups:["How does create_before_destroy change the order of operations and what constraint does it impose (e.g. unique names)?"]},
  {level:"architecture",q:"Design Terraform repo structure for a platform team serving dev/stage/prod across multiple AWS accounts. Walk me through it.",
   a:"<p>I'd separate <strong>modules</strong> (reusable, versioned, no environment specifics) from <strong>live/composition</strong> (thin per-environment roots that instantiate modules with env-specific inputs).</p><ul><li><code>modules/</code>: eks, networking, rds, observability — each with semantic-versioned tags, published to a private registry or referenced by git tag.</li><li><code>live/&lt;account&gt;/&lt;env&gt;/&lt;component&gt;/</code>: each is its own root with its own backend key → independent state, independent blast radius, parallel applies.</li><li>Remote state in S3 keyed per component+env; DynamoDB locking; cross-account access via assume-role provider config.</li><li>Promotion = same module version applied across envs with different tfvars; gate prod with manual approval + plan review in CI.</li></ul><p>Tooling: Terragrunt or a thin wrapper to keep backend/provider config DRY; Atlantis or TFC for PR-driven plan/apply with policy-as-code (OPA/Sentinel) enforcing tagging, region, and instance-type guardrails.</p>",
   top1:"Top 1% emphasizes blast radius and state granularity as the central design tension: too coarse (one giant state) = slow plans and scary applies; too fine = orchestration overhead and cross-state data passing via remote_state data sources. They'll articulate the rule 'split state along ownership and change-frequency boundaries' and bring up policy-as-code as the guardrail that lets you give teams self-service without losing control.",
   followups:["How do you pass outputs between separate states safely?","Terragrunt vs native Terraform Cloud — what's your call and why?","How do you version and roll back a shared module without breaking consumers?"]},
  {level:"leadership",q:"Your org has 60 engineers and Terraform is becoming a bottleneck — slow reviews, fear of applies, copy-pasted modules. As the platform lead, what's your 90-day plan?",
   a:"<p>I'd treat Terraform as an internal product. (1) <strong>Diagnose</strong>: measure lead time for an infra change, count of duplicated modules, MTTR for infra incidents. (2) <strong>Paved road</strong>: build a small set of golden, versioned, documented modules and a self-service scaffold so a team gets a compliant environment in minutes. (3) <strong>Guardrails not gates</strong>: PR-driven plans with policy-as-code so most changes auto-approve and only risky ones need human review — this kills the review bottleneck. (4) <strong>Reduce fear</strong>: state isolation per component, plan-in-CI on every PR, and a tested rollback story. (5) <strong>Enablement</strong>: office hours, docs, a #terraform channel; measure adoption.</p>",
   top1:"They lead with outcomes and metrics, not tools: 'success is change-lead-time down and infra incidents down, with teams self-serving.' They frame the platform team's job as reducing cognitive load for product teams (Team Topologies language), and they're explicit about the trade-off: centralization gives consistency but can become a bottleneck, so the goal is self-service with embedded guardrails, not a ticket queue.",
   followups:["How do you measure whether your platform is actually reducing toil?","How do you handle a team that wants to bypass the paved road?"]}
 ],
 mistakes:["Storing state locally or in git instead of an encrypted, locked remote backend","Using CLI workspaces for prod isolation instead of separate state per environment","Hand-editing state files instead of using state mv / import / moved blocks","One monolithic state for the whole org → slow plans, terrifying applies","Unpinned provider/module versions causing surprise replacements","Treating count + a dynamic list as stable, then watching indices shift and recreate resources"],
 bestPractices:["Remote backend (S3+DynamoDB) with encryption and least-privilege IAM","Pin Terraform, provider, and module versions; upgrade deliberately","Split state by ownership and change frequency to control blast radius","Run plan in CI on every PR; gate prod apply with review + policy-as-code","Prefer for_each over count for collections; use moved blocks for refactors","Tag everything via default_tags; enforce with Sentinel/OPA"],

{
 id:"networking", name:"AWS Networking", ix:"02", group:"Infrastructure",
 concept:`<p>Networking is where most platform incidents actually live — "it's always DNS" plus "it's always a security group." Own the packet's journey: <strong>Route table → SG → NACL → target</strong>, in and out.</p>
 <ul>
 <li><strong>VPC</strong> = your private IP space. <strong>Subnets</strong> are AZ-scoped; a subnet is "public" only because its route table points <code>0.0.0.0/0</code> at an <strong>Internet Gateway</strong>. Private subnets reach the internet via a <strong>NAT Gateway</strong> (egress-only, costs $ per GB + per hour).</li>
 <li><strong>Security Groups</strong> are stateful, instance/ENI-level, allow-only. <strong>NACLs</strong> are stateless, subnet-level, allow+deny, evaluated in order. Stateless means you must open the ephemeral return port range explicitly.</li>
 <li><strong>VPC Endpoints</strong>: Gateway endpoints (S3, DynamoDB — free, route-table based) and Interface endpoints (PrivateLink, ENI in your subnet, $/hour) let private workloads reach AWS APIs without a NAT — huge for cost and security.</li>
 <li><strong>For AI platforms specifically</strong>: Bedrock, ECR, S3, CloudWatch, and STS endpoints matter — keep model traffic and image pulls off the public internet and off the NAT bill.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"What's the difference between a security group and a NACL?",
   a:"<p>Security groups are <strong>stateful</strong> (return traffic auto-allowed), attach to ENIs/instances, support only allow rules, and all rules are evaluated together. NACLs are <strong>stateless</strong> (you must allow return traffic explicitly), attach to subnets, support allow and deny, and are evaluated in numbered order until a match.</p><p>SGs are your primary, everyday control. NACLs are a coarse subnet-level backstop, useful for blanket denies (e.g. block a bad CIDR).</p>",
   top1:"They mention SGs can reference other SGs as sources (the key to clean microservice rules — 'allow from the app-tier SG' instead of CIDRs), and that stateless NACLs require opening ephemeral ports 1024–65535 for return traffic, a classic gotcha.",
   followups:["Why would you ever reach for a NACL given SGs exist?","Can a security group reference another security group? Why is that powerful?"]},
  {level:"intermediate",q:"A pod in a private EKS subnet can't pull its image from ECR. Walk through how you'd diagnose it.",
   a:"<p>Trace egress: (1) Is there a route to the internet? Private subnet needs a NAT Gateway route, <em>or</em> ECR/S3 VPC endpoints. ECR pulls hit ECR API + S3 (layer storage) + CloudWatch — so you need the ECR-api, ECR-dkr, S3 gateway endpoints (and the SG on the interface endpoints must allow 443 from the node SG). (2) DNS: is the endpoint resolving privately (private DNS enabled on the interface endpoint)? (3) IAM: does the node/pod role have ecr:GetAuthorizationToken + pull perms? (4) NACL: ephemeral return ports open?</p>",
   top1:"They reach for the endpoint path first if NAT is intentionally absent ('we run NAT-less private subnets to save cost and reduce attack surface, so this is almost always a missing/misconfigured VPC endpoint or its SG'), and they name the exact endpoints ECR needs including the S3 gateway endpoint for layer blobs — a detail most people miss.",
   followups:["Which exact VPC endpoints does an ECR pull require?","How do you keep image pulls off the NAT bill at scale?"]},
  {level:"advanced",q:"Explain the EKS VPC CNI IP exhaustion problem and how you'd solve it.",
   a:"<p>The AWS VPC CNI assigns each pod a real VPC IP from the node's ENIs. Instance types cap ENIs and IPs-per-ENI, so a node can only host so many pods, and a busy cluster can exhaust the subnet's IP space entirely. Symptoms: pods stuck in <code>ContainerCreating</code> with 'failed to assign an IP'.</p><p>Fixes: (1) larger subnets / secondary CIDRs added to the VPC with the CNI configured to use them; (2) <strong>prefix delegation</strong> (assign /28 prefixes per ENI → far more IPs per node); (3) use bigger instances (more ENIs); (4) custom networking to put pods in a separate CIDR from nodes.</p>",
   top1:"They quantify it (e.g. m5.large = 3 ENIs × 10 IPs ≈ ~29 usable pod IPs minus node overhead) and lead with prefix delegation as the modern default, while noting the tradeoff that prefix delegation can waste IPs and complicate IP-based SG rules. They tie it to capacity planning at cluster design time, not as a reactive fix.",
   followups:["Prefix delegation vs custom networking — when each?","How does this interact with IP-based security group rules?"]},
  {level:"scenario",q:"Service A (ECS) intermittently can't reach Service B. ~10% of requests time out. Where do you look?",
   a:"<p>Intermittent + percentage-based screams a per-target or per-AZ problem, not a blanket misconfig (which would be 100%). Check: (1) one unhealthy target behind the LB still receiving traffic (failed health check threshold too lenient) — 1 of 10 tasks = ~10%; (2) cross-AZ: a stale ENI/DNS cache pointing at a dead task; (3) connection/NAT port exhaustion under load; (4) SG/NACL fine (would be 100% if wrong). Pull ALB target-group health, CloudWatch UnHealthyHostCount, and VPC Flow Logs filtered to REJECT.</p>",
   top1:"They immediately reason from the percentage to 'one bad replica out of N' and go straight to target health + Flow Logs, rather than randomly checking SGs. They mention enabling connection draining and tightening health-check thresholds so a sick task is ejected fast, and they note Flow Logs ACCEPT/REJECT as the ground truth for whether packets even arrive.",
   followups:["How do VPC Flow Logs help here and what are their limits?","What health-check settings reduce blast radius of one bad task?"]},
  {level:"architecture",q:"Design the network for a multi-account AI platform: shared services, multiple app accounts, on-prem connectivity, Bedrock access. Go.",
   a:"<p>Hub-and-spoke with <strong>AWS Transit Gateway</strong>: a central networking account owns the TGW; app/spoke VPCs attach to it; on-prem connects via Direct Connect or Site-to-Site VPN into the TGW. Use non-overlapping CIDRs (plan the IPAM up front). Centralize egress through an inspection/egress VPC (NAT + firewall) so all internet egress is logged and filtered once. Centralize <strong>interface endpoints</strong> (Bedrock, ECR, S3, STS, CloudWatch) in a shared services VPC and share via PrivateLink/Resolver so every spoke reaches AWS APIs privately without per-VPC endpoint sprawl. Route53 Resolver rules for hybrid DNS.</p>",
   top1:"They lead with IP address management (IPAM) and CIDR planning as the thing that's painful to fix later, and they justify TGW over VPC peering by the O(n²) peering mesh problem. They quantify the cost trade of centralized vs per-VPC endpoints, and they explicitly route Bedrock traffic over PrivateLink for data-governance reasons (keeps prompts/responses off the public internet) — directly relevant to your RAG/Bedrock work.",
   followups:["TGW vs VPC peering vs PrivateLink — decision criteria?","How do you do centralized egress inspection without it becoming a SPOF?"]},
  {level:"leadership",q:"How do you give product teams network self-service without losing security and cost control?",
   a:"<p>Provide vended, pre-baked VPC modules with sane subnets, endpoints, and tags so teams don't hand-roll networking. Enforce guardrails with SCPs (no IGW in workload accounts that should be private, mandatory Flow Logs) and policy-as-code in the IaC pipeline. Centralize the expensive/risky shared bits (TGW, egress, endpoints) under the platform team; let teams self-serve the cheap, safe bits. Make the secure path the easy path.</p>",
   top1:"Frames it as 'guardrails over gates' and ties network choices to a FinOps story (NAT and inter-AZ data transfer are silent budget killers), showing they think about cost as a first-class design constraint, not an afterthought.",
   followups:["Which network costs surprise teams most and how do you make them visible?"]}
 ],
 mistakes:["Forgetting NACLs are stateless — return traffic blocked on ephemeral ports","Assuming a private subnet has internet without NAT or endpoints","Overlapping CIDRs across accounts, discovered only when you try to peer/TGW","Routing all AWS API traffic through NAT (cost + exposure) instead of VPC endpoints","Opening 0.0.0.0/0 on SGs 'temporarily'","Ignoring inter-AZ data transfer charges in chatty architectures"],
 bestPractices:["Reference SGs by SG, not CIDR, for service-to-service rules","Use VPC endpoints for S3/ECR/Bedrock/CloudWatch/STS to cut NAT cost & exposure","Enable VPC Flow Logs everywhere; they're your packet-level ground truth","Plan CIDRs/IPAM before the first VPC; non-overlapping across accounts","TGW hub-and-spoke for multi-account; centralized egress inspection","Multi-AZ subnets per tier; spread NAT across AZs for resilience"],
 tradeoffs:["NAT Gateway: managed & HA vs per-GB + hourly cost; endpoints often cheaper","TGW: scalable mesh vs cost + a central dependency","Interface endpoints: private & secure vs $/hour each (centralize to amortize)","Bigger subnets: fewer IP-exhaustion surprises vs coarser blast radius","Centralized egress: control & logging vs potential bottleneck/SPOF"]
},
{
 id:"ecs-fargate", name:"ECS Fargate", ix:"03", group:"Compute",
 concept:`<p><strong>ECS</strong> is AWS's native container orchestrator; <strong>Fargate</strong> is the serverless launch type — no nodes to patch, you pay per task vCPU/GB-second. The hierarchy: <strong>Task Definition</strong> (immutable blueprint: image, CPU/mem, env, IAM roles, log config) → <strong>Task</strong> (a running instance) → <strong>Service</strong> (keeps N tasks healthy, integrates with the load balancer, does rolling deploys).</p>
 <ul>
 <li><strong>Two IAM roles, always confused</strong>: the <em>execution role</em> lets the Fargate agent pull the image and write logs (acts before your code runs); the <em>task role</em> is what your application code uses to call AWS (S3, Bedrock, etc.). Mixing them up is the #1 ECS interview trap.</li>
 <li><strong>awsvpc network mode</strong>: every task gets its own ENI and VPC IP — clean security but consumes IPs (link to the networking topic).</li>
 <li><strong>Deployments</strong>: rolling (minimumHealthyPercent/maximumPercent) by default; blue/green via CodeDeploy for instant rollback.</li>
 <li><strong>Fargate vs EKS</strong>: Fargate wins for low ops overhead and spiky/simple services; EKS wins when you need k8s ecosystem, GPUs, DaemonSets, or fine-grained scheduling — central decision for an AI platform.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"What's the difference between a task definition, a task, and a service in ECS?",
   a:"<p>A <strong>task definition</strong> is the immutable, versioned blueprint — image, CPU/memory, ports, env vars, log driver, IAM roles. A <strong>task</strong> is one running instantiation of that blueprint. A <strong>service</strong> is a controller that maintains a desired count of tasks, replaces unhealthy ones, registers them with a load balancer, and orchestrates rolling deployments.</p>",
   top1:"They stress task definitions are immutable and versioned — you deploy by registering a new revision and updating the service, which makes rollback as simple as pointing the service back at the previous revision. That immutability is the deploy-safety story.",
   followups:["How do you roll back an ECS service deployment?","What does the service do when a task fails its health check?"]},
  {level:"intermediate",q:"Explain the ECS execution role vs task role. What breaks if you swap them?",
   a:"<p>The <strong>execution role</strong> is assumed by the Fargate agent/infrastructure to do pre-launch work: pull the image from ECR, fetch secrets from Secrets Manager/SSM for injection, and ship logs to CloudWatch. The <strong>task role</strong> is assumed by your running container to make AWS API calls (read S3, invoke Bedrock).</p><p>Swap them and: your app might get permissions it shouldn't, while the agent can't pull the image (task stuck in PENDING/STOPPED with 'CannotPullContainerError') or can't write logs. The execution role failing usually means the task never even starts.</p>",
   top1:"They give the diagnostic tell: 'CannotPullContainerError or no logs at all = execution role / networking problem; AccessDenied from inside the app = task role.' Knowing which role to suspect from the symptom is the senior signal.",
   followups:["Where do you inject secrets — env vars or Secrets Manager refs — and why?","If a task can't pull its image, which role and what else do you check?"]},
  {level:"advanced",q:"How does autoscaling work on Fargate, and how would you scale an inference/LLM-proxy service that has bursty latency-sensitive traffic?",
   a:"<p>ECS Service Auto Scaling uses Application Auto Scaling with target tracking (e.g. keep avg CPU at 60%, or ALB RequestCountPerTarget at N) or step scaling on CloudWatch alarms. For bursty, latency-sensitive AI traffic, CPU is a poor signal — an LLM proxy may be I/O-bound waiting on Bedrock. Better: scale on <strong>RequestCountPerTarget</strong> or a custom metric (in-flight requests / queue depth). Keep warm headroom (don't target 90%), set aggressive scale-out + conservative scale-in cooldowns, and consider provisioned capacity / scheduled scaling for predictable peaks. Fargate cold start (~30–60s to pull+boot) means you can't scale instantly — keep a buffer.</p>",
   top1:"They reject CPU as the scaling signal for I/O-bound AI proxies and design around the cold-start reality: keep minimum warm capacity, scale on concurrency/queue depth, and use predictive/scheduled scaling for known traffic shapes. They mention Fargate's lack of GPUs as the reason heavy inference belongs on EKS with GPU nodes, while the lightweight orchestration/proxy layer stays on Fargate.",
   followups:["Why is CPU a bad autoscaling metric for an LLM gateway?","How do you handle Fargate cold-start latency for spiky traffic?","When do you move inference off Fargate entirely?"]},
  {level:"troubleshooting",q:"An ECS task keeps cycling: starts, runs ~40s, gets killed, restarts. No app errors in logs. What's happening?",
   a:"<p>Classic load-balancer health-check kill loop. The ALB health check is failing (wrong path, wrong port, app not ready within the grace period), so the service deregisters and stops the 'unhealthy' task even though the app is fine. Other causes: container health check command failing; OOM kill (memory limit too low — check StoppedReason for OutOfMemory); the app binding to localhost instead of 0.0.0.0.</p><p>Fixes: increase <code>healthCheckGracePeriodSeconds</code>, fix the health path/port, right-size memory, ensure the app listens on the container port and all interfaces.</p>",
   top1:"They check the task's StoppedReason and stopped-task details first (ECS records exactly why it killed the task), distinguish ALB health-check kills from container-health-check kills from OOM, and call out the grace period as the most common Fargate-specific cause for slow-starting apps.",
   followups:["Where exactly does ECS surface why it stopped a task?","How do you tell OOM from a health-check failure?"]},
  {level:"architecture",q:"Design a containerized AI gateway on Fargate: routing to multiple model backends, rate limiting, observability, dev/stage/prod. Sketch it.",
   a:"<p>ALB → ECS Service (Fargate, awsvpc, in private subnets) running the gateway container, behind which it routes to Bedrock and other model endpoints over VPC endpoints. Rate limiting and auth at the edge (WAF + a token-bucket in the app or API Gateway in front). Secrets via Secrets Manager referenced in the task def. Task role scoped to exactly the Bedrock model ARNs it may invoke. Autoscale on RequestCountPerTarget. Observability: OpenTelemetry sidecar (ADOT) exporting traces/metrics, structured JSON logs to CloudWatch, custom metrics for token usage & per-model latency. Three accounts or three services with separate task-def families, separate ECR repos/tags, promoted via pipeline.</p>",
   top1:"They scope the task role to specific Bedrock model ARNs (not bedrock:* ), put model traffic on PrivateLink for governance, and instrument token usage / per-model latency / error rate as first-class business metrics — exactly the LLM-observability concern in the JD. They also separate the stateless gateway (Fargate) from any stateful/GPU pieces (EKS).",
   followups:["How do you isolate dev/stage/prod here — separate accounts, clusters, or services?","How do you meter and attribute token cost per tenant?"]},
  {level:"leadership",q:"The team defaults to EKS for everything 'because it's powerful.' You think half the workloads belong on Fargate. How do you drive that decision?",
   a:"<p>Make it data- and cost-driven, not religious. Inventory workloads by need: GPUs, DaemonSets, custom scheduling, k8s-ecosystem dependencies → EKS; simple stateless services with spiky traffic and small teams → Fargate (lower ops toil, no node patching). Quantify the hidden EKS cost: cluster upgrades, node patching, on-call surface. Propose a decision matrix as the paved-road default and let exceptions be justified, not assumed.</p>",
   top1:"They reframe it as minimizing total cost of ownership and cognitive load, not picking the 'cooler' tech, and they produce a written decision framework so the choice is repeatable and not relitigated every sprint — a platform-leadership move.",
   followups:["What's your written decision matrix for Fargate vs EKS?"]}
 ],
 mistakes:["Confusing execution role (pull image/logs) with task role (app permissions)","Setting health-check grace period too low for slow-booting apps → kill loop","Scaling AI/IO-bound services on CPU instead of concurrency/request count","Hardcoding secrets in env vars instead of Secrets Manager references","Ignoring StoppedReason when debugging crashing tasks","Forgetting awsvpc mode consumes a VPC IP per task → subnet exhaustion"],
 bestPractices:["Immutable task-def revisions; roll back by pointing service to prior revision","Two least-privilege roles; task role scoped to specific resource ARNs","Inject secrets via Secrets Manager/SSM, never plaintext env","Scale on RequestCountPerTarget / custom concurrency metric; keep warm headroom","ADOT sidecar for OTel; structured JSON logs; custom token/latency metrics","Blue/green via CodeDeploy for instant rollback on critical services"],
 tradeoffs:["Fargate: zero node ops vs higher per-vCPU price & no GPU & cold starts","Rolling deploy: cheap & simple vs blue/green's instant rollback but double capacity","Bigger tasks: fewer cold starts vs more IP/cost per replica","Target tracking: simple vs step scaling's finer control for spiky load"]
},
{
 id:"eks", name:"EKS", ix:"04", group:"Compute",
 concept:`<p><strong>EKS</strong> is managed Kubernetes: AWS runs the control plane (API server, etcd, scheduler) across AZs; you own the data plane (nodes — managed node groups, self-managed, or Fargate profiles). The power and the pain both come from the k8s ecosystem.</p>
 <ul>
 <li><strong>IRSA / Pod Identity</strong>: the secure way pods get AWS permissions. IRSA maps a k8s ServiceAccount to an IAM role via OIDC federation — no node-wide credentials, least privilege per workload. Pod Identity is the newer, simpler successor.</li>
 <li><strong>Scaling has two axes</strong>: pods (HPA on CPU/mem/custom, VPA, KEDA on external metrics/queues) and nodes (Cluster Autoscaler or <strong>Karpenter</strong>, which provisions right-sized nodes just-in-time — the modern default).</li>
 <li><strong>Add-ons you must know</strong>: VPC CNI (networking + IP exhaustion), CoreDNS, kube-proxy, AWS Load Balancer Controller (provisions ALB/NLB from Ingress/Service), EBS/EFS CSI drivers, metrics-server.</li>
 <li><strong>For AI platforms</strong>: GPU node groups + the NVIDIA device plugin, node taints/tolerations to keep GPU nodes for inference only, and Karpenter to scale expensive GPU capacity to zero when idle.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"What does EKS manage for you and what do you still own?",
   a:"<p>AWS manages the <strong>control plane</strong> — API server, etcd, scheduler, controller manager — running redundantly across AZs, patched and backed up. You own the <strong>data plane</strong>: worker nodes (their AMIs, patching, scaling), the workloads, networking config (CNI), add-ons, RBAC, and observability. You also own keeping k8s and add-on versions current.</p>",
   top1:"They flag the shared-responsibility seam most teams underestimate: control-plane version upgrades are AWS-assisted but node/add-on compatibility is on you, and a lagging cluster version is both a security and a support risk. Cluster upgrades are the recurring operational tax of EKS.",
   followups:["What's painful about EKS version upgrades and how do you de-risk them?"]},
  {level:"intermediate",q:"How do pods in EKS get AWS permissions securely? Explain IRSA.",
   a:"<p><strong>IRSA</strong> (IAM Roles for Service Accounts) federates the cluster's OIDC provider with IAM. You annotate a k8s ServiceAccount with an IAM role ARN; pods using that SA receive scoped, temporary credentials via a projected token — the SDK exchanges the token for role creds via STS. This gives <strong>per-workload least privilege</strong> instead of attaching a broad role to the node (which would give every pod on that node the same perms).</p><p>Pod Identity is the newer mechanism: a cluster add-on + IAM association, no per-cluster OIDC trust juggling, easier at scale.</p>",
   top1:"They contrast IRSA with the insecure alternative (node instance role shared by all pods = privilege bleed) and mention Pod Identity as the successor that removes the OIDC-trust-policy maintenance burden across many clusters. They tie this to blast radius: a compromised pod should only get its own narrow role.",
   followups:["IRSA vs Pod Identity — when would you still use IRSA?","Why is using the node instance role for pod permissions a security smell?"]},
  {level:"advanced",q:"Cluster Autoscaler vs Karpenter. Why has Karpenter become the default, especially for GPU/AI workloads?",
   a:"<p>Cluster Autoscaler scales pre-defined node groups (ASGs) — it picks from fixed instance types and is slow to react and bin-pack. <strong>Karpenter</strong> watches unschedulable pods and provisions <em>right-sized</em> nodes directly from EC2 in seconds, choosing instance types/sizes/zones to fit the actual pending pods, consolidating underused nodes, and supporting spot + on-demand fallback.</p><p>For AI: GPU nodes are expensive and lumpy. Karpenter can spin up a GPU node only when a GPU pod is pending and tear it down (scale to zero) when idle, choose the cheapest GPU instance that fits, and mix spot for batch/training — directly attacking the biggest line item.</p>",
   top1:"They quantify the win (faster scale-up, better bin-packing → fewer wasted nodes) and bring nuance: Karpenter consolidation can cause churn/disruption, so you protect critical pods with PodDisruptionBudgets and do-not-disrupt annotations. For GPUs they pair Karpenter with taints/tolerations and the NVIDIA device plugin, and use spot only for interruptible training, not latency-SLO inference.",
   followups:["How do you keep Karpenter from disrupting stateful or latency-critical pods?","How do you safely use spot GPUs for training but not inference?"]},
  {level:"troubleshooting",q:"A pod is stuck in Pending. Give me your systematic diagnosis.",
   a:"<p><code>kubectl describe pod</code> → read Events. The cause is almost always one of: (1) <strong>insufficient resources</strong> — no node has enough CPU/mem/GPU; check requests vs node capacity (FailedScheduling); (2) <strong>no matching node</strong> — nodeSelector/affinity/taints not satisfied (no toleration for a GPU taint); (3) <strong>IP exhaustion</strong> — VPC CNI can't assign an IP; (4) <strong>PVC unbound</strong> — waiting on a volume in the wrong AZ; (5) <strong>autoscaler not adding nodes</strong> — Karpenter/CA misconfig or at limit. Each has a distinct Event message.</p>",
   top1:"They go straight to describe → Events and map each event string to a root cause, then verify the node side (kubectl get nodes, capacity, taints) rather than guessing. They distinguish Pending (scheduling) from ContainerCreating (image pull / volume mount / CNI) — different failure domains entirely.",
   followups:["Pending vs ContainerCreating vs CrashLoopBackOff — what's the failure domain of each?","Pod is on a node but the GPU isn't visible — what's wrong?"]},
  {level:"architecture",q:"Design a multi-tenant EKS platform for several AI teams sharing GPU capacity. Isolation, scaling, cost attribution?",
   a:"<p>Namespace-per-team with ResourceQuotas and LimitRanges; NetworkPolicies for traffic isolation; RBAC + IRSA so each team's pods get only their own IAM role. GPU strategy: dedicated GPU node pools with taints; Karpenter provisions on demand and scales to zero; consider time-slicing/MIG to share a GPU across small inference pods. Cost attribution via Kubecost / cost-allocation tags on Karpenter-provisioned nodes mapped to namespaces. Hard multi-tenancy (untrusted tenants) → separate clusters or virtual clusters; soft (internal teams) → namespaces + quotas. Platform-managed add-ons, golden Helm charts, and a paved-road deploy path.</p>",
   top1:"They explicitly weigh soft vs hard multi-tenancy and pick based on trust boundary, name the GPU-sharing techniques (MIG, time-slicing) most people don't know, and build chargeback/showback in from day one so GPU spend is attributable — connecting platform design to FinOps. They protect critical tenants with PDBs and priority classes.",
   followups:["Soft vs hard multi-tenancy — what pushes you to separate clusters?","How do you fairly share one A100 across several small inference services?"]},
  {level:"leadership",q:"You inherit 12 snowflake EKS clusters across teams. Consolidate or standardize? Make the call.",
   a:"<p>Don't consolidate blindly — first standardize. Establish a golden cluster blueprint (Terraform module + add-on versions + policies), migrate clusters onto it, and only then consider consolidation where blast-radius and tenancy allow. Some separation is healthy (prod isolation, hard tenancy, regional). The goal is consistency and reduced upgrade/patch toil, with cluster count driven by isolation requirements, not accident.</p>",

 id:"docker", name:"Docker", ix:"05", group:"Compute",
 concept:`<p><strong>Docker</strong> packages an app + its dependencies into an immutable image built from a layered filesystem. At senior level the interesting parts are <strong>layer caching, multi-stage builds, image size/security, and the build-vs-run distinction</strong>.</p>
 <ul>
 <li><strong>Layers & cache</strong>: each Dockerfile instruction is a cached layer keyed by the instruction + its inputs. Order matters: put rarely-changing steps (dependency install) before frequently-changing steps (copying source) so a code change doesn't bust the dependency cache.</li>
 <li><strong>Multi-stage builds</strong>: build in a fat image (compilers, dev deps), copy only the artifact into a minimal runtime image (distroless/alpine/slim) → smaller, fewer CVEs, faster pulls.</li>
 <li><strong>Security</strong>: run as non-root, pin base image digests, scan with Trivy/Grype, no secrets baked into layers (they persist even if 'deleted' in a later layer), minimal attack surface.</li>
 <li><strong>For AI</strong>: ML images are huge (CUDA, torch). Use layer caching aggressively, pin CUDA/driver compatibility, and separate model weights from the image (mount from S3/EFS) so the image stays small and weights version independently.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"Why does instruction order in a Dockerfile affect build speed?",
   a:"<p>Each instruction creates a cached layer. Docker reuses a cached layer only if that instruction and everything before it are unchanged. So if you <code>COPY . .</code> before installing dependencies, any code change invalidates the copy layer and everything after it — forcing a full dependency reinstall every build. Putting <code>COPY package.json</code> + install <em>before</em> copying source means a code-only change reuses the dependency layer.</p>",
   top1:"They state the rule crisply — 'order from least to most frequently changing' — and mention this is also why you copy lockfiles separately, and that BuildKit cache mounts let you cache package downloads across builds without baking them into layers.",
   followups:["What are BuildKit cache mounts and why use them for pip/npm?"]},
  {level:"intermediate",q:"What is a multi-stage build and what concrete problems does it solve?",
   a:"<p>You define multiple <code>FROM</code> stages; an early stage holds build tooling (compilers, dev dependencies), and a final minimal stage <code>COPY --from=builder</code> only the produced artifact. Problems solved: (1) image size — no compilers/dev deps in the shipped image; (2) security — smaller attack surface, fewer CVEs; (3) no build secrets leaking into the final image; (4) faster pulls and faster cold starts.</p>",
   top1:"They pair multi-stage with distroless/slim final images and call out the security angle hard: build secrets (private repo tokens) must never appear in the final image, since layer history is inspectable — multi-stage plus --secret mounts is the clean answer.",
   followups:["How do you pass a private-registry token at build time without baking it in?","Distroless vs alpine — tradeoffs?"]},
  {level:"advanced",q:"Your CUDA-based inference image is 12GB and cold starts are killing autoscaling. How do you fix it?",
   a:"<p>Attack size and pull time: (1) multi-stage — only runtime CUDA libs in the final image, not the full toolkit; pick <code>-runtime</code> not <code>-devel</code> base; (2) separate <strong>model weights from the image</strong> — bake the code, mount weights from EFS/S3 (or a PVC) at start so the image is small and weights version independently; (3) pre-pull / pre-warm: image cache on nodes, or ECR pull-through + larger node disk; (4) lazy loading (SOCI/stargz) to start before the whole image is pulled; (5) keep warm replicas so scale-out doesn't always cold-start.</p>",
   top1:"They separate the two costs — image pull time vs model load time — and address both, and they reach for SOCI lazy pulling and weight-externalization, which most candidates don't know. They tie it back to the autoscaling/cold-start reality from the compute topics: you can't scale a 12GB image instantly, so design for warm headroom.",
   followups:["What is SOCI/lazy image pulling and when does it help?","Why separate model weights from the container image?"]},
  {level:"troubleshooting",q:"`docker build` works on your laptop but the image OOMs or behaves differently in the cluster. What are the usual causes?",
   a:"<p>Common causes: (1) <strong>architecture mismatch</strong> — built on arm64 Mac, running on amd64 nodes; fix with buildx multi-arch; (2) <strong>memory limits</strong> — laptop has 32GB, the pod has a 512Mi limit and gets OOMKilled; the JVM/runtime didn't see the cgroup limit; (3) different base image / latest tag drift between build and deploy; (4) env/config differences (secrets, env vars present locally, absent in cluster); (5) the container reads host resources (nproc/mem) rather than cgroup limits.</p>",
   top1:"They lead with the arch mismatch (extremely common with Apple Silicon) and the cgroup-awareness issue (runtimes that ignore container limits), and they insist on pinning digests and reproducible builds so 'works on my machine' stops being possible.",
   followups:["How does a multi-arch build with buildx work?","Why might a JVM/Node app ignore the container memory limit?"]},
  {level:"architecture",q:"Design the container build & supply-chain pipeline for an AI platform team. What's in it?",
   a:"<p>Build with BuildKit/buildx (multi-arch, cache mounts) in CI. Pipeline stages: lint Dockerfile (hadolint) → build → <strong>scan</strong> (Trivy/Grype) and fail on critical CVEs → <strong>sign</strong> (cosign) and generate an SBOM → push to ECR with immutable tags (git SHA, not 'latest') → deploy references the digest. Enforce provenance with admission control (only signed images from our registry run). Base images pinned by digest and centrally maintained/patched. Pull-through cache to cut egress.</p>",
   top1:"They build supply-chain security in (signing, SBOM, admission policy verifying signatures) rather than just 'scan for CVEs,' use immutable digest-pinned references end to end, and centralize golden base images so a CVE patch ships once. That's the modern secure-software-supply-chain answer.",
   followups:["How do you enforce that only signed images run in the cluster?","Immutable tags vs 'latest' — why does it matter operationally?"]}
 ],
 mistakes:["COPY source before installing deps → cache busts every build","Baking secrets into layers (they persist in history even if removed later)","Running containers as root","Using 'latest' tags → non-reproducible deploys and silent drift","Shipping build toolchain in the runtime image (huge, more CVEs)","Ignoring arch mismatch (arm64 build vs amd64 runtime)"],
 bestPractices:["Multi-stage builds + minimal/distroless runtime images","Order instructions least- to most-frequently-changing; use cache mounts","Non-root user, pinned base digests, scan + sign + SBOM in CI","Immutable git-SHA tags; deploy by digest","Externalize model weights from the image; keep images lean","Multi-arch builds with buildx when node arch varies"],
 tradeoffs:["Distroless: tiny & secure vs no shell for debugging (use ephemeral debug containers)","Alpine: small vs musl libc compatibility surprises with some ML libs","Baking weights in: simple pull vs huge image & slow scale; externalizing adds a load step","Aggressive caching: fast builds vs occasional stale-cache bugs"]

{
 id:"github-actions", name:"GitHub Actions", ix:"06", group:"CI/CD",
 concept:`<p><strong>GitHub Actions</strong> runs workflows (YAML in <code>.github/workflows</code>) triggered by events. Structure: <strong>workflow → jobs (parallel by default, run on runners) → steps (sequential, run actions or shell)</strong>. You ran 15+ pipelines across Actions and Azure DevOps — the senior themes are <strong>secure cloud auth (OIDC, not long-lived keys), reusable workflows, caching, and environment gating</strong>.</p>
 <ul>
 <li><strong>OIDC to AWS</strong>: the single most important modern pattern — Actions presents a short-lived OIDC token, AWS assumes a role via a trust policy scoped to your repo/branch. No <code>AWS_SECRET_ACCESS_KEY</code> stored in GitHub. This is a guaranteed senior-interview topic.</li>
 <li><strong>Reusable workflows & composite actions</strong>: DRY across many repos; the platform team owns a golden 'build-scan-deploy' workflow others call.</li>
 <li><strong>Environments + required reviewers</strong>: gate prod deploys with approvals and environment-scoped secrets.</li>
 <li><strong>Self-hosted runners</strong>: needed for VPC-internal access (private EKS), GPU, or large builds — but you own their security and patching.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"What's the structure of a GitHub Actions workflow — jobs vs steps?",
   a:"<p>A <strong>workflow</strong> is triggered by an event (push, PR, schedule, manual). It contains <strong>jobs</strong>, which run in parallel by default on runners and can declare dependencies via <code>needs</code>. Each job has <strong>steps</strong> that run sequentially on the same runner, sharing the filesystem; a step either runs a shell command (<code>run</code>) or an action (<code>uses</code>).</p>",
   top1:"They note jobs are isolated (separate runners, no shared filesystem unless you use artifacts/cache), which is why you pass data between jobs via artifacts or outputs — a common point of confusion.",
   followups:["How do you pass data between two jobs?","When would you use needs vs a matrix?"]},
  {level:"intermediate",q:"Why is OIDC the right way to authenticate Actions to AWS, and how does it work?",
   a:"<p>Storing long-lived <code>AWS_ACCESS_KEY_ID/SECRET</code> as GitHub secrets means a static credential that can leak, never rotates, and grants standing access. <strong>OIDC</strong> eliminates it: GitHub issues a short-lived signed JWT describing the workflow (repo, branch, environment). You configure GitHub as an OIDC identity provider in IAM and create a role whose trust policy says 'allow assume-role from token:sub matching repo X on branch main.' The workflow calls <code>configure-aws-credentials</code>, exchanges the JWT for temporary STS creds — scoped, short-lived, no secret stored.</p>",
   top1:"They scope the trust policy tightly (specific repo + ref + even environment, not org-wide wildcards) and explain the threat it closes: a leaked static key is game-over, while an OIDC token is useless outside the matching workflow context and expires in minutes. They mention this is now the AWS-recommended default.",
   followups:["How do you scope the IAM trust policy so only main-branch prod deploys can assume the prod role?","What's the risk of a loose 'sub' claim wildcard?"]},
  {level:"advanced",q:"Your CI is slow and flaky across 30 repos with copy-pasted YAML. As platform lead, how do you fix both?",
   a:"<p><strong>Consistency</strong>: extract a <strong>reusable workflow</strong> (or composite actions) owned by the platform team — repos call it with inputs; one place to fix bugs and roll out improvements. <strong>Speed</strong>: dependency caching (actions/cache), Docker layer caching, parallelize via matrix, split into needs-gated jobs so fast checks fail early, use larger/self-hosted runners for heavy builds. <strong>Flakiness</strong>: identify flaky tests (quarantine + track), make steps idempotent, pin action versions by SHA (not tags) for reproducibility and supply-chain safety.</p>",
   top1:"They centralize via reusable workflows with versioning so the platform team ships pipeline improvements org-wide without 30 PRs, pin third-party actions by commit SHA (a real supply-chain attack vector — tag mutation), and treat flaky tests as a tracked reliability metric rather than 'just retry'.",
   followups:["Why pin actions by SHA instead of by tag?","Reusable workflow vs composite action — when each?"]},
  {level:"troubleshooting",q:"A deploy job that uses OIDC suddenly fails with 'Not authorized to perform sts:AssumeRoleWithWebIdentity'. What changed and how do you debug?",
   a:"<p>Something broke the trust relationship match. Check: (1) the workflow ref changed (deploying from a branch the trust policy's <code>sub</code> condition doesn't allow, e.g. a tag or a fork); (2) the role's trust policy condition (sub/aud) was edited or is too strict/loose; (3) the OIDC provider thumbprint/audience config; (4) missing <code>permissions: id-token: write</code> in the job (without it, no OIDC token is minted — extremely common cause). Decode the token claims and compare against the trust policy condition.</p>",
   top1:"They check the obvious-but-overlooked first: the job's <code>id-token: write</code> permission, then diff the actual token's sub/ref claim against the trust policy condition. They know fork PRs and tag refs produce different sub claims, which is the classic 'it worked on main but not on this branch/tag' failure.",
   followups:["Why does a PR from a fork fail OIDC even when main works?","Which job permission is required to mint the OIDC token?"]},
  {level:"architecture",q:"Design the CI/CD for an AI application across dev/stage/prod: build, test, model versioning, promotion. Sketch the pipeline.",
   a:"<p>On PR: lint → unit tests → build image (BuildKit cache) → scan + sign → push to ECR (SHA tag) → deploy to <strong>dev</strong> automatically → run integration + eval tests (including prompt/model regression evals). On merge to main: promote the <em>same</em> image digest to <strong>stage</strong> (GitHub Environment with approval) → run smoke + load + eval-gate → manual approval → <strong>prod</strong> (separate account via OIDC role, blue/green). Model & prompt versions tracked as artifacts/registry entries; the deploy pins exact model + prompt + image digest so a release is fully reproducible and rollback is one-click.</p>",
   top1:"They promote the same artifact through environments (never rebuild per env), add an <strong>eval gate</strong> (LLM output quality/regression tests) as a first-class CI step — the AI-specific twist most candidates miss — and make a release a pinned tuple of (image digest, model version, prompt version) so rollback restores all three atomically.",
   followups:["What does an 'eval gate' for an LLM app test, and how do you stop it being flaky?","How do you make a prompt change roll back as cleanly as a code change?"]},
  {level:"leadership",q:"Engineers complain CI gates slow them down; security wants more gates. How do you resolve it?",
   a:"<p>Reframe from speed-vs-safety to fast feedback with the right gates in the right place. Make the common path fast (cache, parallelize, fail fast on cheap checks) so developers feel velocity, and put heavyweight gates only where blast radius justifies them (prod promotion). Automate security as policy-as-code so it's invisible when passing and clear when failing. Measure DORA metrics — if lead time and change-fail rate both improve, you've won the argument with data.",
   top1:"They use DORA metrics to dissolve the false tradeoff: well-designed automation improves both deploy frequency and stability, so the debate becomes 'where does each gate add value,' not 'gates good vs bad.' They make security a paved-road default, not a manual checkpoint.",
   followups:["Which DORA metrics would you instrument and how?"]}
 ],

 bestPractices:["OIDC with tightly-scoped trust policies; no static cloud keys","Reusable workflows / composite actions owned by the platform team","Pin third-party actions by commit SHA","Cache deps + Docker layers; matrix-parallelize; fail fast","Environment protection rules + required reviewers for prod","Promote immutable artifacts; release = pinned (image, model, prompt)"],
