   a:"<p><strong>100ms SLA</strong>: API Gateway → Lambda/ECS inference service → call a hosted model endpoint (SageMaker real-time or Bedrock) → cache common patterns in ElastiCache. SageMaker inference with provisioned concurrency for cold-start avoidance. Feature store for pre-computed user/merchant features (SageMaker Feature Store). Async logging to S3 for model retraining. <br><strong>10ms SLA changes everything</strong>: LLM is out — too slow. Traditional ML (gradient boosted trees) served in-process or as a sidecar. Features must be pre-fetched (write-time feature computation, stored in Redis). The model must fit in RAM and serve from a C++/JVM binary, not Python. Network hops must be eliminated — co-locate the model with the decision service. This is the core ML systems tradeoff: more capable models are slower; you choose model architecture first then find the serving architecture that meets the SLA.</p>",
   top1:"They immediately flag that 10ms eliminates LLMs and makes feature pre-computation mandatory — architectural requirements flow from SLA, not from what's fashionable. They articulate the capability vs latency tradeoff in ML serving and know that eliminating network hops (co-location, in-process serving) is the 10ms lever. Systems thinking under constraint.",
   followups:["How does a feature store help at both 100ms and 10ms?","What serving optimizations get you from 50ms to 10ms?"]},,
  {level:"advanced",q:"Design a streaming LLM inference API that serves 10,000 concurrent users with token-by-token responses.",
   a:"<p><strong>Streaming</strong> means server-sent events (SSE) or WebSockets — HTTP/1.1 long-poll is too inefficient at this scale. Architecture: <strong>API Gateway WebSocket API</strong> (or ALB with HTTP/2) → <strong>ECS Fargate</strong> orchestration layer that calls Bedrock with streaming enabled (<code>invoke_model_with_response_stream</code>) → streams tokens back over the connection. Key challenges: (1) <strong>Connection concurrency</strong>: 10K open connections need careful worker/thread sizing — async Python (FastAPI + asyncio) or Go are the right runtimes; avoid sync frameworks that block a thread per connection. (2) <strong>Bedrock quota</strong>: TPM limit hits before connection limit — multi-account for aggregate quota. (3) <strong>Backpressure</strong>: if the client reads slowly, buffer tokens; don't let slow clients stall the Bedrock stream. (4) <strong>Timeout management</strong>: LLM streams can run 30-60s; ALB/API GW idle timeout must be longer than max stream duration. (5) <strong>Observability</strong>: track time-to-first-token (TTFT) and token throughput as SLIs, not just request latency.</p>",
   top1:"They immediately flag that sync frameworks (Flask, Django) are wrong for streaming at this scale — one thread per connection collapses at 10K. They name TTFT as the primary latency SLI for streaming (not end-to-end latency) and catch the idle timeout trap — a default 60s ALB timeout kills 90-second LLM streams. They use multi-account Bedrock as the quota scaling lever, not just adding containers.",
   followups:["Why is time-to-first-token the right latency metric for streaming LLM?","How do you prevent a slow client from back-pressuring the Bedrock stream?"]},
  {level:"advanced",q:"Design a model evaluation platform that runs evals automatically on every PR touching an LLM feature.",
   a:"<p><strong>Components</strong>: (1) <strong>Eval dataset store</strong>: S3 + DynamoDB — versioned golden sets, per-feature datasets, tagged by domain. (2) <strong>Eval runner</strong>: GitHub Actions workflow triggered on PR label or path filter (prompts/, model-config/); spins ECS Fargate task per eval run — isolated, parallelizable. (3) <strong>Judges</strong>: deterministic checks (JSON schema, regex, forbidden strings) + LLM-as-judge (pinned judge model + rubric stored in the repo) + semantic similarity. (4) <strong>Baseline comparison</strong>: runner fetches the main-branch eval scores from DynamoDB, computes delta — regression = new score < baseline - tolerance. (5) <strong>PR gate</strong>: runner posts results as a PR check (pass/fail) and a detailed comment (per-question breakdown, cost/latency). (6) <strong>Feedback loop</strong>: production failures (low thumbs-up, guardrail hits) create DynamoDB items that get pulled into the dataset nightly. Pin the judge model version — drift in the judge makes scores non-comparable across PRs.</p>",
   top1:"They pin the judge model version as a reproducibility requirement — a subtle but critical detail most teams miss. They design baseline comparison as a delta check (regression detection) not absolute thresholds, and they close the prod→eval feedback loop so the dataset automatically hardens over time. The platform is self-service (triggered by path filter) so it's zero-friction for feature teams.",
   followups:["Why does judge model drift break PR-to-PR score comparability?","How do you handle the eval dataset becoming stale over time?"]},
  {level:"advanced",q:"You need to serve a 70B parameter model with <200ms p99 latency at 500 req/sec. Design the serving stack.",
   a:"<p>70B at <200ms p99 at 500 rps is a hard problem — Bedrock won't do it (too slow for large models at this latency). You need <strong>self-hosted GPU inference</strong>. Stack: (1) <strong>Model serving</strong>: vLLM (PagedAttention for memory efficiency, continuous batching) or TensorRT-LLM on <strong>p4d/p4de (A100) or p5 (H100) instances</strong>. Quantize to INT8/FP8 — 70B in FP16 needs ~140GB, quantized fits on 2×A100. (2) <strong>Orchestration</strong>: EKS with Karpenter NodePool for GPU instances, HPA on GPU utilization + queue depth. (3) <strong>Load balancing</strong>: NLB → multiple vLLM replicas; <strong>continuous batching</strong> in vLLM is the latency lever — it batches concurrent requests at the token level, not request level. (4) <strong>KV cache</strong>: prefix caching in vLLM for shared system prompt (common for chat). (5) <strong>Autoscaling</strong>: scale on request queue depth (KEDA + SQS), not CPU. (6) <strong>Cost</strong>: Spot for non-latency-critical, On-Demand/Reserved for baseline capacity.</p>",
   top1:"They go straight to vLLM + continuous batching as the core latency mechanism (batching at token level removes head-of-line blocking) and they quantize — knowing that 70B in FP16 won't fit on a single A100 without it. They scale on queue depth, not CPU (GPU utilization is the meaningful signal), and they distinguish Spot vs On-Demand for GPU cost management. This is genuine GPU serving architecture knowledge.",
   followups:["What is PagedAttention and why does it matter for throughput?","How does continuous batching differ from static batching?"]},
  {level:"architecture",q:"Design a vector database that must handle 1 billion embeddings with <50ms p99 query latency.",
   a:"<p>At 1B vectors, single-node HNSW is out — memory alone would require ~TB of RAM. Distributed architecture: (1) <strong>Sharding</strong>: partition the embedding space (by metadata, hash, or learned routing) across N shards; each shard holds a manageable HNSW or IVF-PQ index. (2) <strong>Index choice</strong>: IVF-PQ per shard — far less memory than HNSW, acceptable recall at this scale; or Faiss GPU index on g5 instances for GPU-accelerated ANN. (3) <strong>Query fan-out</strong>: query router sends to all relevant shards in parallel, merges top-k results (reduce step). (4) <strong>Caching</strong>: Redis semantic cache for repeated queries — hits before touching the index. (5) <strong>Metadata filtering</strong>: pre-filter shard selection by metadata before ANN (reduces fan-out and improves performance). (6) <strong>Managed option</strong>: Pinecone or Milvus handle distributed sharding — evaluate if ops cost justifies vs building on OpenSearch/Faiss. <50ms p99 requires: caching, GPU-accelerated index, co-located query router and shard nodes (same AZ), and carefully tuned nprobe.</p>",
   top1:"They immediately identify that 1B vectors makes single-node HNSW infeasible on memory grounds and pivot to distributed IVF-PQ — showing they know the memory math. They design the merge step (fan-out → top-k reduce) and use metadata to reduce shard fan-out. They evaluate managed options honestly rather than defaulting to build, and they name nprobe as the key recall/latency tuning knob for IVF.",
   followups:["How does IVF-PQ reduce memory vs HNSW?","What does nprobe control and how do you tune it?"]},
  {level:"architecture",q:"Design a real-time personalization system for a financial platform: user clicks an article, recommendations update within 100ms.",
   a:"<p><strong>100ms end-to-end</strong> means pre-computation, not on-demand model inference. Architecture: (1) <strong>Feature store</strong>: pre-computed user embeddings updated on a short lag (streaming or micro-batch via Kinesis → Lambda → DynamoDB/Redis). (2) <strong>Candidate pre-computation</strong>: ANN index of article embeddings (OpenSearch / pgvector) queried at request time against the user's pre-computed embedding — <em>not</em> a full model call. (3) <strong>API path</strong>: CDN → API GW → Lambda (or ECS) → Redis user embedding cache → OpenSearch ANN query → ranking filter → return. (4) <strong>Ranking</strong>: lightweight ML model (gradient boosted tree, not LLM) applied to top-50 candidates to rerank — must fit in <20ms. (5) <strong>Freshness</strong>: new articles enter the ANN index on publish (async); new user interactions update the embedding store with a short lag. (6) <strong>Financial compliance</strong>: no recommending restricted securities, audit trail of what was shown and when.</p>",
   top1:"They architect around the 100ms constraint from the start — everything is pre-computed or cached, and real-time inference is scoped to a lightweight ranker, not an LLM. They design the feedback loop (interaction → embedding update) and the compliance requirements (restricted securities filter, audit trail) without being prompted — showing financial-domain platform thinking.",
   followups:["How do you update user embeddings in real-time without blocking the query path?","How does the ranking step stay within the latency budget?"]},
  {level:"scenario",q:"You're in a system design interview and the interviewer says 'design Twitter.' Structure your first 5 minutes.",
   a:"<p>First 5 minutes are about requirements, not boxes. (1) <strong>Clarify scope</strong> (2 min): 'Which features? Tweet posting, timelines, follows, search, notifications? Read-heavy or write-heavy focus?' Get numbers: MAU (300M), tweets/day (500M), read:write ratio (~100:1 for timelines). (2) <strong>Identify the hard problems</strong> (1 min): the celebrity-follower fanout problem (1 tweet → 100M timeline updates), timeline read latency, and search. Naming these early shows you've seen the problem before. (3) <strong>Propose the top-level design</strong> (2 min): write path (tweet service → Kafka → fanout workers → timeline cache), read path (Redis timeline cache → serve, with fallback to DB for inactive users). Offer to deep-dive whichever area the interviewer cares about. This structure — clarify, name the hard problems, sketch, then deep-dive — works for any system design question. Resist the urge to start drawing before clarifying.</p>",
   top1:"They name the hard problem (fanout for celebrities) before drawing anything — this immediately signals senior-level thinking. They propose the read/write path split (cache for hot timelines, DB for cold) and explicitly offer to deep-dive on the interviewer's priority rather than picking for them. 'Resist drawing before clarifying' is the advice every candidate who tanks system design needs.",
   followups:["How do you handle the celebrity fanout problem (Lady Gaga has 100M followers)?","How does Twitter's timeline differ for active vs inactive users?"]}
 ],
 mistakes:["Jumping to components before clarifying scale/latency/consistency requirements","Ignoring cost, observability, and rollback (real systems need all three)","Over-engineering the ML architecture without flagging the simpler alternative","Not stating tradeoffs explicitly — interviewers want to hear your reasoning","Forgetting tenant isolation and auditability for financial-services designs","Designing LLM inference for 10ms SLA (it can't do it)"],
 bestPractices:["Clarify requirements, estimate scale before drawing","Draw while talking — externalize the design","State every tradeoff explicitly: 'I chose X because… the alternative is Y'","Cover all four layers: ingestion, query, orchestration, observability","For financial services: RBAC at retrieval, audit trail, data residency first","Rollback is a feature — design it in from the start"],
 tradeoffs:["Capability (LLM) vs latency (traditional ML for <50ms)","Consistency vs latency in distributed systems","Serverless (auto-scale, ops simplicity) vs managed (control, cost at scale)","Tenant isolation (separate resources) vs resource efficiency (shared)","Progressive delivery (safety) vs deploy velocity"]
},
{id:"behavioral",name:"Behavioral & Leadership",ix:24,group:"Leadership",
 concept:`<p>Behavioral questions at a senior/staff level probe <strong>how you think, influence, and lead</strong> — not just what you built. AHEAD is looking for someone who elevates the whole platform, not just a strong individual contributor. Structure every answer with STAR (Situation → Task → Action → Result), lead with impact, and show the 'why' behind your decisions.</p>
 <ul>
 <li><strong>What they're assessing</strong>: scope of influence (did you make a team better, or just yourself?), technical judgment under ambiguity, how you handle failure and disagreement, and whether you own the outcome.</li>
 <li><strong>For every story</strong>: quantify the result, name what you specifically did vs what the team did, and include what you learned or changed.</li>
 <li><strong>AI-platform specific</strong>: they'll probe your judgment on when not to use AI, how you govern agent systems, and how you've balanced velocity vs safety.</li>
 </ul>`,
 questions:[
  {level:"leadership",q:"Tell me about yourself and why AHEAD.",
   a:"<p>Lead with the through-line, not a resume recitation. <em>Sample:</em> 'I'm a platform engineer who's spent the last 9 years building the infrastructure that makes product teams move faster and safer — from ECS/EKS pipelines and Terraform module libraries to, more recently, the AI platform that lets teams deploy Bedrock-powered RAG systems and agent frameworks in days instead of months. At S&P, the work I'm most proud of is the cost-optimization framework I built with AWS Bedrock Agents — multi-account, multi-agent, persistent memory, guardrails — that surfaces EC2/RDS rightsizing recommendations across our entire AWS estate. I'm looking at AHEAD because you're building the infrastructure layer for AI at enterprise scale — exactly the intersection of platform engineering and AI operations that I've been moving toward. I want to do this at the level and pace you're operating.'</em></p>",
   top1:"They open with the value they bring (platform engineering + AI platform), tell one specific story that shows depth rather than breadth, and close with a genuine, specific reason for AHEAD (not 'exciting company'). They make the transition from traditional DevOps to AI platform feel like a natural evolution of their work, not a pivot.",
   followups:["What's the one project that best represents how you work?","Why AI platform specifically, not just SRE or DevOps?"]},
  {level:"leadership",q:"Tell me about a time you disagreed with a technical decision. What did you do?",
   a:"<p><em>Frame</em>: disagreement you had about an architectural or tooling choice, how you made the case, and the outcome. Key elements: (1) you engaged early with data, not just opinion; (2) you understood the other side's reasoning before arguing against it; (3) you escalated (or didn't) appropriately; (4) once a decision was made, you committed. <em>Sample angle from your resume</em>: early resistance to consolidating 15+ siloed CI/CD pipelines — some teams had invested heavily in their own setup. You mapped the maintenance burden (quantified), proposed a migration path that didn't break teams' workflows, and ran a pilot. The consolidation reduced errors 40%. Even if a team's concern is valid, a data-driven proposal and a low-risk pilot almost always land better than a top-down mandate.</p>",
   top1:"They show they can change minds with data and empathy, not authority, and they commit fully after a decision is made — disagreeing and committing is the senior/principal superpower. They name the other side's legitimate concern ('they'd invested heavily') which shows they listened before arguing.",
   followups:["What if you had lost the argument? Would you have still committed?","How did you handle the team that resisted most?"]},
  {level:"leadership",q:"Describe a time a system you built failed in production. How did you handle it?",
   a:"<p>Choose a real incident; don't downplay it. The gold standard answer: (1) you owned it immediately — no deflecting; (2) you communicated transparently during the incident; (3) you ran a blameless postmortem and found a systemic root cause, not a person; (4) you shipped a fix that prevented recurrence; (5) you shared the learning broadly. <em>Sample angle</em>: a RAG pipeline performance degradation shortly after launch (realistic for your work). The root cause was HNSW index params tuned on a small dataset that didn't transfer to full prod scale — a scale-testing gap. Post-incident: added production-scale load testing to the rollout gate, contributed the failure mode to the team's runbook. The measure of a senior engineer is not zero failures but the quality of the postmortem and the permanence of the fix.</p>",
   top1:"They don't pick a trivial incident or hedge with 'it wasn't really my fault.' They show they ran a proper postmortem (systemic cause, not a person), quantify the recurrence prevention, and broadcast the learning — turning a failure into org-wide improvement. Senior engineers fail and make the whole org smarter from it.",
   followups:["What did you change about how you ship systems after that?","How did you communicate the incident to stakeholders?"]},
  {level:"leadership",q:"How do you make technical decisions under high ambiguity?",
   a:"<p>Frame it as a structured process, not improvisation: (1) <strong>Define the decision</strong> clearly — what exactly needs to be decided and by when. (2) <strong>Gather constraints</strong> — what are the hard requirements (latency, cost, compliance) vs preferences? (3) <strong>Generate options</strong> — at least 3; don't optimize on the first one. (4) <strong>Score against constraints</strong> — explicit tradeoff matrix; share it. (5) <strong>Decide, document, and commit</strong> — a 70% confidence decision made quickly beats a 95% confident one made too late. (6) <strong>Set a revisit point</strong> — 'we'll re-evaluate if X doesn't hold.' For an AI platform decision: 'should we build vs buy the agent runtime?' Hard constraints (data residency, existing Bedrock investment, regulated environment) often narrow it more than you'd think.</p>",
   top1:"They name 'at least 3 options' and an explicit tradeoff matrix — it's a process you can teach, not a gut-feel. They set a revisit point, which shows intellectual humility (the decision might need to change as you learn). The '70% confidence fast vs 95% confident late' framing shows they understand that in fast-moving platforms, decision speed is a resource.",
   followups:["How do you know when you have enough information to decide?","Walk me through a real build vs buy decision you made."]},
  {level:"leadership",q:"How do you manage up when stakeholders want an AI feature that you believe is not ready or not the right approach?",
   a:"<p>Separate the problem from the solution: stakeholders usually have a legitimate goal (reduce a cost, speed up a workflow); they may be overfitting to 'AI' as the solution. (1) <strong>Understand the goal</strong> — deeply. (2) <strong>Make the case with data</strong>: if the AI approach has a gap (quality too low, safety concern, infra not ready), quantify it — not 'I don't think it's ready' but 'our eval shows 30% error rate on edge cases, which in a financial workflow means X'. (3) <strong>Propose an alternative or a staged path</strong>: 'here's what we can safely ship by Q2, and here's the roadmap to the full vision.' (4) <strong>Escalate tradeoffs, not decisions</strong>: tell leadership 'here are the options and the risks; you choose.' (5) If overridden, commit fully but document your concerns and proposed mitigations. Your job is to make the risk visible, not to win the argument.</p>",
   top1:"They reframe 'managing up' as making risk visible, not winning, and they offer a staged path that gets stakeholders progress without betting on an unready system. The 'escalate tradeoffs, not decisions' principle is a senior/staff-level insight — leadership wants options with risks surfaced, not a subordinate making the call for them.",
   followups:["What do you do if leadership overrides you and ships the unready feature?","How do you build credibility so leadership trusts your risk assessments?"]},
  {level:"leadership",q:"Where do you want to be in 3 years?",
   a:"<p>Be honest and specific to the domain. <em>Sample</em>: 'In three years I want to be the architect-level owner of an AI platform that's genuinely accelerating product delivery — where teams ship Bedrock-powered features in days with eval gates, guardrails, and observability already in place. Closer to now, I want to deepen my expertise in the governance and reliability sides of agentic AI, because that's where the field is still immature and where I think I can contribute original thinking. I'm also interested in growing into a role where I'm shaping how other engineers approach AI platform design, not just building it myself — mentoring, internal standards, maybe external writing.' Avoid 'I want to be a manager' unless true; avoid 'I just want to do what I do now'.</p>",
   top1:"They anchor the 3-year goal to a platform outcome (AI platform accelerating product delivery) not a job title, show they're tracking the cutting-edge unsolved problems (agentic AI governance), and express genuine interest in multiplying impact through others — the signal that shows readiness for a staff or principal role without demanding the title.",
   followups:["What's the biggest skill gap you're actively working on?","How does AHEAD fit into that trajectory?"]}
 ],
 mistakes:["STAR answers without quantified results","Blaming others in failure stories","Too humble — underselling your specific contribution","Picking trivial examples to avoid exposing real risk","Saying 'we did X' when they want to know what you specifically did","Disagreeing without committing once a decision is made"],
 bestPractices:["Lead every STAR with impact (result first, then story)","Quantify — hours saved, % improvement, $ cost, latency reduction","Name your specific contribution vs the team's contribution","Pick hard examples that show real stakes and your real judgment","In failure stories: systemic root cause + permanent fix + learning shared","Show technical + interpersonal judgment in the same story"],
 tradeoffs:["Humility (accurate) vs not underselling your impact","Speed of decision (70%) vs quality of decision (95%)","Commitment after decision vs intellectual honesty about concerns","Individual execution vs multiplying through others","Technical depth vs stakeholder communication breadth"]
},

// ─── RAPID FIRE Q&A ──────────────────────────────────────────────────────────
const RAPID_FIRE = [
 {q:"What's an SLI?",a:"A specific, user-facing measurement of service behavior — e.g. request success rate or p99 latency."},
 {q:"What's an error budget?",a:"100% minus the SLO target — the tolerance for unreliability you can spend on risk and change."},
 {q:"How does Bedrock Guardrails work?",a:"Configurable content filters applied to Bedrock I/O — deny topics, PII redaction, grounding checks, blocked words."},
 {q:"HNSW vs IVF-PQ — one-line tradeoff?",a:"HNSW: high recall/low latency, high memory. IVF-PQ: low memory, moderate recall loss — for billion-scale."},
 {q:"What is an SCP?",a:"Service Control Policy — org-level guardrail capping maximum permissions in an account; never grants, only caps."},
 {q:"How do you stop a runaway agent?",a:"Max-step limit + per-run cost budget hard-stop + per-step timeout — enforced in code, not just in the prompt."},
 {q:"What's a permission boundary?",a:"An IAM policy that caps the maximum permissions a role can grant — teams can self-serve roles without exceeding the boundary."},
 {q:"Burn rate alert — what's the fast-burn threshold?",a:"14x burn rate over 1 hour (consumes 5% of 30-day budget in 1h) — pages P1."},
 {q:"What's toil?",a:"Manual, automatable, repetitive operational work that doesn't scale and adds no lasting value."},
 {q:"ECS task role vs EC2 instance profile?",a:"Task role scopes credentials to the container/task; instance profile applies to all containers on the host — prefer task roles."},
 {q:"What does IRSA stand for?",a:"IAM Roles for Service Accounts — maps a K8s ServiceAccount to an IAM role via OIDC for pod-level AWS permissions."},
 {q:"Karpenter vs Cluster Autoscaler?",a:"Karpenter: node-level, picks cheapest fitting instance type dynamically, faster provisioning. CA: scales existing node groups."},
 {q:"What's a confused-deputy attack?",a:"A trusted service tricked into performing actions on behalf of an attacker using its own permissions — prevented with external IDs and scoped policies."},
 {q:"Hybrid search in OpenSearch?",a:"Combines kNN vector similarity with BM25 lexical scoring via normalization — better recall than either alone."},
 {q:"What's a golden path?",a:"The platform-recommended, pre-built, maintained way to do common things — teams can go off it, but rarely need to."},
 {q:"Why does post-filtering hurt recall in vector search?",a:"With selective filters, the top-k by vector may not include enough matching docs — need filtered-ANN or pre-filtering."},
 {q:"What's the difference between RAG and fine-tuning?",a:"RAG grounds the model with retrieved context at inference time (no retraining, fresh knowledge). Fine-tuning bakes knowledge into weights (requires data+compute, knowledge is static)."},
 {q:"How does Bedrock Batch Inference differ from real-time?",a:"Batch: async, higher quota limits, lower cost — for bulk ingestion and non-latency-critical jobs. Real-time: low latency, per-request."},
 {q:"What's LangSmith used for?",a:"Tracing and debugging LLM chains — per-call input/output/latency/cost, eval runs, feedback logging, dataset management."},
 {q:"One reason to use OpenSearch Serverless over managed?",a:"Auto-scales without capacity planning — pay per use, no cluster tuning for variable/unpredictable workloads."},
 {q:"What's 'prompt caching' in Bedrock?",a:"Bedrock caches the KV state of a repeated prefix (system prompt + static context) across calls — reduces latency and cost for common shared context."},
 {q:"Why prefer Compute Savings Plans over EC2 RIs?",a:"Compute SPs apply across instance families, sizes, regions, and OS — more flexible when you rightsize or change architectures."},
 {q:"What's a chunking strategy?",a:"How you split documents for embedding — fixed-size, sentence, paragraph, semantic. Chunk size affects recall/context quality."},
 {q:"What does an SLO violation mean for release velocity?",a:"Error budget is burning — slow down or freeze risky releases; prioritize reliability work over features."},
 {q:"What's the paved-road philosophy?",a:"Make the right path (secure, observable, governed) so easy that teams use it by default, reserving mandates for exceptions."},
 {q:"Pod stuck in Terminating — first thing to check?",a:"kubectl describe pod — look at Finalizers and node status. If node is NotReady, kubelet can't acknowledge deletion."},
 {q:"What is a PodDisruptionBudget?",a:"Limits voluntary disruptions to keep a minimum number of pods healthy. 'Allowed Disruptions: 0' means drain is blocked."},
 {q:"Difference between kubectl cordon and kubectl drain?",a:"Cordon marks node unschedulable (no new pods). Drain cordons + evicts existing pods respecting PDBs and grace periods."},
 {q:"What QoS class survives node eviction longest?",a:"Guaranteed — pods where requests=limits. BestEffort (no requests/limits) are evicted first."},
 {q:"How does Karpenter consolidation work?",a:"Identifies underutilized nodes, cordons, evicts pods, terminates node — bin-packing remaining pods onto fewer nodes to cut cost."},
 {q:"What's vLLM used for?",a:"Open-source LLM inference server with PagedAttention + continuous batching — high GPU utilization and low latency at scale."},
 {q:"Continuous batching vs static batching?",a:"Static: waits for full batch before processing. Continuous: inserts new requests mid-generation at token boundaries — lower latency, higher throughput."},
 {q:"What's the celebrity fanout problem?",a:"A user with 100M followers posts → 100M timeline updates. Solved by pull-on-read for celebrity accounts instead of push fanout."},
 {q:"Why start system design with requirements, not boxes?",a:"Scale and latency numbers determine the architecture. Drawing boxes first solves the wrong problem."},
 {q:"What eliminates LLMs from 10ms latency systems?",a:"LLM inference is 50-500ms+ even for small models. Use gradient boosted trees or embeddings for sub-20ms decisions."},
 {q:"What's a NetworkPolicy default-deny?",a:"Blocks all ingress/egress unless explicitly allowed — zero-trust networking within the cluster."},
 {q:"Liveness probe vs readiness probe?",a:"Liveness fail → container restarts. Readiness fail → removed from Service endpoints, no restart. Mixing these up causes outages."},
 {q:"What breaks when you force-delete a StatefulSet pod?",a:"API object is removed but the container may still run — two pods with same identity briefly exist, causing split-brain for stateful apps."},
 {q:"What does nprobe control in IVF search?",a:"Number of clusters searched at query time. Higher nprobe = better recall, higher latency. Tune to your budget."},
 {q:"What's time-to-first-token (TTFT)?",a:"Latency from request to first streamed token — the primary UX latency SLI for streaming LLM responses."},
 {q:"How do you scale K8s on GPU demand instead of CPU?",a:"Use KEDA with SQS queue-depth or GPU utilization (dcgm-exporter + Prometheus adapter) as the HPA trigger."},
 {q:"What's IVF-PQ and when do you use it?",a:"Inverted File Index + Product Quantization — compresses vectors for billion-scale ANN search. Trades recall for 8-32x memory reduction vs HNSW."},
 {q:"What's the difference between a Deployment and a StatefulSet?",a:"Deployment: stateless, pods are interchangeable, random names. StatefulSet: stable network identity, ordered deploy/scale, persistent volume per pod."},
 {q:"How does a HorizontalPodAutoscaler decide to scale?",a:"Compares current metric value to target (e.g. CPU utilization 70%). Scale replicas = ceil(currentReplicas * currentMetric / targetMetric)."},
 {q:"What is a finalizer in Kubernetes?",a:"A key in object metadata that blocks deletion until a controller removes it — used for cleanup tasks. A stuck finalizer = stuck Terminating object."},
 {q:"What's KEDA?",a:"Kubernetes Event-Driven Autoscaler — scales deployments based on external metrics (SQS depth, Kafka lag, Prometheus) not just CPU/memory."},
 {q:"One line: what is PagedAttention?",a:"Manages LLM KV cache in non-contiguous memory blocks like OS virtual memory — eliminates waste from variable sequence lengths."},
 {q:"What's the read:write ratio of a typical social feed and why does it matter?",a:"~100:1 read-heavy — justifies a read-optimized cache layer (Redis timelines) rather than hitting the DB on every page load."},
 {q:"How do you enforce resource limits on all pods in a namespace?",a:"LimitRange sets default requests/limits for pods that don't specify them; ResourceQuota caps total namespace consumption."}
];

  symptoms:"Users report answers confidently wrong. CloudWatch shows no errors. LangSmith traces show retrieved context exists.",
  diagnosis:"Check: (1) Is retrieved context actually relevant — low cosine similarity? (2) Is the model ignoring context (prompt doesn't enforce grounding)? (3) Is chunking too coarse — correct paragraph buried in a large chunk? (4) Is the embedding model different between ingestion and query?",

  symptoms:"LangSmith shows every run terminating at step limit. Cost is high. Results incomplete.",
  diagnosis:"(1) Tool returning unhelpful/empty output — agent retries indefinitely. (2) Agent not 'seeing' previous step results — context window truncation or prompt bug. (3) Subgoal too large for the step budget. (4) Tool schema mismatch — agent calling with wrong args, getting errors.",
  fix:"Inspect the tool output at the stuck step. Add result-checking: if a tool returns empty, return a structured 'no results found' so the agent can branch. Fix context inclusion. Split large tasks into sub-goals. Validate tool schemas."},
 {title:"OpenSearch k-NN recall dropped after adding 10K new docs",
  symptoms:"Evaluation shows recall fell from 92% to 71% after the latest ingestion batch. Query latency also up.",
  diagnosis:"(1) HNSW index needs rebuilding with the full corpus — dynamic addition degrades graph quality at scale. (2) ef_search too low for the larger index. (3) New docs have a different embedding distribution (different model or normalization). (4) Memory pressure — HNSW graph no longer fits in RAM.",
  fix:"Force index rebuild. Increase ef_search and re-benchmark. Verify embedding model/normalization consistency. Check instance memory — right-size or switch to IVF-PQ for memory efficiency at scale."}
];

// ─── OUTAGE SIMULATIONS ──────────────────────────────────────────────────────
const OUTAGES = [
 {title:"Bedrock model deprecation causes prod 500s",
  severity:"P1",scenario:"At 9 AM Monday, your RAG API error rate hits 60%. Logs show 'model not found' from Bedrock. Over the weekend AWS deprecated the model version you're calling.",
  steps:["1. Acknowledge P1, open war-room Slack channel, assign IC.","2. Confirm the error — Bedrock console / AWS Health Dashboard shows model deprecated.","3. Rollback path: model ID is versioned config — change the config to a current model version, deploy in <5 min.","4. Validate: error rate drops. LangSmith — check response quality didn't regress on the new model.","5. Check 90-day eval quality baseline on the new model in staging.","6. Postmortem: add AWS deprecation notices to team radar; add a CI check that tests the configured model ID is available; add an alarm that fires before the next sunset date."],
  lesson:"Model version is deployable config — fast rollback. But the real fix is monitoring AWS deprecation timelines 90+ days out."},
 {title:"Vector store unavailable — RAG returns empty results",
  severity:"P1",scenario:"Users get empty or incoherent answers. LangSmith shows zero retrieved chunks. OpenSearch Serverless shows an endpoint unavailable error.",
  steps:["1. Declare P1. Confirm OpenSearch Serverless endpoint health in console.","2. Check AWS Health Dashboard for OpenSearch Serverless service disruption.","3. Immediate mitigation: activate graceful degradation mode — LLM answers from model knowledge with a disclaimer ('knowledge base temporarily unavailable').","4. If within-VPC networking: check VPC endpoint health, security groups, route tables.","5. If AWS-side outage: open AWS Support P1 case, monitor status.","6. When resolved: verify chunks return; run a quality spot-check; deactivate degradation mode.","7. Postmortem: implement graceful degradation as a feature, not a one-time hack; add OpenSearch health to RAG health check."],
  lesson:"RAG systems need graceful degradation when retrieval is unavailable — the LLM alone is better than a 500 error."},
 {title:"Cost anomaly: LLM spend 50x baseline overnight",
  severity:"P2",scenario:"FinOps dashboard alerts at 7 AM — Bedrock spend yesterday was 50x the daily average. Budget alarm fires.",
  steps:["1. Pull LangSmith traces sorted by token count — identify which runs are expensive.","2. Check for runaway agent loops: any run that hit max-steps? Any with >100 tool calls?","3. Check for a new feature shipped yesterday with an unthrottled batch call.","4. Check for a traffic spike (legitimate 50x user growth unlikely overnight).","5. Immediate: apply per-run cost budget to any agent running without one. Rate-limit the calling service if it's a batch job.","6. If it's a new feature: roll back or disable until a cost gate is in the CI pipeline.","7. Postmortem: make per-run cost budget mandatory; add cost anomaly alarm (> 3x daily baseline pages); add cost-per-request to CI eval gate."],
  lesson:"Cost is a production metric. Bedrock spend needs the same alerting rigor as error rate."}
];


// ─── APP STATE ───────────────────────────────────────────────────────────────
let currentMode = 'study';
let currentTopic = null;
let activeFilter = 'all';
let flashIdx = 0;
let flashFlipped = false;
let mockPool = [];
let mockIdx = 0;
let progress = {}; // {topicId: {good,mid,bad,seen}}

async function loadProgress(){
  try{
    if(window.storage){
      const r = await window.storage.get('abhay_prep_progress');
      if(r && r.value) progress = JSON.parse(r.value);
    } else {
      const ls = localStorage.getItem('abhay_prep_progress');
      if(ls) progress = JSON.parse(ls);
    }
  }catch(e){ progress = {}; }
}
async function saveProgress(){
  try{
    const data = JSON.stringify(progress);
    if(window.storage) await window.storage.set('abhay_prep_progress', data);
    else localStorage.setItem('abhay_prep_progress', data);
  }catch(e){}
}
function markSeen(id){
  if(!progress[id]) progress[id]={good:0,mid:0,bad:0,seen:0};
  progress[id].seen++;
  updateProgressBar();
  saveProgress();
}
function rateQuestion(id, rating){
  if(!progress[id]) progress[id]={good:0,mid:0,bad:0,seen:0};
  progress[id][rating]++;
  saveProgress();
}
function updateProgressBar(){
  const seen = TOPICS.filter(t=>progress[t.id]&&progress[t.id].seen>0).length;
  const pct = Math.round((seen/TOPICS.length)*100);
  document.getElementById('progfill').style.width = pct+'%';
  document.getElementById('progcount').textContent = seen+'/'+TOPICS.length;
  document.getElementById('progpct').textContent = pct+'%';
}

// ─── SIDEBAR NAV ─────────────────────────────────────────────────────────────
function buildNav(){
  const groups = {};
  TOPICS.forEach(t=>{ if(!groups[t.group]) groups[t.group]=[]; groups[t.group].push(t); });
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  Object.entries(groups).forEach(([g,ts])=>{
    const grpEl = document.createElement('div');
    grpEl.className = 'navgrp';
    grpEl.innerHTML = '<div class="navgrplbl">'+g+'</div>';
    ts.forEach(t=>{
      const li = document.createElement('div');
      li.className = 'navitem';
      li.dataset.id = t.id;
      li.textContent = t.ix+'. '+t.name;
      li.onclick = ()=>{ if(currentMode==='study') showTopic(t.id); else setMode('study',t.id); };
      grpEl.appendChild(li);
    });
    nav.appendChild(grpEl);
  });
  // Special nav items
  const extras = [
    {id:'star',label:'📋 STAR Resume Answers'},
    {id:'rapid',label:'⚡ Rapid Fire Mode'},
    {id:'debug',label:'🔧 Debug Scenarios'},
    {id:'outage',label:'🚨 Outage Simulations'},
    {id:'mock',label:'🎤 Mock Interview'}
  ];
  const specEl = document.createElement('div');
  specEl.className = 'navgrp';
  specEl.innerHTML = '<div class="navgrplbl">Special Modes</div>';
  extras.forEach(e=>{
    const li = document.createElement('div');
    li.className = 'navitem';
    li.dataset.id = e.id;
    li.textContent = e.label;
    li.onclick = ()=>showSpecial(e.id);
    specEl.appendChild(li);
  });
  nav.appendChild(specEl);
}

function setActiveNav(id){
  document.querySelectorAll('.navitem').forEach(el=>el.classList.toggle('active', el.dataset.id===id));
}

// ─── SEARCH ──────────────────────────────────────────────────────────────────
document.getElementById('navsearch').addEventListener('input', function(){
  const q = this.value.toLowerCase();
  document.querySelectorAll('.navitem').forEach(el=>{
    el.style.display = (!q || el.textContent.toLowerCase().includes(q)) ? '' : 'none';
  });
  document.querySelectorAll('.navgrplbl').forEach(lbl=>{
    const grp = lbl.parentElement;
    const visible = [...grp.querySelectorAll('.navitem')].some(el=>el.style.display!=='none');
    grp.style.display = visible ? '' : 'none';
  });
});

// ─── TOPIC RENDER ────────────────────────────────────────────────────────────
function levelLabel(l){
  const map={beginner:'Beginner',intermediate:'Intermediate',advanced:'Advanced',scenario:'Scenario',troubleshooting:'Troubleshooting',architecture:'Architecture',leadership:'Leadership'};
  return map[l]||l;
}

function showTopic(id){
  currentMode = 'study';
  currentTopic = id;
  setActiveNav(id);
  const t = TOPICS.find(x=>x.id===id);
  if(!t) return;
  markSeen(id);
  document.getElementById('crumb').textContent = t.name;
  activeFilter = 'all';

  const levels = [...new Set(t.questions.map(q=>q.level))];
  const filterHTML = '<div class="qfilter">'+
    '<button class="qchip active" data-lvl="all" onclick="filterQs(this,\'all\')">All</button>'+
    levels.map(l=>'<button class="qchip" data-lvl="'+l+'" onclick="filterQs(this,\''+l+'\')">'+levelLabel(l)+'</button>').join('')+
    '</div>';

  const qHTML = t.questions.map((q,i)=>`
    <div class="q qlvl-${q.level}" data-lvl="${q.level}">
      <div class="qhead" onclick="toggleQ(this)">
        <span class="lvl ${q.level}">${levelLabel(q.level)}</span>
        <span class="qtext">${q.q}</span>
        <span class="qtoggle">▸</span>
      </div>
      <div class="qbody">
        <div class="reveal-prompt">
          <p style="color:var(--muted);font-size:13px;margin:0 0 10px">Think through your answer, then reveal.</p>
          <button class="reveal-btn" onclick="revealAnswer(this)">🔍 Reveal Answer</button>
        </div>
        <div class="answer-section" style="display:none">
          <div class="ans"><span class="albl">Ideal Answer</span>${q.a}</div>
          <div class="top1"><strong>🏆 Top 1% says:</strong> ${q.top1}</div>
          ${q.followups&&q.followups.length?'<div class="followups"><strong>🔍 Follow-ups:</strong><ul>'+q.followups.map(f=>'<li>'+f+'</li>').join('')+'</ul></div>':''}
          <div class="selfrate">
            <span>How did you do?</span>
            <button class="rate sel-good" onclick="rateQuestion('${id}','good')">✅ Got it</button>
            <button class="rate sel-mid" onclick="rateQuestion('${id}','mid')">😐 Partial</button>
            <button class="rate sel-bad" onclick="rateQuestion('${id}','bad')">❌ Missed</button>
          </div>
        </div>
      </div>
    </div>`).join('');

  const miniHTML = `<div class="grid2">
    <div class="minicard mistakes"><h4>⚠️ Common Mistakes</h4><ul>${t.mistakes.map(m=>'<li>'+m+'</li>').join('')}</ul></div>
    <div class="minicard best"><h4>✅ Best Practices</h4><ul>${t.bestPractices.map(b=>'<li>'+b+'</li>').join('')}</ul></div>
    <div class="minicard trade"><h4>⚖️ Tradeoffs</h4><ul>${t.tradeoffs.map(tr=>'<li>'+tr+'</li>').join('')}</ul></div>
  </div>`;

  document.getElementById('view').innerHTML =
    '<div class="card concept"><h2>'+t.name+'</h2>'+t.concept+'</div>'+
    filterHTML+qHTML+miniHTML;
}

function toggleQ(el){
  const card = el.closest('.q');
  const icon = el.querySelector('.qtoggle');
  const open = card.classList.toggle('open');
  icon.textContent = open ? '▾' : '▸';
}
function revealAnswer(btn){
  const wrap = btn.closest('.qbody');
  wrap.querySelector('.reveal-prompt').style.display='none';
  wrap.querySelector('.answer-section').style.display='block';
}

function filterQs(btn, lvl){
  document.querySelectorAll('.qchip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = lvl;
  document.querySelectorAll('.q').forEach(q=>{
    q.style.display = (lvl==='all'||q.dataset.lvl===lvl)?'':'none';
  });
}

// ─── SPECIAL VIEWS ───────────────────────────────────────────────────────────
function showSpecial(id){
  currentMode = 'special';
  setActiveNav(id);
  let html = '';
  if(id==='star'){
    document.getElementById('crumb').textContent = 'STAR Resume Answers';
    html = STAR_ANSWERS.map(s=>`
      <div class="card">
        <h3>${s.title}</h3>
        <p><strong>🔵 Situation:</strong> ${s.s}</p>
        <p><strong>🎯 Task:</strong> ${s.t}</p>
        <p><strong>⚡ Action:</strong> ${s.a}</p>
        <p><strong>📊 Result:</strong> ${s.r}</p>
      </div>`).join('');
  } else if(id==='rapid'){
    currentMode = 'flash';
    document.getElementById('crumb').textContent = 'Rapid Fire Flashcards';
    flashIdx = 0; flashFlipped = false;
    html = renderFlash();
  } else if(id==='debug'){
    document.getElementById('crumb').textContent = 'Debug Scenarios';
    html = DEBUG_SCENARIOS.map(d=>`
      <details class="scn">
        <summary><strong>🔧 ${d.title}</strong></summary>
        <p><strong>Symptoms:</strong> ${d.symptoms}</p>
        <p><strong>Diagnosis approach:</strong> ${d.diagnosis}</p>
        <p><strong>Fix:</strong> ${d.fix}</p>
      </details>`).join('');
  } else if(id==='outage'){
    document.getElementById('crumb').textContent = 'Outage Simulations';
    html = OUTAGES.map(o=>`
      <details class="scn outage">
        <summary><strong>🚨 ${o.title}</strong> <span class="lvl scenario">${o.severity}</span></summary>
        <p><strong>Scenario:</strong> ${o.scenario}</p>
        <ol>${o.steps.map(s=>'<li>'+s+'</li>').join('')}</ol>
        <p><strong>💡 Key lesson:</strong> ${o.lesson}</p>
      </details>`).join('');
  } else if(id==='mock'){
    currentMode = 'mock';
    document.getElementById('crumb').textContent = 'Mock Interview';
    mockPool = TOPICS.flatMap(t=>t.questions.map(q=>({topic:t.name,...q}))).sort(()=>Math.random()-0.5).slice(0,50);
    mockIdx = 0;
    html = renderMock();
  }
  document.getElementById('view').innerHTML = html;
}

// ─── FLASH MODE ──────────────────────────────────────────────────────────────
function renderFlash(){
  const cards = RAPID_FIRE;
  if(!cards.length) return '';
  const c = cards[flashIdx % cards.length];
  return `<div class="flash">
    <div class="fcard ${flashFlipped?'flipped':''}" onclick="flipFlash()">
      <div class="ffront"><p>${c.q}</p><small>Click to reveal</small></div>
      <div class="fback"><p>${c.a}</p></div>
    </div>
    <div class="fctrl">
      <button class="bigbtn" onclick="navFlash(-1)">← Prev</button>
      <span>${(flashIdx%cards.length)+1} / ${cards.length}</span>
      <button class="bigbtn" onclick="navFlash(1)">Next →</button>
    </div>
    <div class="fctrl"><button class="bigbtn" onclick="shuffleFlash()">🔀 Shuffle</button></div>
  </div>`;
}
function flipFlash(){ flashFlipped=!flashFlipped; document.getElementById('view').innerHTML=renderFlash(); }
function navFlash(d){ flashIdx=(flashIdx+d+RAPID_FIRE.length)%RAPID_FIRE.length; flashFlipped=false; document.getElementById('view').innerHTML=renderFlash(); }
function shuffleFlash(){ RAPID_FIRE.sort(()=>Math.random()-0.5); flashIdx=0; flashFlipped=false; document.getElementById('view').innerHTML=renderFlash(); }

// ─── MOCK MODE ───────────────────────────────────────────────────────────────
function renderMock(){
  if(mockIdx>=mockPool.length){
    return '<div class="card"><h2>✅ Mock Interview Complete!</h2><p>You answered '+mockPool.length+' questions. Review your weak spots by going back to individual topics.</p><button class="bigbtn" onclick="showSpecial(\'mock\')">Start Again</button></div>';
  }
  const q = mockPool[mockIdx];
  return `<div class="card">
    <p style="color:var(--muted);margin-bottom:.5rem">Question ${mockIdx+1} of ${mockPool.length} — <strong>${q.topic}</strong></p>
    <span class="lvl ${q.level}">${levelLabel(q.level)}</span>
    <h3 style="margin:1rem 0">${q.q}</h3>
    <div id="mock-answer" style="display:none">
      <div class="ans"><span class="albl">Ideal Answer</span>${q.a}</div>
      <div class="top1"><strong>🏆 Top 1%:</strong> ${q.top1}</div>
      <div class="selfrate">
        <span>Rate your answer:</span>
        <button class="rate sel-good" onclick="mockRate('good')">✅ Nailed it</button>
        <button class="rate sel-mid" onclick="mockRate('mid')">😐 Close</button>
        <button class="rate sel-bad" onclick="mockRate('bad')">❌ Missed</button>
      </div>
    </div>
    <div id="mock-reveal">
      <button class="bigbtn" onclick="revealMock()" style="margin-top:1.5rem">Reveal Answer</button>
    </div>
  </div>`;
}
function revealMock(){
  const a = document.getElementById('mock-answer');
  const r = document.getElementById('mock-reveal');
  if(a) a.style.display='block';
  if(r) r.style.display='none';
}
function mockRate(rating){
  mockIdx++;
  document.getElementById('view').innerHTML=renderMock();
}

// ─── MODE BUTTONS ────────────────────────────────────────────────────────────
function setMode(mode,id){
  currentMode = mode;
  document.querySelectorAll('.modebtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mode-'+mode)&&document.getElementById('mode-'+mode).classList.add('active');
  if(mode==='study'){ if(id) showTopic(id); else if(TOPICS.length) showTopic(TOPICS[0].id); }
  if(mode==='mock') showSpecial('mock');
  if(mode==='flash') showSpecial('rapid');
}

// ─── MOBILE NAV ──────────────────────────────────────────────────────────────
// handled via inline onclick on the button element

// ─── INIT ────────────────────────────────────────────────────────────────────
(async function init(){
  await loadProgress();
  buildNav();
  updateProgressBar();
  showTopic(TOPICS[0].id);
  document.getElementById('mode-study').classList.add('active');
})();

</script>
