{
 id:"k8s-troubleshooting", name:"Kubernetes Troubleshooting", ix:"07", group:"Compute",
 concept:`<p>Troubleshooting k8s is pattern recognition over a state machine. Master the lifecycle and the <strong>four debug verbs</strong>: <code>kubectl get</code> (state), <code>describe</code> (events + config), <code>logs</code> (app output, plus <code>--previous</code> for crashed containers), <code>exec</code> (poke inside). Then layer in <code>events</code>, metrics, and node-level checks.</p>
 <ul>
 <li><strong>Pod status decoder</strong>: <em>Pending</em> = can't schedule (resources/affinity/IP/PVC); <em>ContainerCreating</em> = image pull / volume mount / CNI; <em>CrashLoopBackOff</em> = container starts then exits (app error, bad config, failing liveness, OOM); <em>ImagePullBackOff</em> = can't pull (auth, wrong tag, registry); <em>Running but not Ready</em> = readiness probe failing; <em>Terminating stuck</em> = finalizer or graceful-shutdown hang.</li>
 <li><strong>OOMKilled vs CrashLoop</strong>: check <code>lastState.terminated.reason</code> and exit code (137 = OOM/SIGKILL, 1 = app error).</li>
 <li><strong>Network</strong>: Service → Endpoints → Pod. No endpoints = selector mismatch or pods not Ready.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"Walk me through debugging a CrashLoopBackOff.",
   a:"<p>(1) <code>kubectl describe pod</code> — read Events and the container's last state/exit code. (2) <code>kubectl logs &lt;pod&gt; --previous</code> — logs from the crashed instance (current container may not exist yet). (3) classify: exit 137 = OOMKilled (raise memory limit or fix leak); app stack trace = bad code/config; failing liveness probe = the probe is killing a healthy-but-slow app. (4) reproduce by overriding the command to sleep and <code>exec</code> in to inspect config/env.</p>",
   top1:"They always reach for --previous (most people forget the crashed container's logs are gone from the running one) and distinguish 'app is broken' from 'the liveness probe is killing a working app' from 'OOM' — three totally different fixes that all surface as CrashLoopBackOff.",
   followups:["How do you tell OOMKill from a code error from a probe kill?","How do you inspect a container that crashes before you can exec in?"]},
  {level:"intermediate",q:"A Service returns connection refused but the pods are Running. Diagnose.",
   a:"<p>The chain is Service → Endpoints → Pods. <code>kubectl get endpoints &lt;svc&gt;</code>: empty endpoints means the Service selector doesn't match pod labels, <em>or</em> pods are Running but not <strong>Ready</strong> (readiness probe failing → excluded from endpoints). If endpoints exist, check: targetPort vs the port the app actually listens on; app binding to 127.0.0.1 instead of 0.0.0.0; NetworkPolicy blocking traffic; for external access, the Ingress/LB controller and its target registration.</p>",
   top1:"They go endpoints-first and know 'Running ≠ Ready' is the usual culprit — a failing readiness probe silently removes pods from the Service, which looks like 'the service is down' but is actually 'no healthy backends.' They also check targetPort vs container listen port and localhost-binding.",
   followups:["Why does a failing readiness probe cause 'no endpoints'?","Liveness vs readiness vs startup probes — what's each for?"]},
  {level:"advanced",q:"Intermittent latency spikes in one service every few minutes, no errors. How do you hunt this down?",
   a:"<p>Periodic spikes suggest something cyclical: (1) <strong>CPU throttling</strong> — limits set too low; cgroup throttling shows in container_cpu_cfs_throttled metrics, causing latency without errors; (2) GC pauses; (3) a noisy neighbor on the node (no/loose limits) periodically starving CPU; (4) DNS — CoreDNS overload or ndots causing periodic resolution delays; (5) HPA flapping causing churn; (6) a cron/batch job on the same node. Correlate the spike timing with node metrics, throttling, and CoreDNS latency.</p>",
   top1:"They suspect CPU CFS throttling and CoreDNS first — the two classic 'slow but no errors' k8s culprits — and they correlate timing across pod, node, and DNS metrics rather than only looking at the app. They know that aggressive CPU limits cause throttling that's invisible unless you look at the throttling metric specifically.",
   followups:["How does CPU limit-based throttling cause latency with zero errors?","Why is CoreDNS a common latency culprit and how do you mitigate (NodeLocal DNSCache)?"]},
  {level:"troubleshooting",q:"A node goes NotReady and pods are stuck Terminating. What's going on and what do you do?",
   a:"<p>NotReady = the kubelet stopped reporting (node crash, kubelet/containerd dead, network partition, disk pressure). Pods stuck Terminating because the kubelet can't confirm deletion. Steps: <code>describe node</code> for conditions (MemoryPressure/DiskPressure/PIDPressure), check kubelet/containerd, check the underlying EC2 instance. If the node is truly gone, the pods won't reschedule until the node object is removed (default ~5min eviction). Force-delete stuck pods only after confirming the node is dead, or the controller will recreate. Karpenter/CA should replace capacity.</p>",
   top1:"They distinguish 'node is slow/partitioned' (don't force-delete — risk of split-brain for stateful workloads) from 'node is confirmed dead' (safe to remove). They know PodDisruptionBudgets and stateful workloads make force-deletion dangerous, and they let the node-replacement automation do its job rather than thrashing.",
   followups:["Why is force-deleting Terminating pods on a partitioned node dangerous?","How does disk pressure eviction work?"]},
  {level:"architecture",q:"How do you build observability so these problems are diagnosable in minutes, not hours?",
   a:"<p>Three pillars wired together: (1) <strong>metrics</strong> — Prometheus/CloudWatch with kube-state-metrics, node exporter, cAdvisor (throttling, OOM, restarts), and RED/USE dashboards per service; (2) <strong>logs</strong> — structured JSON to a central store (CloudWatch/Loki/OpenSearch) with pod/node/trace correlation IDs; (3) <strong>traces</strong> — OpenTelemetry across services so a latency spike is traceable to the exact span. Alert on symptoms (SLO burn) not causes; dashboards that go from 'service slow' → node/throttling/DNS in a couple clicks. Standardize via a platform-provided observability stack so every team gets it for free.</p>",
   top1:"They alert on SLO/symptom (user-facing) rather than every cause, correlate the three pillars via shared trace/request IDs, and make observability a platform-provided default (golden dashboards, auto-instrumentation) so teams don't reinvent it — connecting troubleshooting to the OTel/CloudWatch topics.",
   followups:["RED vs USE method — when each?","How do you correlate a log line to a trace to a metric spike?"]},
  {level:"advanced",q:"A pod is stuck in Terminating for 20 minutes. What caused it and how do you force-delete safely?",
   a:"<p>A pod stuck in Terminating means the kubelet on the node isn't sending the deletion acknowledgment — usually because: (1) <strong>node is unreachable</strong> (NotReady) so kubelet can't run the preStop hook or SIGTERM cycle; (2) a <strong>finalizer is stuck</strong> — something registered a finalizer and never removed it; (3) the container process <strong>ignores SIGTERM</strong> and the grace period never expires (misconfigured). Check: <code>kubectl describe pod</code> → look at Conditions, Events, and Finalizers. If a finalizer: patch it out (<code>kubectl patch pod ... -p '{\"metadata\":{\"finalizers\":[]}}'</code>). If node is down: force-delete with <code>kubectl delete pod --grace-period=0 --force</code> — but understand this doesn't guarantee the container stopped; it only removes the API object. If node recovers, kubelet will clean up the container.</p>",
   top1:"They distinguish the three causes (node down, stuck finalizer, SIGTERM ignored) before reaching for force-delete, and they flag the critical caveat: force-delete removes the API object but not necessarily the container — if the node comes back, a duplicate may briefly exist. In a StatefulSet this can cause split-brain. They never force-delete a StatefulSet pod without confirming the node is truly gone.",
   followups:["Why is force-deleting a StatefulSet pod especially dangerous?","How do you find which controller registered a stuck finalizer?"]},
  {level:"advanced",q:"Explain PodDisruptionBudgets. When do they silently block a node drain?",
   a:"<p>A <strong>PodDisruptionBudget (PDB)</strong> says: during voluntary disruptions (node drain, rolling upgrade), always keep at least <code>minAvailable</code> pods (or no more than <code>maxUnavailable</code>) healthy. A <code>kubectl drain</code> respects PDBs — if evicting a pod would violate the budget, the drain blocks indefinitely rather than violating it. <strong>Silent blocking</strong> happens when: (1) a PDB sets <code>minAvailable: 1</code> and only 1 replica is running — drain can never evict it; (2) PDB selector doesn't match any pods (typo) so it blocks all evictions 'just in case'; (3) a pod is unhealthy but counts against <code>minAvailable</code> — the budget math is wrong. Check with <code>kubectl get pdb</code> and <code>kubectl describe pdb</code> — look at Allowed Disruptions field (0 = blocked).</p>",
   top1:"They know the drain doesn't error — it silently hangs — and they check Allowed Disruptions first. They catch the 'unhealthy pod counts against budget' trap: if a pod is already CrashLooping, minAvailable is already violated, and the PDB blocks the drain to prevent making it worse, which feels paradoxical. The fix is to get the pod healthy first, then drain.",
   followups:["What happens to a drain if a PDB has a typo in its selector?","How do you drain a node when a PDB is legitimately blocking?"]},
  {level:"advanced",q:"How does Kubernetes handle node pressure eviction? Walk through the eviction sequence.",
   a:"<p>When a node runs low on memory or disk, the <strong>kubelet</strong> (not the scheduler) evicts pods to reclaim resources. Sequence: (1) kubelet detects memory/disk below a <strong>soft eviction threshold</strong> (e.g. <code>memory.available < 500Mi</code>) → waits the eviction-soft-grace-period, then evicts low-priority pods; (2) below a <strong>hard threshold</strong> → immediate eviction, no grace period. Eviction order: BestEffort pods first (no requests/limits), then Burstable (using more than request), then Guaranteed (using less than limit — rarely evicted). OOM Killer fires for processes that exceed limits at the cgroup level. QoS class matters: always set memory requests = limits for critical pods to guarantee the QoS class and survive eviction.</p>",
   top1:"They connect QoS class (Guaranteed/Burstable/BestEffort) directly to eviction order — 'requests=limits for critical pods' is the operational takeaway, not just trivia. They distinguish kubelet eviction (pod-level, graceful) from OOM Killer (process-level, immediate) and note that a pod that triggers OOM Killer gets restarted, not evicted — a different symptom requiring a different fix.",
   followups:["What's the difference between a pod being evicted and being OOM killed?","How do you make a pod Guaranteed QoS class?"]},
  {level:"troubleshooting",q:"A Deployment rollout is stuck — 'Waiting for rollout to finish: 1 out of 3 new replicas have been updated.' Debug it.",
   a:"<p>The rollout is stalled mid-update. Check: (1) <code>kubectl rollout status deployment/name</code> confirms it's stuck. (2) <code>kubectl get pods</code> — is the new pod Pending, CrashLooping, or Terminating? (3) If <strong>Pending</strong>: scheduler can't place it — check events for resource constraints, taint/toleration mismatch, node selector. (4) If <strong>CrashLooping</strong>: new image has a bug — <code>kubectl logs pod --previous</code>. (5) If PDB blocks terminating the old pod — check Allowed Disruptions. (6) If a <strong>readiness probe</strong> keeps failing on the new pod — the deployment won't mark it Ready so maxSurge/maxUnavailable math never allows proceeding. (7) If it's an image pull error — <code>kubectl describe pod</code>. Rollback: <code>kubectl rollout undo deployment/name</code>.</p>",
   top1:"They work through the new pod state systematically rather than guessing, and they identify readiness probe failure as the subtle cause — the pod is Running but never Ready, so the deployment controller can't advance the rollout. They mention rollback as an immediate option while diagnosing rather than leaving prod half-updated.",
   followups:["How does maxSurge and maxUnavailable affect rollout speed vs safety?","Why does a failing readiness probe block the entire rollout?"]},
  {level:"architecture",q:"Design a multi-tenant EKS platform where teams get namespaces but can't affect each other. What are the isolation layers?",
   a:"<p>Isolation is multi-layered: (1) <strong>RBAC</strong>: each team's service accounts and users bound to roles scoped to their namespace only — no cluster-level access. (2) <strong>NetworkPolicies</strong>: default-deny all ingress/egress within the cluster; explicitly allow only needed cross-namespace traffic — without this, any pod can talk to any other. (3) <strong>ResourceQuotas + LimitRanges</strong>: cap CPU/memory per namespace so one team can't starve others; LimitRanges set default requests/limits so pods don't run without them. (4) <strong>Pod Security Standards</strong> (Admission): enforce baseline or restricted PSS per namespace — prevent privileged containers, host path mounts. (5) <strong>Node isolation</strong> (optional, hard): dedicated node groups per tenant with taints/tolerations — strongest isolation, highest cost. (6) <strong>IRSA per team</strong>: each namespace's service account maps to a scoped IAM role. Missing any layer creates a vector — NetworkPolicy without ResourceQuota means one team can still starve the node.</p>",
   top1:"They treat each layer as necessary but not sufficient alone — 'RBAC without NetworkPolicy means pods are isolated from the API but not from each other on the network.' They're specific about PSS admission preventing privilege escalation, and they connect IRSA to namespace-level AWS isolation — not just K8s isolation. They note node-level isolation as an option with its cost tradeoff, showing architectural judgment.",
   followups:["What does a default-deny NetworkPolicy look like?","How do ResourceQuotas prevent noisy-neighbor resource exhaustion?"]},
  {level:"architecture",q:"Karpenter vs Cluster Autoscaler — make the architectural choice for an EKS cluster running mixed GPU and CPU AI workloads.",
   a:"<p><strong>Cluster Autoscaler (CA)</strong> scales existing node groups — you pre-define instance types per group, and CA adds/removes nodes within those groups. Works, but requires managing many node groups for different instance families and sizes. <strong>Karpenter</strong> provisions nodes directly from EC2, selecting the cheapest instance type that satisfies the pod's resource requirements at scheduling time — no pre-defined groups, automatic consolidation (bin-packing and node termination). For <strong>mixed GPU/CPU AI workloads</strong>: Karpenter is the clear choice. You declare a NodePool with GPU instance families (g5, p3, p4d) and resource limits; Karpenter picks the right type per pod. Consolidation is critical for GPU cost — Karpenter will terminate underutilized GPU nodes and repack, which CA can't do within a group. Scale-to-zero for GPU node pools dramatically reduces idle GPU spend — the biggest cost lever in an AI platform.</p>",
   top1:"They frame Karpenter's consolidation as the decisive advantage for GPU workloads — idle GPU nodes are extremely expensive, and CA can't bin-pack across node groups. They set up NodePool with explicit GPU family constraints and resource limits to prevent runaway GPU provisioning, and they mention scale-to-zero as the primary cost lever. This is the answer of someone who's operated GPU infrastructure, not just read about it.",
   followups:["How does Karpenter's consolidation work — when does it repack?","How do you prevent Karpenter from provisioning too many GPU nodes?"]},
  {level:"scenario",q:"All pods on one node are getting 'context deadline exceeded' errors to an external service. Other nodes are fine. Diagnose.",
   a:"<p>Node-specific network problem — not the service, not the pods, not the code. Systematic check: (1) <strong>Node network</strong>: SSH to the node, curl the external service — does it timeout? (2) <strong>Security group</strong>: is the node's SG missing the rule other nodes have? Recent SG change? (3) <strong>NAT Gateway / route table</strong>: is this node in a different AZ subnet with a missing or misconfigured route? (4) <strong>CNI issue</strong>: VPC CNI plugin on this node corrupted? Check <code>aws-node</code> pod logs on that node. (5) <strong>iptables corruption</strong>: kube-proxy iptables rules mangled — <code>iptables -L -n</code>. (6) <strong>Instance metadata or throttling</strong>: node hitting ENI/IP limits. Immediate mitigation: cordon the node (<code>kubectl cordon</code>) to stop new pods scheduling there, drain it, replace it. Root cause from node logs and VPC Flow Logs.</p>",
   top1:"They immediately narrow to 'node-specific = network/infra layer, not app layer' and check the infra systematically (SG → route table → CNI → iptables) rather than looking at pod logs. The cordon-drain-replace is the right production move — a bad node is faster to replace than debug live. They use VPC Flow Logs for the definitive answer.",
   followups:["How do VPC Flow Logs help diagnose this?","How do you check if the CNI plugin is the problem?"]}
 ],

 id:"opentelemetry", name:"OpenTelemetry", ix:"08", group:"Observability",
 concept:`<p><strong>OpenTelemetry (OTel)</strong> is the vendor-neutral standard for generating and exporting <strong>traces, metrics, and logs</strong> — one set of SDKs + the <strong>Collector</strong>, then export anywhere (CloudWatch, X-Ray, Tempo, Datadog). The win: instrument once, switch backends without re-instrumenting. The JD explicitly pairs OTel with CloudWatch, so own this.</p>
 <ul>
 <li><strong>Signals</strong>: a <em>trace</em> is a tree of <em>spans</em> tracking one request across services (each span = an operation with start/end, attributes, and a parent). <em>Metrics</em> are aggregatable measurements. <em>Logs</em> become correlated when they carry trace/span IDs.</li>
 <li><strong>Context propagation</strong> is the heart of it: a trace context (W3C traceparent header) flows across service boundaries so spans stitch into one trace. Break propagation and traces fragment.</li>
 <li><strong>The Collector</strong>: receivers → processors (batch, sampling, attribute scrubbing) → exporters. Run it as a sidecar or gateway. ADOT is AWS's distro.</li>
 <li><strong>Sampling</strong>: head-based (decide at start, cheap, may miss rare errors) vs tail-based (decide after seeing the whole trace, keeps all errors/slow traces, needs the Collector to buffer).</li>
 <li><strong>For LLMs</strong>: emerging GenAI semantic conventions — spans for model calls with attributes for model, token counts, latency, and cost; this is how you do LLM observability with an open standard instead of a proprietary one.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"What are traces, spans, and context propagation?",
   a:"<p>A <strong>span</strong> is a single timed operation (a DB query, an HTTP handler, a Bedrock call) with a name, start/end time, attributes, and status. A <strong>trace</strong> is the tree of spans representing one request's full journey, linked by parent-child relationships. <strong>Context propagation</strong> passes the trace and span IDs across process boundaries (via the W3C <code>traceparent</code> header) so spans created in different services join the same trace.</p>",
   top1:"They emphasize propagation as the thing that breaks most often — if a service doesn't forward the context (custom client, queue, thread boundary), the trace splits into orphans and you lose the cross-service view. That's the #1 real-world OTel failure mode.",
   followups:["What breaks context propagation across an async queue or new thread?","What's the W3C traceparent header?"]},
  {level:"intermediate",q:"Why use OpenTelemetry instead of a vendor SDK like the Datadog or X-Ray agent directly?",
   a:"<p>Vendor neutrality and portability: you instrument your code once with OTel APIs/SDKs, and the <strong>Collector</strong> exports to whatever backend you choose — switch from X-Ray to Datadog to Tempo without touching application code. You also get one consistent standard across polyglot services, auto-instrumentation for common libraries, and the Collector as a central place to enrich, scrub PII, sample, and route telemetry.</p>",
   top1:"They frame it as avoiding vendor lock-in at the instrumentation layer (the expensive, sticky layer) and as a control point: the Collector lets the platform team centrally enforce sampling, redaction, and routing policy without redeploying every service. Instrument once, decide backends later.",
   followups:["What jobs does the Collector do that an in-process SDK can't?","How does OTel help in a polyglot microservice estate?"]},
  {level:"advanced",q:"Head-based vs tail-based sampling. Which for an AI platform where errors and slow LLM calls are rare but critical?",
   a:"<p><strong>Head-based</strong> decides at trace start (e.g. keep 10%) — cheap and stateless, but a rare error or a p99 slow Bedrock call has a 90% chance of being dropped. <strong>Tail-based</strong> buffers spans in the Collector until the trace completes, then samples based on the whole trace — keep 100% of errors and slow traces, sample the boring fast ones. For an AI platform where the interesting events are rare (timeouts, guardrail blocks, slow generations), tail-based is the right call despite needing more Collector memory and gateway deployment.</p>",
   top1:"They pick tail-based for the rare-but-critical case and immediately name its cost (stateful Collector, memory, must see all spans of a trace at one Collector instance → load-balancing exporter by trace ID). They suggest a hybrid: tail-based keep-all-errors + low-rate sampling of healthy traces to control volume/cost.",
   followups:["What infra constraint does tail-based sampling impose on the Collector topology?","How do you control telemetry cost without losing error visibility?"]},
  {level:"scenario",q:"Traces show gaps — a request enters the gateway and reappears at the DB span, but the middle service's spans are missing. Why?",
   a:"<p>The middle service isn't propagating context or isn't instrumented. Causes: (1) it's not running OTel instrumentation at all; (2) it terminates and recreates the request context (e.g. reads from a queue without extracting traceparent, or a thread/async boundary loses the context); (3) a proxy/load balancer strips the traceparent header; (4) version/format mismatch (B3 vs W3C) so the context isn't recognized. Fix: ensure consistent propagators across all services and propagate across async boundaries explicitly.</p>",
   top1:"They diagnose by the shape (gap = missing instrumentation or dropped context, not a backend issue) and check propagator consistency + async/queue boundaries first, where context is most often lost. They standardize on W3C propagation org-wide to prevent format mismatches.",
   followups:["How do you propagate context across SQS/Kafka?","B3 vs W3C propagation — why does mixing them break traces?"]},
  {level:"architecture",q:"Design end-to-end observability for an LLM app using OTel + CloudWatch: traces, token usage, latency, error rates.",
   a:"<p>Auto-instrument services with OTel SDKs; add custom spans around each model call with attributes: model id, input/output token counts, latency, cost, guardrail outcome (GenAI semantic conventions). Run an ADOT Collector (gateway mode) doing tail-based sampling (keep all errors/slow), PII redaction, and batching. Export traces to X-Ray/Tempo, metrics to CloudWatch (token usage, per-model p95 latency, error rate as CloudWatch metrics/EMF), logs structured with trace IDs to CloudWatch Logs. Dashboards + SLO alerts on latency burn, error rate, and token-cost anomalies. This is your LLM-observability story in an open standard.</p>",
   top1:"They model token usage and cost as first-class telemetry (not an afterthought), use the Collector for central redaction (prompts may contain PII), and tie traces↔logs↔metrics with trace IDs so an alert drills straight to the offending model call. They keep it backend-agnostic so CloudWatch can be swapped or augmented later.",
   followups:["How do you avoid logging sensitive prompt content while still tracing?","How do you turn per-call token attributes into a cost dashboard?"]}
 ],
 mistakes:["Broken context propagation across async/queue/thread boundaries → orphan spans","Mixing propagation formats (B3 vs W3C) across services","Head-based sampling that drops the rare errors you actually need","Logging raw prompts/PII into traces with no redaction","No central Collector → can't enforce sampling/redaction policy","Treating OTel as 'just tracing' and ignoring metrics/logs correlation"],
 bestPractices:["Instrument once with OTel; export via Collector to swap backends freely","Standardize on W3C propagation across all services","Tail-based sampling to retain all errors/slow traces; sample the rest","Collector for redaction, enrichment, batching, routing","Correlate logs↔traces↔metrics with shared IDs","Adopt GenAI semantic conventions for model/token/cost spans"],
 tradeoffs:["Tail sampling: keeps critical traces vs stateful, memory-heavy Collector","Head sampling: cheap & simple vs misses rare events","Auto-instrumentation: fast coverage vs less control/overhead vs manual spans","More attributes/cardinality: rich queries vs metric cardinality blowup & cost"]
},

 id:"cloudwatch", name:"CloudWatch Observability", ix:"09", group:"Observability",
 concept:`<p><strong>CloudWatch</strong> is AWS's native observability service: <strong>Metrics, Logs, Alarms, Dashboards, Logs Insights, and EMF</strong>. The senior view is knowing its strengths (deep AWS integration, no infra to run) and limits (cost at scale, weaker for distributed tracing — pair with X-Ray/OTel), and how to use it well for an AI platform.</p>
 <ul>
 <li><strong>Metrics</strong>: namespaced time series. AWS publishes service metrics free-ish; <strong>custom metrics</strong> and high-resolution/high-cardinality cost real money. <strong>EMF (Embedded Metric Format)</strong> lets you emit metrics from structured log lines — efficient for custom app metrics like token counts.</li>
 <li><strong>Logs Insights</strong>: query language over log groups for ad-hoc analysis; great for incidents, but scans cost per GB.</li>
 <li><strong>Alarms</strong>: threshold/anomaly-detection/composite alarms → SNS → PagerDuty. <strong>Composite alarms</strong> reduce noise by combining conditions.</li>
 <li><strong>Cardinality & cost</strong>: every unique metric dimension combination is a separate (billed) metric. High-cardinality dimensions (user id, request id) explode cost — a classic mistake.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"What's the difference between CloudWatch Metrics, Logs, and Alarms?",
   a:"<p><strong>Metrics</strong> are numeric time-series (CPU, request count, custom values). <strong>Logs</strong> are text/structured event streams stored in log groups, queryable via Logs Insights. <strong>Alarms</strong> watch a metric (or a metric derived from logs via a metric filter, or a composite of alarms) against a threshold/anomaly model and trigger actions (SNS, auto-scaling, Lambda) when breached.</p>",
   top1:"They mention you can turn logs into metrics via metric filters or EMF, and that alarms should fire on user-impacting symptoms with sensible evaluation periods to avoid flapping — connecting alarms to SLOs rather than raw thresholds.",
   followups:["How do you create a metric from log data?","What's a composite alarm for?"]},
  {level:"intermediate",q:"How would you track LLM token usage and per-model latency in CloudWatch cost-effectively?",
   a:"<p>Use <strong>EMF</strong>: emit a structured log line per model call containing model id, input/output tokens, latency, cost — CloudWatch extracts these as metrics without separate PutMetricData calls (cheaper, batched). Set the metric dimensions carefully: model id and environment are fine (low cardinality); do NOT dimension by user/request id (cardinality explosion → cost blowup). Build dashboards for token throughput and p95 latency per model, and alarms on cost anomalies and latency burn.</p>",
   top1:"They reach for EMF specifically (most people only know PutMetricData) and are disciplined about cardinality — keeping per-user detail in logs (queryable via Insights) while keeping metrics low-cardinality. They alarm on token-cost anomaly detection to catch a runaway prompt loop before the bill does.",
   followups:["Why is EMF cheaper than PutMetricData for high-volume custom metrics?","What dimension would blow up your CloudWatch bill and why?"]},
  {level:"advanced",q:"CloudWatch vs OpenTelemetry/Prometheus/Datadog — when do you use which, and how do they coexist?",
   a:"<p>CloudWatch: native, zero-ops, deep AWS-service integration, good for infra metrics/alarms/logs — but distributed tracing is weaker (X-Ray) and cost climbs with custom metrics/log volume. OTel: vendor-neutral instrumentation that can <em>export to</em> CloudWatch or elsewhere — use it as the instrumentation layer so you're not locked in. Prometheus: powerful for k8s metrics with rich querying (PromQL), self-managed or AMP. Datadog: best UX, unified, expensive. Coexistence: OTel as the standard instrumentation, export infra/AWS signals to CloudWatch, app metrics to Prometheus/AMP, traces to X-Ray/Tempo — pick per signal and cost.</p>",
   top1:"They use OTel as the abstraction so CloudWatch is an exporter target, not a lock-in, and they make the call on cost-vs-capability per signal type rather than 'one tool to rule them all.' They know CloudWatch's tracing weakness and pair it with X-Ray/OTel rather than forcing it.",
   followups:["Where does CloudWatch fall short and what do you pair it with?","How does AMP (managed Prometheus) fit an EKS shop?"]},
  {level:"troubleshooting",q:"Your CloudWatch bill spiked 5x last month with no traffic change. How do you find the cause?",
   a:"<p>Usual suspects: (1) <strong>custom-metric cardinality explosion</strong> — a new dimension like request/user id multiplied the metric count; (2) <strong>log volume</strong> — debug logging left on, or a verbose new service ballooning ingestion (billed per GB ingested + stored); (3) <strong>Logs Insights query scans</strong> — a dashboard auto-running expensive queries; (4) high-resolution metrics; (5) cross-region/API call costs. Use Cost Explorer grouped by usage type to isolate which CloudWatch dimension (metrics vs logs vs insights) spiked, then trace to the source.</p>",
   top1:"They go to Cost Explorer / CUR by usage type first to localize (metrics vs ingestion vs Insights) instead of guessing, and they know the two biggest silent killers are metric cardinality and log ingestion volume. They institute log retention policies and metric-cardinality guardrails to prevent recurrence.",
   followups:["How do you cap log costs without losing incident-debugging ability?","What retention/sampling policy would you set on log groups?"]},
  {level:"architecture",q:"Design the alerting strategy for an AI platform so on-call gets signal, not noise.",
   a:"<p>Alert on <strong>symptoms tied to SLOs</strong>, not raw causes: error-rate/latency SLO burn rate (multi-window: fast burn pages, slow burn tickets), saturation, and business signals (token-cost anomaly, guardrail-block surge). Use <strong>composite alarms</strong> to require correlated conditions (high latency AND high error rate) to reduce flapping. Route by severity: page only for user-impacting; everything else to a queue. Every alert links to a runbook. Continuously prune alerts with no action taken (alert hygiene).</p>",
   top1:"They use SLO burn-rate alerting (Google SRE multi-window/multi-burn-rate) instead of static thresholds, lean on composite alarms to kill flapping, and treat alert volume as a tracked metric — pruning anything that never leads to action. Every page is actionable and runbook-linked.",
   followups:["Explain multi-window burn-rate alerting.","How do you decide page vs ticket?"]}
 ],
 mistakes:["High-cardinality metric dimensions (user/request id) → cost explosion","Leaving debug logging on → massive ingestion bills","Using PutMetricData per call instead of EMF for high-volume metrics","Threshold alarms that flap → alert fatigue → ignored pages","No log retention policy → storing logs forever","Forcing CloudWatch to do distributed tracing instead of X-Ray/OTel"],
 bestPractices:["EMF for custom app metrics; keep dimensions low-cardinality","SLO burn-rate + composite alarms; symptom-based, runbook-linked","Set log retention; sample/route verbose logs; query detail via Insights","OTel as instrumentation layer with CloudWatch as one exporter","Cost Explorer/CUR monitoring of observability spend itself","Dashboards: RED per service + token/cost/latency for AI workloads"],

},
{
 id:"langsmith", name:"LangSmith / Langfuse", ix:"10", group:"AI Platform",
 concept:`<p><strong>LangSmith</strong> (LangChain) and <strong>Langfuse</strong> (open-source, self-hostable) are <strong>LLM observability + evaluation</strong> platforms. They solve what generic APM can't: LLM apps are non-deterministic, multi-step (chains/agents), and quality isn't a 200-vs-500 status code — it's "was the answer good?". You used LangSmith + Langfuse at S&amp;P, so expect deep questions here.</p>
 <ul>
 <li><strong>Tracing for LLMs</strong>: capture the full chain/agent run — every prompt, completion, tool call, retrieval, token count, latency, and cost — as a nested trace. This is how you debug "why did the agent do that?".</li>
 <li><strong>Evaluation</strong>: datasets of inputs + reference/criteria; run the app over them and score with heuristics, LLM-as-judge, or human review. This powers the CI <em>eval gate</em>.</li>
 <li><strong>Prompt management</strong>: versioned prompts, A/B, linking a trace to the exact prompt version that produced it.</li>
 <li><strong>Langfuse vs LangSmith</strong>: Langfuse is OSS/self-hosted (data residency, cost control, good for regulated/financial data like S&amp;P); LangSmith is managed, tightly integrated with LangChain. The tradeoff is control vs convenience.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"What does an LLM observability tool capture that CloudWatch/APM doesn't?",
   a:"<p>LLM-specific structure and semantics: the full prompt and completion text, the nested chain/agent steps (each LLM call, tool invocation, retrieval), token usage and cost per step, model and parameters used, and quality scores from evaluations. Generic APM sees an HTTP call to Bedrock and a latency number; it can't tell you the agent chose the wrong tool or the retrieval returned irrelevant chunks.</p>",
   top1:"They frame it as 'observability for non-deterministic, multi-step systems where correctness is fuzzy' and note the killer feature is linking a production trace back to the exact prompt version, retrieved context, and model — turning 'the AI gave a weird answer' into a reproducible, debuggable event.",
   followups:["How do you debug a bad agent answer with a trace?","Why isn't HTTP status enough to know an LLM call 'succeeded'?"]},
  {level:"intermediate",q:"How do you evaluate an LLM app's quality, and how do you keep evals from being flaky?",
   a:"<p>Build a curated <strong>dataset</strong> of representative inputs with expected outputs or grading criteria. Score with a mix: deterministic checks (does it contain required fields, valid JSON, no PII), heuristic metrics (retrieval relevance, faithfulness/groundedness for RAG), and <strong>LLM-as-judge</strong> for subjective quality, plus periodic human review. Reduce flakiness by: pinning judge model + temperature 0, using rubric-based scoring with clear criteria, averaging over multiple runs, and tracking score distributions rather than pass/fail on a single noisy run.</p>",
   top1:"They distinguish deterministic checks (cheap, reliable, gate on these) from LLM-as-judge (powerful but noisy, use thresholds on aggregates not single runs), and they validate the judge itself against human labels. For RAG they name faithfulness/groundedness and context-relevance as the metrics that catch hallucination.",
   followups:["How do you validate that your LLM-as-judge agrees with humans?","Which RAG metrics catch hallucination vs retrieval failure?"]},
  {level:"advanced",q:"How do you wire LLM evals into CI/CD as a gate without it being slow, flaky, or expensive?",
   a:"<p>Two tiers. <strong>PR gate</strong>: a small, fast, mostly-deterministic eval set (golden cases, format/safety checks, a few LLM-judge cases) that runs in minutes and blocks on regressions beyond a threshold. <strong>Nightly/pre-prod</strong>: the full dataset with LLM-as-judge and cost/latency tracking. Treat a release as a pinned (prompt version, model, retriever config) tuple so the eval result maps to an exact release. Gate on <em>relative regression</em> (vs the last known-good baseline) and aggregate scores, not absolute single-run pass/fail, to control flakiness. Cache/sample to control cost.</p>",
   top1:"They split fast deterministic PR gates from heavy nightly evals, gate on regression-vs-baseline rather than brittle absolute thresholds, and tie the eval to a fully pinned release artifact so a failed gate is reproducible. They budget eval cost explicitly (LLM-judge calls cost money) — a real operational concern.",
   followups:["Why gate on regression-vs-baseline instead of absolute scores?","How do you stop eval costs from spiraling?"]},
  {level:"scenario",q:"Production users report the chatbot 'got worse' this week but no code shipped. How do you investigate with LangSmith/Langfuse?",
   a:"<p>Pull production traces for the complaint window and compare against a known-good baseline. Likely causes when no code shipped: (1) a <strong>model provider update</strong> changed behavior; (2) a prompt template edited out-of-band; (3) <strong>retrieval drift</strong> — the vector index changed, embeddings stale, or new docs polluting results; (4) input distribution shift (new user behavior). Use the traces to inspect retrieved context and completions, run the current config over your eval dataset, and diff scores vs baseline to localize whether it's the model, the prompt, or the retrieval.</p>",
   top1:"They immediately suspect non-code drift (model version, retrieval, data) since nothing shipped, and they use the eval dataset as a regression oracle to localize the layer. They argue for pinning the model version and snapshotting the index so 'silent provider/data changes' can't degrade prod undetected — the systemic fix.",
   followups:["How do you pin against silent model-provider behavior changes?","How would retrieval drift degrade answers and how do you detect it?"]},
  {level:"architecture",q:"Design observability + eval for a multi-agent platform handling financial data. Self-host or SaaS? Why?",
   a:"<p>For financial/regulated data, lean <strong>Langfuse self-hosted</strong> for data residency and to keep prompts/PII inside your VPC — SaaS sending prompts to a third party is often a non-starter in finance. Instrument every agent run as a nested trace (sub-agents, tool calls, retrievals, token/cost). Maintain versioned prompts and eval datasets per agent; gate deploys on evals; alarm on quality/cost/latency regressions and guardrail-block rates. Redact PII before it lands in traces. Pair with OTel for infra traces so you have both system and LLM views. RBAC on trace access (prompts may contain sensitive data).</p>",
   top1:"They choose self-hosted Langfuse for the data-governance reason and treat trace data as sensitive (redaction + RBAC), which is exactly the S&P/financial-services instinct. They unify LLM observability (Langfuse) with system observability (OTel/CloudWatch) rather than siloing them, and bake evals into the deploy gate.",
   followups:["What data-governance reasons push you to self-host?","How do you redact PII from traces without losing debuggability?"]}
 ],

{
 id:"bedrock", name:"Bedrock Architecture", ix:"11", group:"AI Platform",
 concept:`<p><strong>Amazon Bedrock</strong> is the managed, serverless gateway to foundation models (Anthropic Claude, Amazon Titan/Nova, Meta, etc.) via one API — no model hosting. For a platform engineer the value is the surrounding capabilities, not just <code>InvokeModel</code>.</p>
 <ul>
 <li><strong>Core</strong>: InvokeModel / InvokeModelWithResponseStream (streaming), the <strong>Converse API</strong> (unified message format across models so you can switch models without rewriting), embeddings (Titan) for RAG.</li>
 <li><strong>Guardrails</strong>: policy enforcement — content filters, denied topics, PII redaction, and contextual grounding checks to reduce hallucination. You used these for policy-governed agent decisions.</li>
 <li><strong>Knowledge Bases</strong>: managed RAG (ingest → chunk → embed → store in OpenSearch/Aurora pgvector → retrieve). <strong>Agents</strong>: managed tool-use/orchestration. <strong>AgentCore</strong>: the newer primitives for production agents (runtime, memory, gateway, identity) — your cost-optimization framework used this.</li>
 <li><strong>Ops concerns</strong>: throughput modes (on-demand vs <strong>Provisioned Throughput</strong> for guaranteed capacity), cross-region inference, quotas/throttling, PrivateLink for data governance, model versioning.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"What is Bedrock and why use it instead of calling a model API directly or self-hosting?",
   a:"<p>Bedrock is a fully managed service giving unified API access to many foundation models without provisioning GPUs. Versus self-hosting: no infra, patching, or scaling of model servers; pay per token. Versus calling a provider directly: it stays inside your AWS account/IAM/VPC boundary (data governance), integrates with Guardrails, Knowledge Bases, and CloudWatch, and lets you switch models via one API. For an enterprise like S&P, the governance and IAM integration are the deciders.</p>",
   top1:"They lead with the enterprise reasons — data stays in your AWS boundary, IAM-based access control, PrivateLink, and unified billing/governance — rather than just 'it's convenient.' They note the tradeoff: less control/customization than self-hosting (no custom kernels, limited fine-tuning options vs running your own).",
   followups:["When would you self-host a model instead of using Bedrock?","How does Bedrock keep your data inside your governance boundary?"]},
  {level:"intermediate",q:"What are Bedrock Guardrails and how do they fit a production AI platform?",
   a:"<p>Guardrails are a configurable policy layer applied to inputs and outputs independent of the model: content filters (hate, violence, etc.), denied topics, word/PII filters with redaction, and <strong>contextual grounding</strong> checks that verify the response is grounded in provided context (reduces hallucination). You attach a guardrail to invocations so policy is enforced centrally and consistently, regardless of which model or prompt is used.</p>",
   top1:"They position guardrails as decoupling policy from prompts/models — so compliance isn't dependent on every developer writing safe prompts — and use them for policy-governed automation (your AgentCore cost-optimization framework gated rightsizing decisions through guardrails). They note grounding checks as a hallucination defense for RAG.",
   followups:["How do guardrails reduce hallucination in a RAG system?","Why enforce policy at the guardrail layer instead of in prompts?"]},
  {level:"advanced",q:"On-demand vs Provisioned Throughput, and how do you handle throttling/quotas in production?",
   a:"<p>On-demand: pay-per-token, shared capacity, subject to account-level RPM/TPM quotas and throttling under load. <strong>Provisioned Throughput</strong>: reserve model units for guaranteed, consistent throughput (and sometimes lower per-token cost at scale) — needed for predictable high-volume or latency-SLO workloads. Handle throttling with exponential backoff + jitter, client-side rate limiting, request queuing, and <strong>cross-region inference</strong> to spread load. Monitor throttle metrics and request quota increases proactively. For bursty traffic, blend: provisioned baseline + on-demand burst.</p>",
   top1:"They design for throttling as a normal condition (backoff+jitter, queue, cross-region) rather than treating it as an error, and they make the provisioned-vs-on-demand call on traffic shape and SLO, often blending a provisioned floor with on-demand burst. They monitor quota headroom proactively instead of discovering limits during an incident.",
   followups:["How does cross-region inference help with throttling and latency?","How do you decide how much provisioned throughput to buy?"]},
  {level:"scenario",q:"Your Bedrock-based service's latency p99 doubled and costs jumped after a 'minor prompt change.' What happened?",
   a:"<p>A prompt change can balloon input tokens (added context/examples/system prompt) → higher cost and latency per call. Or the change increased output length (no max_tokens cap, or it now generates verbose responses). Or it triggered more retrieval/tool calls in an agent loop. Or you switched to a larger model. Investigate via traces: compare input/output token counts and call counts before/after. Fix: cap max_tokens, trim context, measure token deltas in CI as part of the eval/cost gate.</p>",
   top1:"They reason directly from tokens→cost+latency (the LLM cost model) and pull token counts from traces to confirm, rather than blaming infra. They institute a cost/token regression check in CI so a prompt change that doubles tokens is caught pre-merge — connecting Bedrock ops to the eval-gate discipline.",
   followups:["Why does prompt length directly drive both cost and latency?","How do you catch a token-cost regression before it ships?"]},
  {level:"architecture",q:"Design a production Bedrock platform serving many internal teams: access control, cost attribution, governance, multi-model.",
   a:"<p>A central <strong>gateway/proxy</strong> in front of Bedrock (the Fargate/EKS service from earlier) that: authenticates teams, enforces per-team rate limits and model allowlists, attaches Guardrails, attributes token cost per team/tenant, and emits OTel traces + token metrics. IAM/task roles scoped to specific model ARNs. PrivateLink so prompts never traverse the public internet. Use the Converse API so teams are model-portable. Provisioned throughput for the platform baseline; cross-region for resilience. Knowledge Bases or a custom RAG path behind the gateway. Central prompt/model versioning and eval gates. CloudWatch + Langfuse for system + LLM observability.</p>",
   top1:"They centralize on a governed gateway (the single control point for cost attribution, guardrails, rate limits, and observability) rather than letting every team call Bedrock directly — the platform-engineering instinct. They use Converse for portability, PrivateLink for governance, and scope IAM to specific model ARNs. Chargeback/showback is built in from day one.",
   followups:["Why a central gateway instead of direct Bedrock access per team?","How do you attribute and chargeback token cost per tenant?","How do you let teams switch models without code changes?"]},
  {level:"leadership",q:"Leadership wants to 'add AI everywhere' fast. As platform lead, how do you enable that safely?",
   a:"<p>Build the paved road: a governed Bedrock gateway with guardrails, cost controls, observability, and golden patterns (RAG template, agent template) so teams ship AI features in days without each reinventing safety and ops. Set guardrails (PII, denied topics, grounding) as defaults, cost budgets/alerts per team, and an eval gate so quality is measured. Educate on the failure modes (hallucination, prompt injection, cost runaway). Enable speed via self-service, control via embedded guardrails — same philosophy as the rest of the platform.</p>",
   top1:"They balance the mandate's urgency with risk by making the safe path the fast path (golden templates + gateway), and they proactively name AI-specific risks (prompt injection, hallucination, cost runaway, data leakage) and build mitigations into the platform rather than relying on each team's discipline.",
   followups:["What AI-specific risks do you build guardrails for first?","How do you prevent cost runaway across many teams?"]}
 ],

{
 id:"rag", name:"RAG Pipelines", ix:"12", group:"AI Platform",
 concept:`<p><strong>RAG</strong> (Retrieval-Augmented Generation) grounds an LLM in your data: retrieve relevant chunks, stuff them into the prompt as context, generate an answer cited to those chunks. You built one on Bedrock (Claude + Titan embeddings + OpenSearch Serverless, sub-2s p95) — expect this to be grilled hard.</p>
 <ul>
 <li><strong>Two phases</strong>: <em>Ingestion</em> (load → chunk → embed → index) runs offline; <em>Query</em> (embed query → retrieve top-k → rerank → assemble prompt → generate) runs online. Most quality problems are in retrieval, not the LLM.</li>
 <li><strong>Chunking</strong> is the most underrated lever: too big = diluted relevance + wasted tokens; too small = lost context. Strategies: fixed-size with overlap, semantic/structural (by heading/section), parent-child (retrieve small, expand to parent).</li>
 <li><strong>Retrieval quality</strong>: hybrid search (dense vectors + sparse/BM25 keyword) beats pure vector for exact terms/IDs; rerankers (cross-encoder) reorder top-k for precision; metadata filtering scopes results.</li>
 <li><strong>Failure modes</strong>: hallucination (answer not grounded → use grounding checks + citations), retrieval miss (right doc not in top-k → chunking/embedding/hybrid), stale index (drift → re-ingest pipeline), context-window overflow.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"Walk me through a RAG pipeline end to end.",
   a:"<p><strong>Ingestion</strong>: load documents → chunk them → generate embeddings (e.g. Titan) for each chunk → store vectors + text + metadata in a vector store (OpenSearch). <strong>Query</strong>: embed the user's question → vector-search for top-k similar chunks → (optionally rerank/filter) → assemble a prompt with the retrieved context and the question → send to the LLM (Claude) → return the grounded answer, ideally with citations to the source chunks.</p>",
   top1:"They stress that retrieval quality, not the LLM, is where most RAG systems fail, and they mention citations/grounding as both a trust and a debugging mechanism. They tie p95 latency to the retrieval step (vector search + rerank) being the part you optimize and cache.",
   followups:["Where does most RAG quality loss actually happen?","How did you hit sub-2s p95 — what dominated the latency budget?"]},
  {level:"intermediate",q:"How do you choose a chunking strategy, and why does it matter so much?",
   a:"<p>Chunking determines what the retriever can find and what context the LLM sees. Too large: embeddings become unfocused (a chunk about many topics matches weakly), and you waste tokens/money. Too small: you retrieve a fragment lacking the context to answer. Strategies: fixed-size with overlap (simple baseline); structural/semantic chunking (split on headings/sections to preserve meaning); parent-child / small-to-big (embed small chunks for precise matching, but feed the larger parent to the LLM for context). Tune to document type and measure with retrieval metrics.</p>",
   top1:"They treat chunking as an empirical, measured decision (run retrieval-quality evals across strategies) rather than a fixed recipe, and they reach for parent-child/small-to-big to get precise matching with full context — a technique that separates senior from junior. For your Terraform-docs use case they'd chunk by module/section structure.",
   followups:["What is parent-child (small-to-big) retrieval and why is it powerful?","How would you chunk structured technical docs vs prose?"]},
  {level:"advanced",q:"Users complain RAG answers are sometimes confidently wrong. Diagnose and fix systematically.",
   a:"<p>Separate the two failure layers. <strong>Retrieval failure</strong> (right info not retrieved): check with retrieval metrics — is the correct chunk in top-k? If not: improve chunking, try hybrid search (add BM25 for exact terms/IDs), add a reranker, increase k then rerank down, fix embedding model/staleness. <strong>Generation failure</strong> (good context, bad answer): the model ignores context or hallucinates — tighten the prompt to answer only from context, add Bedrock grounding/contextual-grounding checks, require citations, lower temperature. Measure faithfulness/groundedness and context-relevance separately so you know which layer to fix.</p>",
   top1:"They split retrieval-relevance from generation-faithfulness as distinct metrics and fix the right layer instead of blindly swapping models, reach for hybrid search + reranking for retrieval and grounding-checks + citations for generation, and add a 'I don't know' path when retrieval confidence is low — refusing to answer beats confident hallucination in a financial context.",
   followups:["Hybrid (dense+sparse) search — why does it beat pure vector for IDs/exact terms?","How do you make the system say 'I don't know' instead of hallucinating?"]},
  {level:"scenario",q:"Your RAG index is stale — new Terraform docs aren't reflected for days. Design the ingestion/refresh pipeline.",
   a:"<p>Event-driven incremental ingestion: source changes (S3 PutObject / repo webhook) trigger a pipeline (Lambda/Step Functions/EKS job) that re-chunks and re-embeds only changed docs and upserts them, with deletes handled (tombstones) so removed docs leave the index. Use content hashes to skip unchanged chunks. Version the index/embeddings so an embedding-model change triggers a controlled re-embed. Add freshness metadata and monitor ingestion lag as an SLO. For large backfills, batch with throughput limits to respect embedding API quotas.</p>",
   top1:"They make ingestion incremental and event-driven (not a nightly full rebuild), handle deletes/updates explicitly (a commonly forgotten correctness bug), version embeddings so a model change is a controlled migration, and treat ingestion lag as a monitored SLO. They respect embedding-API quotas during backfill — an ops detail most miss.",
   followups:["How do you handle deleted/updated documents in the index correctly?","What happens to the index when you change embedding models?"]},
  {level:"architecture",q:"Design a production RAG platform on AWS for 50K+ docs, multiple teams, low latency, governed. Full architecture.",
   a:"<p>Ingestion: S3 (source) → event-driven pipeline (Step Functions + Lambda/EKS) → chunk → Titan embeddings (batched, quota-aware) → OpenSearch Serverless (vectors + metadata, per-team index or metadata-scoped). Query: gateway → embed query → hybrid retrieve (kNN + BM25) → rerank → assemble → Bedrock (Claude) with Guardrails grounding → cited answer. Cross-cutting: caching (embeddings + frequent queries) for the sub-2s p95, PrivateLink (data governance), metadata filtering for per-team access control, OTel + Langfuse for retrieval/quality observability, eval gate on retrieval + faithfulness, IAM scoped per team. Index versioning for embedding migrations.</p>",
   top1:"They design retrieval-quality observability and an eval gate in (not just the serving path), use hybrid+rerank for quality, cache aggressively for the latency SLO, and bake in governance (PrivateLink, metadata-based access control so a team can't retrieve another team's docs). They plan the embedding-migration story up front — the thing that bites you at scale.",
   followups:["How do you enforce per-team document access at retrieval time?","What do you cache to hit sub-2s p95 without serving stale results?"]}
 ],
 mistakes:["Blaming the LLM when the real failure is retrieval","One-size chunking instead of measuring chunking strategies","Pure vector search — missing exact terms/IDs that BM25 would catch","No delete/update handling → stale or contradictory results","Full index rebuilds instead of incremental event-driven ingestion","No groundedness/citation → confident hallucination, dangerous in finance"],
 bestPractices:["Measure retrieval-relevance and generation-faithfulness separately","Hybrid search + reranking; parent-child chunking for precision+context","Event-driven incremental ingestion with delete handling & content hashing","Grounding checks + citations + an 'I don't know' path","Cache embeddings/frequent queries for latency; version embeddings for migrations","Per-team metadata access control; PrivateLink; eval gate on retrieval quality"],

},
{
 id:"vectordb", name:"Vector Databases / OpenSearch", ix:"13", group:"AI Platform",
 concept:`<p>A <strong>vector database</strong> stores embeddings and does <strong>approximate nearest-neighbor (ANN)</strong> search to find semantically similar items fast. You used <strong>OpenSearch Serverless</strong> as the vector store. The senior questions are about index algorithms, the recall-vs-latency-vs-cost tradeoff, and operating it at scale.</p>
 <ul>
 <li><strong>ANN algorithms</strong>: <strong>HNSW</strong> (graph-based — fast, high recall, more memory; the common default) vs IVF/IVF-PQ (cluster + quantize — less memory, tunable, slightly lower recall). The key insight: exact kNN is O(n) and doesn't scale, so you accept approximate results to get speed.</li>
 <li><strong>Tuning knobs</strong>: HNSW's <code>m</code> (graph connectivity) and <code>ef_construction</code>/<code>ef_search</code> trade recall for latency/memory. PQ trades recall for massive memory savings.</li>
 <li><strong>Distance metrics</strong>: cosine (most text embeddings), dot product, Euclidean — must match how the embedding model was trained.</li>
 <li><strong>OpenSearch specifics</strong>: k-NN plugin, hybrid search (combine kNN + BM25 with normalization), metadata filtering (pre vs post filter has big recall/perf implications), Serverless (auto-scale, pay-per-use) vs managed clusters (control, cost predictability).</li>
 <li><strong>Dedicated vector DBs</strong> (Pinecone, Weaviate, pgvector, Milvus) vs OpenSearch: tradeoff of specialized features vs consolidating on infra you already run.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"Why approximate nearest neighbor instead of exact search?",
   a:"<p>Exact nearest-neighbor compares the query to every stored vector — O(n) per query, which is fine for thousands but collapses at millions of vectors and tight latency budgets. <strong>ANN</strong> builds an index (graph or clusters) that finds <em>almost</em> the closest vectors in sub-linear time, trading a small, tunable amount of recall for orders-of-magnitude speedup. For 50K+ docs with sub-2s p95, ANN is what makes it possible.</p>",
   top1:"They frame it as an explicit recall/latency/memory/cost tradeoff you tune (not a fixed thing), and they note that for small corpora exact search is fine and simpler — choosing ANN only when scale demands it, rather than reaching for it reflexively.",
   followups:["When is exact search actually the right choice?","What recall would you target and why?"]},
  {level:"intermediate",q:"HNSW vs IVF/PQ — how do you choose, and what knobs do you tune?",
   a:"<p><strong>HNSW</strong> (hierarchical navigable small world): graph-based, excellent recall and low latency, but memory-hungry (must hold the graph in RAM) — great default for moderate scale and latency-critical use. Knobs: <code>m</code> (more connections = better recall, more memory), <code>ef_search</code> (higher = better recall, higher latency). <strong>IVF + PQ</strong>: cluster vectors (IVF) and compress them (Product Quantization) — far less memory, good for huge corpora, at some recall cost; knobs include nlist/nprobe and PQ segment count. Choose HNSW for recall/latency at moderate scale, IVF-PQ when memory/cost at billion-scale dominates.</p>",
   top1:"They tie the choice to memory budget and corpus size, know the specific tuning knobs and their direction (ef_search up → recall up, latency up), and mention that you validate the chosen recall against an eval set rather than trusting defaults. They note OpenSearch's k-NN supports these and the memory implication of HNSW for instance sizing.",
   followups:["How does ef_search trade recall vs latency?","At what scale does HNSW's memory cost push you to PQ?"]},
  {level:"advanced",q:"Metadata filtering in vector search — what's the pre-filter vs post-filter problem?",
   a:"<p>You often need 'find similar chunks <em>where team = X and date > Y</em>.' <strong>Post-filtering</strong> (retrieve top-k by vector, then drop non-matching) is simple but can return too few or zero results if matches are rare in the top-k — recall collapses. <strong>Pre-filtering</strong> (restrict the candidate set to matching docs, then ANN within it) preserves recall but can be slow or break the ANN graph traversal if the filter is very selective. Engines implement filtered-ANN (e.g. efficient filtering in HNSW) to balance this. The right choice depends on filter selectivity.</p>",
   top1:"They articulate that filter selectivity drives the strategy (highly selective filters break naive post-filtering), know modern engines do filtered-ANN, and connect it to the per-team access-control requirement from RAG — getting filtering wrong is both a correctness and a security issue (returning another team's docs, or returning nothing).",
   followups:["How does highly selective filtering hurt post-filter recall?","How does this connect to enforcing per-tenant access control?"]},
  {level:"scenario",q:"Vector search recall is fine in dev but bad in prod with the full corpus. What changed?",
   a:"<p>Scale exposed it: (1) the index params tuned for a small set under-perform at full scale (ef_search too low for the larger graph); (2) memory pressure — the full HNSW graph doesn't fit, causing swapping/eviction and degraded recall; (3) data distribution shift — prod docs are more diverse/clustered than the dev sample; (4) embedding-model or normalization mismatch between ingestion and query; (5) filtering now removes most candidates (post-filter problem at scale). Re-tune on production-scale data, size memory for the full index, and validate recall on a prod-representative eval set.</p>",
   top1:"They know dev-scale tuning doesn't transfer and insist on evaluating recall at production scale and distribution, suspect memory/instance sizing for HNSW first, and check the ingestion-vs-query embedding/normalization consistency — a subtle correctness bug that silently tanks recall.",
   followups:["Why might HNSW recall degrade under memory pressure?","How do you catch an ingestion/query embedding mismatch?"]},
  {level:"architecture",q:"OpenSearch Serverless vs a dedicated vector DB vs pgvector for an AWS-centric platform. Make the call.",
   a:"<p><strong>OpenSearch Serverless</strong>: you already run it, native hybrid (kNN+BM25), AWS-integrated, auto-scaling — strong default for an AWS shop wanting one system for lexical + vector + logs. <strong>pgvector</strong>: great if data already lives in Postgres/Aurora and scale is moderate — transactional consistency, simple ops, but weaker at billion-scale ANN. <strong>Dedicated (Pinecone/Weaviate/Milvus)</strong>: best-in-class ANN features, scale, and DX, but another vendor/system to run and pay for. For your context (AWS, financial governance, existing OpenSearch), consolidating on OpenSearch Serverless is the pragmatic, lower-operational-surface choice; reach for a dedicated DB only if its scale/features become a hard requirement.</p>",
   top1:"They decide on operational surface and existing investment, not benchmark vanity — 'consolidate on what you run unless a specific requirement forces a specialized tool' — and they weigh data-governance (keeping vectors in-VPC/in-AWS) heavily for a financial-services context. They name hybrid search as a concrete reason OpenSearch fits RAG.",
   followups:["What requirement would force you off OpenSearch onto a dedicated vector DB?","When is pgvector the simplest right answer?"]}
 ],

 bestPractices:["Validate recall on a production-scale, representative eval set","Tune HNSW (m, ef_search) to the recall/latency/memory budget","Use filtered-ANN / pre-filter for selective metadata filters","Keep distance metric + normalization consistent end to end","Hybrid (kNN+BM25) with score normalization for better retrieval","Version embeddings; plan re-embed migrations; size memory for the full index"],

{id:"agentic-ai",name:"Agentic AI Platform Design",ix:14,group:"AI Platform",
 concept:`<p><strong>Agentic systems</strong> let an LLM plan, call tools, observe results, and loop until a goal is met — instead of a single prompt→response. As a platform engineer you don't just build one agent; you build the <em>platform</em> that lets agents run safely, observably, and cost-controlled in production. This is exactly your AgentCore cost-optimization framework: multiple agents orchestrated via Lambda tool calls, persistent memory for cross-account state, and Bedrock Guardrails enforcing policy.</p>
 <ul>
 <li><strong>The agent loop</strong>: reason → select tool → execute → observe → repeat. ReAct-style. The platform must bound iterations (max steps), enforce timeouts, and make every step traceable.</li>
 <li><strong>Tools</strong> = typed functions the agent can call (here: Lambdas that query CloudWatch, describe EC2/RDS, propose rightsizing). Tool schemas must be precise; bad schemas cause hallucinated/invalid calls.</li>
 <li><strong>Memory</strong>: short-term (conversation/scratchpad) vs long-term/persistent (cross-account state, prior decisions). AgentCore persistent memory lets a run resume and lets agents share state across accounts.</li>
 <li><strong>Guardrails</strong>: Bedrock Guardrails + your own policy layer — an agent that can <em>act</em> on infra must be constrained (no destructive actions without approval, denied resource types, blocked PII).</li>
 <li><strong>Orchestration patterns</strong>: single agent + tools; supervisor/sub-agent (a planner delegates to specialists); deterministic workflow with LLM steps (often the right answer — don't make it agentic if a DAG suffices).</li>
 <li><strong>Human-in-the-loop</strong>: for high-blast-radius actions (terminating RDS), the agent proposes, a human approves. Critical in a financial/regulated setting.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"What makes a system 'agentic' versus a normal LLM call or a RAG pipeline?",
   a:"<p>A plain LLM call is one-shot input→output. RAG adds retrieved context but is still essentially one turn. An <strong>agentic</strong> system gives the model autonomy to <em>act</em>: it decides which tools to call, executes them, observes results, and loops — driving toward a goal over multiple steps. The defining traits are tool use, a control loop, and state/memory across steps. The cost is non-determinism and a much larger failure/safety surface.</p>",
   top1:"They immediately add the engineer's caveat: agentic ≠ better. Many problems are solved more reliably by a deterministic workflow with one or two LLM steps. They reach for full agency only when the task genuinely requires open-ended planning, and they frame the platform's job as containing the non-determinism (bounds, traces, guardrails).",
   followups:["When would you deliberately NOT build an agent?","How does non-determinism change how you test it?"]},
  {level:"intermediate",q:"Walk me through how you bound and observe an agent loop in production.",
   a:"<p>Bound it: max iteration count, per-step and total wall-clock timeouts, per-run token/cost budget that hard-stops the loop, and a tool-call allow-list. Observe it: emit a trace span per step (reasoning summary, tool chosen, tool args, tool result, tokens, latency, cost) — this is where LangSmith/Langfuse + OpenTelemetry come in. Persist the full step history so a failed run is debuggable and resumable. Alert on loops hitting max-steps (a sign of a stuck agent) and on cost-per-run anomalies.</p>",
   top1:"They treat 'max steps reached' as a first-class alertable failure mode, not an edge case, and they instrument cost-per-run as a primary SLI because agent loops are how you get a surprise 100x bill. They connect the per-step trace to their actual LangSmith/Langfuse stack and note that traces are the only way to debug a non-deterministic system.",
   followups:["What's your fallback when an agent hits max steps?","How do you budget and enforce cost per agent run?"]},
  {level:"advanced",q:"Your AgentCore framework lets agents recommend rightsizing EC2/RDS across accounts. How do you stop it from doing something catastrophic?",
   a:"<p>Defense in depth: (1) <strong>Capability scoping</strong> — the agent's tools are read-mostly (describe metrics, propose changes); actual mutation goes through a separate, permissioned path. (2) <strong>Bedrock Guardrails + a policy engine</strong> — deny destructive operations, deny protected resource tags/accounts, block actions outside business hours. (3) <strong>Human-in-the-loop approval</strong> for any apply, especially RDS. (4) <strong>Least-privilege IAM per account</strong> via assumed roles with tight policies — the agent can never exceed what the role allows, regardless of what it 'decides'. (5) <strong>Dry-run + diff</strong> — show the proposed change and projected savings/impact before execution. (6) <strong>Full audit trail</strong> for compliance.</p>",
   top1:"They put the real enforcement in IAM and a separate apply path — not in the prompt — because you must assume the LLM can be wrong or manipulated. 'The guardrail that matters is the one the model physically cannot bypass.' They make RDS changes human-approved by default and tie the whole thing to auditability for the financial-services compliance context.",
   followups:["Why can't prompt-level guardrails alone be trusted?","How do assumed-role least-privilege policies cap the blast radius?"]},
  {level:"scenario",q:"An agent in prod starts making redundant tool calls and runs cost spikes 20x. Diagnose and fix.",
   a:"<p>Pull the run traces: redundant calls usually mean the agent isn't 'seeing' prior results — broken memory/context truncation, a tool returning unhelpful output so the model retries, or a planning prompt that doesn't track completed steps. Immediate mitigation: the per-run cost cap and max-step bound should have contained it (if they didn't, that's finding #1). Fix: ensure tool results are fed back clearly, add result caching/idempotency for repeated identical calls, tighten the system prompt to track state, and consider a deterministic step where the loop was unnecessary. Add a cost-per-run alert so this pages early next time.</p>",
   top1:"Their first reaction is 'why didn't the budget guard stop it?' — they treat the cost spike as both an agent bug and a missing-control bug. They use traces to find the redundancy root cause rather than guessing, and they add idempotency/caching plus a regression eval so the fixed behavior is locked in.",
   followups:["How would caching/idempotent tools have helped?","What guard should have capped this automatically?"]},
  {level:"architecture",q:"Design a multi-agent platform: supervisor + specialist agents. What are the hard parts?",
   a:"<p>A <strong>supervisor</strong> agent decomposes the goal and routes sub-tasks to <strong>specialist</strong> agents (e.g. a metrics agent, a cost agent, a policy agent), then synthesizes. Hard parts: (1) <strong>State/memory sharing</strong> — what context each agent sees; persistent memory (AgentCore) for cross-agent/cross-account state. (2) <strong>Error propagation</strong> — a sub-agent failure must surface, not silently corrupt the result. (3) <strong>Cost explosion</strong> — each agent loops, so cost multiplies; budget per agent and globally. (4) <strong>Observability</strong> — trace the whole tree, parent/child spans, or debugging is impossible. (5) <strong>Loop/deadlock prevention</strong> — agents calling each other. (6) <strong>Consistency</strong> — conflicting recommendations from specialists need a resolution policy. Often a partially deterministic orchestration (fixed routing, LLM only where needed) beats fully autonomous multi-agent.</p>",
   top1:"They warn against multi-agent-for-its-own-sake — it multiplies cost, latency, and failure surface — and reserve it for genuinely separable specialties. They insist on a parent/child trace tree and per-agent budgets, and they design a deterministic conflict-resolution/synthesis step rather than hoping the supervisor 'figures it out'.",
   followups:["When is multi-agent worse than one well-designed agent?","How do you trace and budget a tree of agents?"]},
  {level:"leadership",q:"Leadership wants to 'put agents everywhere.' How do you set strategy responsibly?",
   a:"<p>Frame agents as a capability with a cost/risk profile, not a mandate. Establish: (1) a <strong>decision rubric</strong> — use deterministic automation by default, RAG for knowledge, agents only when open-ended planning + tool use is genuinely required. (2) a <strong>paved-road platform</strong> — shared agent runtime, tracing, guardrails, eval harness, cost controls — so teams don't each reinvent (and mis-secure) it. (3) <strong>guardrails as policy</strong> — what agents may touch, approval requirements, audit. (4) <strong>graduated rollout</strong> — shadow → human-approved → autonomous-low-risk, with eval gates. (5) clear <strong>ownership and on-call</strong>. The message: we'll move fast by making the safe path the easy path.</p>",
   top1:"They reframe 'agents everywhere' into 'a safe, observable, cost-bounded paved road so the right teams use agents for the right problems.' They lead with a decision rubric to prevent agent-washing, and they tie autonomy level to evaluated risk with a graduated rollout — strategic and safety-literate, not hype-driven.",
   followups:["What goes in your 'should this be an agent?' rubric?","How does a paved-road platform reduce org-wide risk?"]}
 ],
 mistakes:["Making things agentic when a deterministic workflow would do","Putting guardrails only in the prompt, not in IAM/code","No max-step or cost bound on the loop","No per-step tracing → undebuggable non-determinism","Letting agents perform destructive infra actions without human approval","Multi-agent sprawl that multiplies cost and failure surface"],
 bestPractices:["Default to deterministic; use full agency only when required","Enforce limits in IAM/separate apply path, not just prompts","Bound loops: max steps, timeouts, hard per-run cost cap","Trace every step (LangSmith/Langfuse + OTel), parent/child for multi-agent","Human-in-the-loop for high-blast-radius actions (esp. RDS)","Provide a paved-road agent platform: runtime, guardrails, evals, cost controls"],
 tradeoffs:["Autonomy vs predictability/safety","Multi-agent specialization vs cost/latency/complexity","Persistent memory power vs state-management complexity","Speed of action vs human-approval safety gates","Flexibility of LLM planning vs reliability of deterministic DAGs"]
},
{id:"cicd-ai",name:"CI/CD for AI Applications",ix:15,group:"CI/CD",
 concept:`<p>CI/CD for AI apps extends normal software delivery with the things that make AI non-deterministic: <strong>prompts, models, and data are deployable artifacts too</strong>, and "correct" is statistical, not binary. Your pipeline must version and gate all three, and the gates can't be a simple unit-test pass/fail.</p>
 <ul>
 <li><strong>What gets versioned</strong>: app code, prompts (as code, reviewed in PRs), model identifiers/versions (e.g. a specific Bedrock model + inference params), retrieval config (chunking, embedding model, index), and eval datasets. A prompt change is a deploy.</li>
 <li><strong>Eval gates</strong>: instead of (or alongside) unit tests, run an <strong>offline eval suite</strong> on a curated dataset — correctness/faithfulness, regression on golden Q&A, safety/guardrail checks, latency/cost budgets. LLM-as-judge + deterministic assertions. Block the deploy if quality regresses.</li>
 <li><strong>Progressive delivery</strong>: canary/shadow new prompt or model to a slice of traffic, compare online metrics (latency, cost, thumbs-down, guardrail hits), then promote. Easy rollback because prompt/model are versioned config.</li>
 <li><strong>Environment promotion</strong>: dev → stage → prod with the same artifact; the prompt/model/index that passed evals in stage is exactly what ships.</li>
 <li><strong>Online eval / feedback loop</strong>: production traces (LangSmith/Langfuse) feed back into the eval dataset, closing the loop.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"How is CI/CD for an LLM app different from a normal microservice?",
   a:"<p>The artifact set is bigger and the tests are statistical. Beyond code, you version and ship <strong>prompts, model versions/params, and retrieval config</strong>. 'Passing' isn't a green unit test — it's an <strong>eval suite</strong> that checks quality (correctness, faithfulness, safety) and budgets (latency, cost) against a dataset, and you accept a threshold rather than 100%. And because output is non-deterministic, you lean harder on canary/shadow and easy rollback.</p>",
   top1:"They name prompts and model versions as first-class deployable artifacts reviewed in PRs, and they're explicit that the quality gate is a threshold on an eval set, not a boolean — showing they understand the statistical nature changes the whole pipeline shape, not just adds a step.",
   followups:["What exactly do you put under version control for an LLM feature?","Why can't you gate on a simple pass/fail?"]},
  {level:"intermediate",q:"Design the eval gate that blocks a bad prompt/model from reaching prod.",
   a:"<p>On every PR that touches a prompt, model, or retrieval config, CI runs an <strong>offline eval</strong> against a curated dataset: (1) <strong>golden-set regression</strong> — known inputs with expected properties; (2) <strong>LLM-as-judge</strong> scoring for correctness/faithfulness/relevance with a fixed judge model and rubric; (3) <strong>safety</strong> — guardrail/jailbreak/PII checks; (4) <strong>budgets</strong> — p95 latency and cost-per-request thresholds. Compare scores against the current prod baseline; fail the build if any metric regresses beyond tolerance. Store results as a report artifact on the PR.</p>",
   top1:"They compare against the prod baseline (regression detection) rather than absolute scores, pin the judge model/version for reproducibility, and include cost and latency as gate criteria — not just quality. They acknowledge eval-set drift and feed prod failures back into the dataset so the gate keeps getting stronger.",
   followups:["How do you keep the eval dataset from going stale?","How do you make LLM-as-judge reproducible?"]},
