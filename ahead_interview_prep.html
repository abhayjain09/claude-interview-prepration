  {level:"advanced",q:"How do you safely roll out a new Bedrock model version or a prompt change to production?",
   a:"<p>Because prompt and model are versioned config, do progressive delivery: <strong>shadow</strong> first (run the new version on real traffic without serving it, compare quality/latency/cost offline), then <strong>canary</strong> a small % with live online metrics (thumbs-down rate, guardrail hits, latency, cost), automatically rolling back on regression. Keep a feature-flag / config switch so rollback is instant and doesn't require a redeploy. Validate that the new model's behavior didn't break prompt assumptions (output format, tool-calling) — model upgrades silently change formatting.</p>",
   top1:"They separate model/prompt config from code so rollout and rollback are config flips, not deploys, and they shadow before canary to catch format/behavior drift that a model upgrade introduces. They monitor cost as a rollout metric because a 'better' model can quietly double spend.",
   followups:["Why decouple model/prompt config from the code deploy?","What breaks when a model upgrade changes output formatting?"]},
  {level:"scenario",q:"A prompt tweak passed offline evals but quality dropped in production. What happened and what do you change?",
   a:"<p>Classic offline/online gap: the eval dataset wasn't representative of real traffic (distribution shift), the LLM-judge rubric didn't capture what users care about, or production context (retrieved docs, real user phrasing) differs from eval inputs. The canary should have caught it — if there was no canary, that's the process fix. Remediation: roll back via config flag, add the failing real examples to the eval set, refine the judge rubric, and require a canary stage with online metrics before full promotion.</p>",
   top1:"They treat the miss as an eval-coverage problem and immediately harvest the production failures back into the dataset, and they insist the real safety net is the online canary, not the offline gate — offline evals reduce risk but can't fully predict prod. Rollback is a config flip because they versioned the prompt.",
   followups:["How do production traces improve your eval set?","Why is a canary the real safety net here?"]},
  {level:"architecture",q:"Architect an end-to-end CI/CD platform for ML/LLM features that 20+ developers can use.",
   a:"<p>Paved road: a repo template where prompts live as reviewed files, model/retrieval config is declarative, and a standard <code>eval/</code> suite ships with the project. <strong>CI</strong> (GitHub Actions): lint/test code, run offline evals on prompt/model/config changes, post a quality report to the PR, block on regression. <strong>CD</strong>: build container, deploy to ECS Fargate/EKS via the standard pipeline, promote dev→stage→prod with the same artifact, gated by stage evals. <strong>Progressive delivery</strong>: shadow/canary with online metrics and auto-rollback. <strong>Observability</strong>: LangSmith/Langfuse + CloudWatch wired in by default; prod traces feed the eval dataset. Centralize the eval harness, judge config, and cost/latency budgets so every team inherits the same guardrails.</p>",
   top1:"They build it as a self-service paved road so 20+ devs inherit evals, observability, and cost gates by default rather than bolting them on — directly echoing their resume's CI/CD consolidation and 40% error reduction. They make prod-trace→eval-dataset a closed loop, the hallmark of a mature LLMOps platform.",
   followups:["How do you make evals/observability the default, not opt-in?","How does the prod-to-eval feedback loop close?"]},
  {level:"leadership",q:"How do you get skeptical teams to adopt eval-gated deployment instead of 'ship and eyeball it'?",
   a:"<p>Make the safe path the easy path and show the cost of not having it. Provide the eval harness as a drop-in so adoption is low-effort; seed it with a few high-value evals so teams see regressions caught they'd have missed. Quantify incidents prevented and reduced rollbacks. Start with the highest-risk service, prove value, then template it. Avoid mandating heavyweight gates that slow everyone — tune thresholds so they catch real regressions without blocking on noise, or teams will route around them.</p>",
   top1:"They lead with developer experience and evidence (incidents avoided, faster safe iteration), not policy, and they explicitly guard against gates so strict/noisy that teams bypass them — showing they understand adoption is a socio-technical problem. They land it as 'evals let you ship faster safely,' reframing the gate as an enabler.",
   followups:["How do you avoid eval gates that teams route around?","What metric proves the gate's value to leadership?"]}
 ],
 mistakes:["Treating prompts/models as untracked config instead of versioned artifacts","Gating on pass/fail unit tests instead of statistical eval thresholds","No canary/shadow — relying only on offline evals","Eval dataset that drifts from real traffic","Coupling model/prompt to code deploys so rollback needs a redeploy","Ignoring cost/latency as deploy gate criteria"],
 bestPractices:["Version prompts, model IDs/params, and retrieval config; review in PRs","Offline eval gate comparing against prod baseline (regression detection)","Pin the judge model for reproducible LLM-as-judge scoring","Shadow then canary with online metrics and auto-rollback","Feed production traces back into the eval dataset (closed loop)","Provide evals + observability as a paved-road default for all teams"],
 tradeoffs:["Strict gates (safety) vs developer velocity/bypass risk","Offline evals (cheap, fast) vs online canary (real but riskier)","LLM-as-judge (scalable) vs human eval (accurate, costly)","Newer/better model (quality) vs cost and behavior-drift risk","Comprehensive eval coverage vs dataset maintenance burden"]
},
{id:"multi-account",name:"Multi-Account AWS Strategy",ix:16,group:"Infrastructure",
 concept:`<p>At enterprise/financial scale you don't run everything in one account — you use <strong>AWS Organizations</strong> with many accounts as the primary isolation, security, and blast-radius boundary. Your AgentCore framework operating "across multi-account AWS environments" lives or dies on getting this right.</p>
 <ul>
 <li><strong>Why multi-account</strong>: hard isolation (an account is the strongest AWS boundary), blast-radius containment, separate billing/cost attribution, per-environment and per-team separation, and limit/quota isolation.</li>
 <li><strong>AWS Organizations + Control Tower</strong>: Organizations gives the account tree and consolidated billing; Control Tower lays down a governed <strong>landing zone</strong> (guardrails, log archive, audit accounts) automatically.</li>
 <li><strong>OUs + SCPs</strong>: Organizational Units group accounts; <strong>Service Control Policies</strong> are guardrails that set the <em>maximum</em> permissions for accounts (e.g. deny disabling CloudTrail, deny regions, deny leaving the org) — they don't grant, they cap.</li>
 <li><strong>Cross-account access</strong>: IAM role assumption (<code>sts:AssumeRole</code>) is how a workload in one account acts in another — least-privilege roles, external IDs, no long-lived keys. This is how your cost-optimization agents reach into each account.</li>
 <li><strong>Shared services</strong>: centralized networking (Transit Gateway), centralized logging/security (log archive + audit accounts), shared CI/CD, and an internal platform account.</li>
 <li><strong>Account vending</strong>: standardized, automated account creation (Account Factory / Terraform) so new accounts are born compliant.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"Why use many AWS accounts instead of separating with VPCs/tags in one account?",
   a:"<p>The account is AWS's strongest isolation boundary — IAM, service quotas, and most blast-radius are scoped to it. Separate accounts give hard security isolation (a compromise or runaway in dev can't touch prod), clean cost attribution via consolidated billing, and independent quotas. VPCs and tags separate <em>within</em> a trust boundary but share IAM and limits, so a misconfigured policy or a noisy workload can cross over. For prod/regulated workloads, account-level isolation is the standard.</p>",
   top1:"They frame the account as the blast-radius and security boundary and cite concrete failure modes single-account can't contain (IAM misconfig, quota exhaustion, a compromised credential). They mention cost attribution and per-environment isolation as bonuses, and note Organizations makes many accounts manageable rather than chaotic.",
   followups:["What can't VPC/tag separation contain that accounts can?","How do Organizations keep many accounts manageable?"]},
  {level:"intermediate",q:"SCPs vs IAM policies — what's the difference and how do they interact?",
   a:"<p><strong>SCPs</strong> are Organizations guardrails that define the <em>maximum</em> permissions available in an account/OU — they never grant access, they only cap it. <strong>IAM policies</strong> grant permissions within an account. Effective permission = intersection: an action is allowed only if IAM grants it AND no SCP denies it. So an SCP that denies <code>cloudtrail:StopLogging</code> means no principal in that account — even an admin — can stop CloudTrail. Use SCPs for organization-wide invariants (deny region X, deny leaving org, protect security controls); use IAM for actual day-to-day grants.</p>",
   top1:"They state the intersection rule precisely and give canonical SCP uses (protect CloudTrail/Config, restrict regions, prevent org-leave) versus IAM for grants. They note SCPs don't apply to the management account and that over-broad SCPs cause confusing 'I have admin but it's denied' failures — an ops gotcha.",
   followups:["Can an account admin override an SCP deny? Why not?","What's a dangerous SCP mistake?"]},
  {level:"advanced",q:"How does a workload in your platform account securely act across 50+ member accounts (like your cost agents do)?",
   a:"<p><strong>Cross-account role assumption.</strong> Each member account has a role (deployed uniformly via Account Factory/Terraform) that <em>trusts</em> the platform account's principal and grants a tightly scoped, least-privilege policy (e.g. read CloudWatch metrics, describe EC2/RDS, and — only where allowed — propose changes). The platform workload calls <code>sts:AssumeRole</code> to get temporary credentials per account; no long-lived keys, optional <strong>external ID</strong> to prevent confused-deputy. Combine with SCPs so even the assumed role can't exceed org guardrails, and log all assumptions to the central audit account.</p>",
   top1:"They standardize the cross-account role via account vending so it's identical and auditable everywhere, scope each role to least privilege, use temporary STS creds + external ID, and layer SCPs as a backstop. They emphasize central logging of every AssumeRole for the financial-compliance audit trail — security and operability together.",
   followups:["What's the confused-deputy problem and how does external ID help?","How do SCPs backstop an over-scoped assumed role?"]},
  {level:"scenario",q:"A new team needs dev/stage/prod accounts that are compliant from day one. How do you deliver that in hours, not weeks?",
   a:"<p><strong>Account vending</strong>: Control Tower Account Factory (or a Terraform-based factory) provisions the accounts into the right OUs, which automatically inherit SCP guardrails, centralized logging/CloudTrail, baseline IAM roles (incl. the cross-account platform role), networking (TGW attachment), and security tooling (Security Hub, Config). The team gets accounts that are governed, monitored, and connected on creation — no manual setup, no drift, no 'we forgot to enable CloudTrail.' This is infrastructure-as-code applied to the account itself.</p>",
   top1:"They treat the account as a versioned, vended artifact so compliance is born-in, not bolted-on, and they enumerate exactly what the baseline injects (guardrails, logging, security tooling, cross-account roles, networking). They tie it to their Security Hub/Terraform-module experience — standardization is how you scale governance.",
   followups:["What baseline does a vended account inherit automatically?","How does this prevent config drift across accounts?"]},
  {level:"architecture",q:"Design the account structure for an AI platform org: where do dev/stage/prod, shared services, security, and AI workloads live?",
   a:"<p>OU-based: a <strong>Security OU</strong> (log archive + audit accounts, locked down by SCP); an <strong>Infrastructure/Shared-Services OU</strong> (networking/TGW, CI/CD, internal platform/AgentCore account, shared ECR/artifact stores); a <strong>Workloads OU</strong> split into per-environment sub-OUs (Dev/Stage/Prod), each with per-team accounts; a <strong>Sandbox OU</strong> with tight SCPs and budget caps. Prod OU gets stricter SCPs (deny risky services, enforce regions, require approval paths). AI workloads (Bedrock, vector stores, agent runtimes) live in workload accounts, while the agent <em>control plane</em> runs in the platform account and assumes roles into the others. Centralized observability flows to the security/audit accounts.</p>",
   top1:"They separate the agent control plane (platform account) from the workload accounts it acts on, apply stricter guardrails to the Prod OU, and route all logs/security to a locked-down Security OU. They mention budget-capped sandboxes and per-team workload accounts — a structure that scales governance, cost, and blast-radius cleanly.",
   followups:["Why keep the agent control plane separate from workload accounts?","How do prod-OU SCPs differ from dev-OU SCPs?"]},
  {level:"leadership",q:"The org grew organically into messy accounts with inconsistent security. How do you drive a multi-account governance program?",
   a:"<p>Treat it as migration + platform, not a big-bang. (1) Establish the target landing zone (Control Tower, OUs, SCPs, central logging). (2) Inventory and risk-rank existing accounts; bring the highest-risk into governance first. (3) Roll out guardrails in <em>monitor/audit mode</em> before enforce, to avoid breaking teams. (4) Provide account vending so all <em>new</em> accounts are compliant immediately, stopping the bleed. (5) Migrate existing accounts incrementally with team buy-in and clear runbooks. (6) Measure: % accounts under governance, guardrail violations, security-score trend. Communicate it as enabling speed (paved road) plus reducing audit/compliance pain — crucial framing in financial services.</p>",
   top1:"They sequence it to avoid breaking teams (monitor-before-enforce, vend-new-first to stop the bleed, migrate-existing incrementally) and lead with metrics and compliance framing leadership cares about. They position governance as a paved road that speeds teams up, echoing their Security Hub +30% track record — a credible enterprise-change narrative.",
   followups:["Why roll out SCPs in monitor mode before enforce?","What metrics show the governance program is working?"]}
 ],
 mistakes:["Single account with VPC/tag 'isolation' for prod/regulated workloads","Long-lived cross-account access keys instead of STS role assumption","Over-broad SCPs that cause confusing org-wide denies","Manual account setup → drift and missing baselines (no CloudTrail, etc.)","No central log archive/audit account","Treating the management account as a normal workload account"],
 bestPractices:["Use Organizations + Control Tower landing zone with OUs","SCPs for org-wide invariants (protect CloudTrail/Config, restrict regions)","Cross-account access via least-privilege STS roles + external ID","Automated account vending so accounts are born compliant","Centralize logging/security in a locked-down Security OU","Stricter guardrails on the Prod OU; budget-capped sandboxes"],
 tradeoffs:["Many accounts (isolation, attribution) vs management overhead","SCP strictness (safety) vs developer friction","Centralized shared services (consistency) vs single-point dependency","Account-per-team (clean) vs account sprawl","Tight guardrails vs speed — mitigated by paved-road vending"]
},
{id:"iam-security",name:"IAM & Security",ix:17,group:"Security",
 concept:`<p>IAM is the control plane for everything in AWS — get it wrong and nothing else matters. As a platform engineer in financial services you own least-privilege at scale, secrets, network security, and the security posture of an AI platform that can <em>act</em> on infrastructure.</p>
 <ul>
 <li><strong>IAM model</strong>: principals (users, roles), policies (identity-based, resource-based), and the evaluation logic — explicit deny > allow; default deny. <strong>Roles</strong> (assumable, temporary creds) are preferred over IAM users (long-lived keys) for almost everything.</li>
 <li><strong>Least privilege</strong>: grant only what's needed; use conditions (source VPC, MFA, tags), permission boundaries to cap what teams can self-grant, and access analyzer to find over-broad/external access.</li>
 <li><strong>Workload identity</strong>: EC2 instance profiles, ECS task roles, EKS IRSA / Pod Identity — give workloads scoped roles, never embed keys.</li>
 <li><strong>Secrets</strong>: Secrets Manager / SSM Parameter Store with rotation and KMS encryption; never secrets in env vars/images/repos.</li>
 <li><strong>Data protection</strong>: KMS encryption at rest, TLS in transit, key policies, and for regulated data, customer-managed keys and strict key access.</li>
 <li><strong>Detective controls</strong>: CloudTrail (audit), Config (compliance), Security Hub (posture score — your +30%), GuardDuty (threat detection).</li>
 <li><strong>AI-specific</strong>: Bedrock Guardrails, prompt-injection defense, scoping what agents can do, PII handling, and not leaking secrets into prompts/logs.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"IAM roles vs IAM users — when and why?",
   a:"<p><strong>Roles</strong> provide temporary, auto-rotating credentials via assumption — no long-lived keys to leak. Use them for workloads (EC2/ECS/EKS), cross-account access, and (via SSO/identity federation) humans. <strong>IAM users</strong> carry long-lived access keys, which are a leak/rotation liability — avoid them; the main legitimate case is a few break-glass or legacy-integration scenarios. The principle: prefer temporary credentials everywhere; eliminate static keys.</p>",
   top1:"They state 'no long-lived keys' as a near-absolute and route humans through SSO/federation and workloads through instance/task/IRSA roles. They mention that the few remaining IAM users should have keys rotated and monitored, and ideally replaced — showing a leak-minimization mindset, not just textbook definitions.",
   followups:["How do workloads get credentials without static keys?","How should humans authenticate instead of IAM users?"]},
  {level:"intermediate",q:"How do you enforce least privilege across many teams without becoming a bottleneck?",
   a:"<p>Combine guardrails with self-service: <strong>permission boundaries</strong> cap the max permissions a team can grant themselves, so they can create roles freely but never exceed the boundary; <strong>SCPs</strong> set org-wide ceilings; provide <strong>vetted policy templates/modules</strong> (paved road) for common patterns; use <strong>IAM Access Analyzer</strong> to detect over-broad or external-facing grants and generate least-privilege policies from CloudTrail activity. Review high-risk privileges, automate the rest. The goal: teams move fast within a safe envelope you defined once.</p>",
   top1:"They solve the scale problem with boundaries + templates + Access Analyzer rather than manual review of every policy, and they generate least-privilege policies from observed CloudTrail usage. They frame it as 'safe self-service' so security enables velocity — the platform-engineering framing AHEAD wants.",
   followups:["What's the difference between an SCP and a permission boundary?","How does Access Analyzer help right-size policies?"]},
  {level:"advanced",q:"Your cost-optimization agent can read metrics and propose infra changes across accounts. Threat-model it.",
   a:"<p>Threats: (1) <strong>over-privileged role</strong> — agent role lets it do more than read+propose; mitigate with least-privilege per-account roles and SCP backstops. (2) <strong>prompt injection</strong> — malicious content in metric names/tags/tickets steers the agent; mitigate by never letting prompt content drive privileged actions directly, keeping the apply path separate and permissioned, and human approval for mutations. (3) <strong>secret/PII leakage</strong> into prompts or traces; mitigate by redaction and not logging sensitive fields. (4) <strong>confused deputy</strong> across accounts; mitigate with external IDs. (5) <strong>credential exposure</strong>; use only STS temp creds. (6) <strong>auditability</strong> — every action logged to the audit account. The core principle: the LLM is untrusted input; enforcement lives in IAM and code, not the prompt.</p>",
   top1:"They explicitly classify the LLM (and any retrieved/observed content) as untrusted and put enforcement in IAM/separate apply paths — 'a guardrail the model can't bypass.' They cover prompt injection, confused deputy, and PII-in-traces, and they require human approval for mutations plus full audit logging for compliance. This is genuine AI-security maturity.",
   followups:["Why treat the LLM's output as untrusted input?","How do you stop prompt injection from triggering a privileged action?"]},
  {level:"scenario",q:"GuardDuty flags credentials from one of your ECS tasks being used from an unknown IP. Walk the response.",
   a:"<p>Treat as active compromise. <strong>Contain</strong>: revoke/rotate the task role's sessions (attach a deny-all or revoke via session policy / disable the role), isolate the task (security group lockdown), snapshot for forensics. <strong>Assess</strong>: CloudTrail to see what the leaked creds did and where; scope blast radius by the role's permissions (least privilege now pays off). <strong>Eradicate/recover</strong>: redeploy clean tasks, rotate any secrets the role could reach, patch the exfil vector (SSRF? exposed metadata? leaked env?). <strong>Post-incident</strong>: enforce IMDSv2, tighten the role, add detective alerts, write the blameless postmortem. The smaller the role's privileges, the smaller this incident.</p>",
   top1:"They move in the contain→assess→eradicate→recover→learn order, use CloudTrail to bound blast radius, and call out IMDSv2/SSRF as the likely vector for stolen task creds. They emphasize that least-privilege is what caps the damage and finish with a blameless postmortem — incident discipline plus prevention.",
   followups:["Why does IMDSv2 matter for stolen task credentials?","How does least privilege limit this blast radius?"]},
  {level:"architecture",q:"Design secrets management for a multi-account AI platform handling regulated financial data.",
   a:"<p><strong>Secrets Manager</strong> (or SSM Parameter Store for config) as the store, encrypted with <strong>customer-managed KMS keys</strong> whose key policies restrict access to specific roles. Automatic <strong>rotation</strong> for DB creds and API keys. Workloads fetch secrets at runtime via their scoped role (ECS task role / IRSA) — never baked into images, env files, or repos. Cross-account: either replicate secrets with per-account KMS grants or fetch via assumed role. Audit every secret access via CloudTrail. For LLM specifically: ensure secrets/PII never enter prompts or get logged in traces — add redaction in the observability pipeline. Enforce with SCPs that deny unencrypted storage and Config rules that flag plaintext secrets.</p>",
   top1:"They use customer-managed KMS with tight key policies (control matters more than encryption-on for regulated data), automate rotation, fetch at runtime via workload identity, and — critically for an AI platform — block secrets/PII from prompts and traces via redaction. They back it with SCP/Config enforcement so the secure path is the only path.",
   followups:["Why customer-managed KMS keys over AWS-managed for regulated data?","How do you keep secrets out of LLM prompts and traces?"]},
  {level:"leadership",q:"You raised the Security Hub score 30%. How do you sustain and scale a security culture beyond a one-time push?",
   a:"<p>Make security continuous and self-service, not a campaign. (1) <strong>Shift left</strong> — IaC scanning (tfsec/Checkov), policy-as-code, and security checks in CI so issues are caught pre-merge. (2) <strong>Guardrails as defaults</strong> — SCPs, permission boundaries, vetted Terraform modules so the secure config is the easy default. (3) <strong>Continuous posture</strong> — Security Hub/Config tracked as an SLI with ownership and burn-down, not an annual scramble. (4) <strong>Paved road + education</strong> — golden templates plus targeted enablement. (5) <strong>Metrics + accountability</strong> — per-team posture dashboards. The aim: security becomes an inherited property of the platform, so the score stays high without heroics.</p>",
   top1:"They convert a one-time win into an inherited platform property via shift-left, policy-as-code, and secure-by-default paved roads, and they track posture as an owned, continuous SLI. They balance enforcement with developer experience so teams don't route around security — leadership-level, sustainable thinking grounded in their real +30% result.",
   followups:["How does policy-as-code in CI sustain the score?","How do you keep secure defaults from slowing teams down?"]}
 ],
 mistakes:["Long-lived IAM user access keys instead of roles/STS","Over-broad wildcard policies ('*' actions/resources)","Secrets in env vars, images, or repos","Putting security enforcement in prompts instead of IAM/code","Not enabling IMDSv2 (SSRF → stolen task creds)","Treating Security Hub score as a one-time project, not continuous"],
 bestPractices:["Prefer roles/temporary creds; eliminate static keys; SSO for humans","Permission boundaries + SCPs + policy templates for safe self-service","Customer-managed KMS, secret rotation, runtime fetch via workload identity","Treat LLM/observed content as untrusted; enforce in IAM, human-approve mutations","Detective stack: CloudTrail, Config, Security Hub, GuardDuty","Shift-left IaC scanning + policy-as-code in CI; redact PII from prompts/traces"],
 tradeoffs:["Least privilege (safe) vs setup effort/friction","Central security control vs team autonomy (solved by boundaries)","Customer-managed KMS (control) vs operational overhead","Strict guardrails vs velocity (paved road mitigates)","Human-approval for agent actions (safe) vs automation speed"]
},
{id:"cost-optimization",name:"Cost Optimization & FinOps",ix:18,group:"Infrastructure",
 concept:`<p>Cloud cost is an engineering problem, not a finance problem. Your AgentCore cost-optimization framework — agents recommending EC2/RDS rightsizing across multi-account — is the embodiment of this: continuous, automated, data-driven cost governance at scale.</p>
 <ul>
 <li><strong>Rightsizing</strong>: match instance size to actual utilization (CPU, memory, network). CloudWatch metrics → identify over-provisioned instances → recommend smaller type or generation upgrade (e.g. m5.xlarge → m5.large or m6i.large). For RDS, storage autoscaling and instance class tuning.</li>
 <li><strong>Compute purchasing</strong>: On-Demand (flexibility), Reserved Instances/Savings Plans (1–3yr commitment, 30-70% discount), Spot (70-90% off for interruptible). Mixing models requires workload classification.</li>
 <li><strong>Scaling efficiency</strong>: scale-to-zero for idle, auto-scaling to right-size dynamically. Karpenter for EKS chooses the cheapest instance type/family matching pod requirements.</li>
 <li><strong>AI-specific costs</strong>: LLM token spend (input+output), embedding calls, agent loop iterations, vector store queries. Prompt optimization (fewer tokens), caching, batching, and choosing the right model tier all move the needle.</li>
 <li><strong>FinOps practice</strong>: tagging for attribution, per-team budgets with alerts, chargeback/showback, cost as a CI gate for LLM features.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"What's the first thing you check when someone says the AWS bill is too high?",
   a:"<p>Start with <strong>Cost Explorer</strong> broken down by service, then account, then resource. Find the top 3 cost drivers — usually EC2/RDS compute, data transfer, or storage. Cross-reference with tagging: untagged resources are often orphaned waste. Then look at utilization: idle/underutilized EC2 is the classic low-hanging fruit. Only then reach for purchasing optimizations (RIs/SPs) — you want to commit to the <em>right</em> amount of compute, not just the current over-provisioned amount.</p>",
   top1:"They resist jumping straight to Reserved Instance recommendations (which lock you into whatever waste you have) and insist on rightsizing and removing waste first, then committing. They also check tagging hygiene because untagged = unaccountable = forgotten spend.",
   followups:["Why rightsize before buying Reserved Instances?","How does tagging governance help cost?"]},
  {level:"intermediate",q:"How did your AgentCore framework automate EC2/RDS rightsizing across accounts?",
   a:"<p>The agent loop: assume role into each account → pull CloudWatch metrics (CPU/memory/network, DB connections) over a lookback window → compare against utilization thresholds → generate rightsizing recommendations with projected savings and risk classification (low-risk: same family, smaller; higher-risk: generation upgrade). Recommendations surface in a central dashboard; higher-risk ones gate on human approval. Lambda tool calls make each step observable and auditable. Persistent memory tracks prior recommendations (avoid re-recommending things teams have explicitly declined) and accumulates cross-account savings estimates.</p>",
   top1:"They explain the full loop — observe, analyze, recommend, gate-on-risk — not just 'the agent looks at metrics.' They highlight risk classification (same-family safe vs generation upgrade needs validation) and the human-approval gate for non-trivial changes, plus persistent memory for context. This shows the engineering depth behind the resume claim.",
   followups:["How do you classify recommendation risk?","What's the role of persistent memory across runs?"]},
  {level:"advanced",q:"Cost vs performance tradeoff for an LLM feature — how do you optimize without degrading quality?",
   a:"<p>Measure first: emit cost-per-request and quality metrics side-by-side. Optimizations in order of safety: (1) <strong>prompt compression</strong> — fewer tokens, tighter system prompts, trim retrieved context to most relevant chunks (cost drops, quality often stable); (2) <strong>caching</strong> — Bedrock prompt caching or semantic cache for repeated/similar queries; (3) <strong>model routing</strong> — cheap model for simple/classification tasks, expensive for complex reasoning; (4) <strong>batching</strong> — Bedrock Batch Inference for async workloads. Validate each optimization with the offline eval suite to catch quality regressions. Set cost-per-request as a deploy gate.</p>",
   top1:"They run the eval gate after every cost optimization before shipping, treating quality as a constraint not a hope, and they do model routing analytically (measure what each tier actually achieves) rather than defaulting to the smallest model. Cost-per-request as a CI gate is the LLMOps maturity signal.",
   followups:["How does semantic caching work and what breaks it?","How do you implement model routing by query complexity?"]},
  {level:"scenario",q:"Agent token spend jumped 10x overnight. Diagnose and fix.",
   a:"<p>Trace first: pull LangSmith/Langfuse traces sorted by token count. Either (a) a few runs hit the max-step loop (runaway agent — retrieve more chunks per step than usual, or a tool returning huge payloads), or (b) a prompt/config change ballooned input tokens across all runs, or (c) new traffic pattern/user. Immediate: the per-run cost budget should have capped the worst offenders — if it didn't, add it now. Fix: truncate retrieved context, tighten max-steps, add cost anomaly alert on per-run spend. If it's a prompt change, roll back via config flag, add cost to the eval gate so this is caught in CI next time.</p>",
   top1:"They treat the missing cost budget as a system control failure alongside the agent logic bug, and they retrofit the CI cost gate so the regression can't ship again. They diagnose from traces (tool call payloads and token counts per step) rather than guessing — observable systems are debuggable systems.",
   followups:["How does the per-run cost budget cap runaway token spend?","How does cost become a CI gate for future deploys?"]},
  {level:"architecture",q:"Design a FinOps platform for a 200+ account org with cross-team cost attribution and automated optimization.",
   a:"<p>Pillars: (1) <strong>Tagging</strong> — enforced via SCP/Config rules, mandatory cost-center/team/env tags; Config flags untagged resources. (2) <strong>Attribution</strong> — Cost Explorer + CUR (Cost and Usage Report) to S3 → Athena/Quicksight for per-team dashboards; chargeback or showback to make cost visible. (3) <strong>Budgets + alerts</strong> — per-account and per-tag Budget Actions that auto-stop or notify on overage. (4) <strong>Automated rightsizing</strong> — your AgentCore pattern: centralized agent assumes roles, analyzes metrics, surfaces recommendations to team leads; approved recommendations trigger automation. (5) <strong>Purchasing optimization</strong> — Savings Plans coverage tracked centrally; Compute Savings Plans preferred (flexible) over RIs; recommendations from AWS Cost Optimizer. (6) <strong>AI costs</strong> — LLM spend tracked per-feature with token budgets and cost-per-request SLI.</p>",
   top1:"They connect the FinOps platform directly to the AgentCore framework's cross-account architecture, and they make AI costs (token spend, cost-per-request) first-class alongside infra costs. They sequence tagging → attribution → budgets → optimization, insisting you can't optimize what you can't attribute.",
   followups:["Why does tagging governance have to come before optimization programs?","How do Compute Savings Plans differ from EC2 Reserved Instances?"]},
  {level:"leadership",q:"An engineering team resists rightsizing recommendations because they're worried about performance. How do you resolve it?",
   a:"<p>Acknowledge the concern — over-provisioning is often a learned safety margin from past incidents. Offer: (1) <strong>data, not mandates</strong> — show them the utilization metrics (p99 CPU, not average), not just the recommendation; (2) <strong>risk classification</strong> — same-family downsizes are low risk, generation changes need load testing; (3) <strong>canary</strong> — rightsize one instance, run it for a week with monitoring, review together; (4) <strong>rollback plan</strong> — instant resize back if metrics worsen; (5) <strong>target sharing</strong> — make the savings visible and attribute them to the team's budget so they're incentivized. Don't mandate; earn trust with evidence and give them control.</p>",
   top1:"They lead with the team's legitimate concern (safety margin from past pain) rather than dismissing it, and they use data + canary + rollback to reduce risk before asking for commitment. Making savings visible to the team's own budget turns adversarial into collaborative — they're doing FinOps with the team, not to them.",
   followups:["How does a canary rightsize reduce perceived risk?","How does budget attribution change team behavior?"]},
 ],
 mistakes:["Buying Reserved Instances before rightsizing (committing to waste)","No tagging → no attribution → no accountability","Optimizing LLM cost without running eval gates (silently breaking quality)","No per-run cost budget on agent loops (surprise 100x spend)","Average CPU for rightsizing decisions (misleads; use p95/p99)","Treating cost as finance's problem, not engineering's"],
 bestPractices:["Rightsize + remove waste before committing (RIs/SPs)","Enforce tagging via SCP/Config; use CUR for attribution","Cost-per-request as a CI gate and runtime SLI for LLM features","Per-run cost budget + token alerts on agent loops","Karpenter / scale-to-zero for compute efficiency at the K8s layer","Savings Plans coverage tracking centrally; Compute SPs over RIs for flexibility"],
 tradeoffs:["RI/SP commitment (savings) vs flexibility/lock-in","Smaller instance (cost) vs performance safety margin (risk)","Aggressive prompt compression (cheaper) vs quality (test first)","Cheap model tier (cost) vs quality (measure before routing)","Automation (scale) vs human approval for higher-risk changes"]
},
{id:"scaling-ai",name:"Scaling AI Workloads",ix:19,group:"AI Platform",
 concept:`<p>Scaling AI workloads is harder than scaling stateless web services: inference is GPU-bound and latency-sensitive, embedding pipelines are batch-throughput-bound, agent loops have variable call-depth, and traffic can be bursty. The platform must scale each layer appropriately without over-provisioning at GPU prices.</p>
 <ul>
 <li><strong>Managed inference</strong>: Bedrock handles model hosting — you scale the <em>calling layer</em> (ECS/EKS services calling Bedrock) and manage Bedrock quotas (tokens-per-minute, requests-per-minute per model). Request throttling is your scaling problem.</li>
 <li><strong>Embedding / batch inference</strong>: high-throughput, latency-tolerant — use Bedrock Batch Inference, async queuing (SQS→Lambda or ECS), and parallelize shard processing.</li>
 <li><strong>Vector store scaling</strong>: OpenSearch Serverless auto-scales; managed clusters need capacity planning based on index size + query QPS.</li>
 <li><strong>Agent concurrency</strong>: each loop iteration can fan out tool calls; bound concurrency and cost-per-run; queue bursts rather than allow unbounded parallel agents.</li>
 <li><strong>Application layer</strong>: ECS Fargate or EKS with HPA/Karpenter for the RAG API / agent orchestration layer — stateless containers scale horizontally easily; the bottleneck shifts to Bedrock quotas and vector store throughput.</li>
 <li><strong>Caching</strong>: Bedrock prompt caching, semantic cache (Redis/ElastiCache) for repeated queries — drops Bedrock calls and improves p99.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"What are the main scaling bottlenecks in a RAG API built on Bedrock?",
   a:"<p>Three layers to check: (1) <strong>Bedrock quota</strong> — tokens-per-minute and requests-per-minute per model; throttles return 429s. (2) <strong>Vector store throughput</strong> — OpenSearch Serverless auto-scales, but managed clusters hit QPS limits. (3) <strong>Application layer</strong> (ECS/EKS) — usually easiest to scale horizontally. Adding application containers doesn't help if you're hitting a Bedrock quota; you need a quota increase or rate limiting/queuing in front of Bedrock. Always measure where the 429s or latency spikes occur first.</p>",
   top1:"They identify Bedrock quotas as the non-obvious bottleneck most teams miss — adding more app containers doesn't help against an API rate limit. They measure before scaling and know the fix (quota increase + exponential backoff / queuing) not just the symptom.",
   followups:["How do you handle Bedrock 429 throttles gracefully?","What does OpenSearch Serverless auto-scale, and what doesn't it auto-scale?"]},
  {level:"intermediate",q:"How do you scale the embedding ingestion pipeline for 50K+ documents without blowing the Bedrock quota?",
   a:"<p>Batch and parallelize with a throttle: shard the document set, emit each shard as an SQS message, Lambda workers (or ECS tasks) consume and call Bedrock Titan Embeddings — but with a <strong>rate limiter</strong> against the TPM/RPM quota (token bucket or leaky bucket). Use Bedrock Batch Inference for bulk async jobs which has higher limits and lower cost than on-demand API calls. Cache embeddings for documents that haven't changed. Checkpoint progress so a failure is resumable, not a restart. Track ingestion latency and Bedrock quota utilization as SLIs.</p>",
   top1:"They reach for Bedrock Batch Inference for bulk ingestion (correct — higher limits, lower cost) and design idempotent, resumable processing rather than a one-shot batch that fails at 40K docs. They wire quota utilization as a metric, showing operational discipline on the ingestion pipeline, not just the query path.",
   followups:["Why does Batch Inference have better limits than on-demand?","How do you make ingestion resumable on failure?"]},
  {level:"advanced",q:"Latency spikes at p99 under load even though p50 is fine. Walk through the diagnosis.",
   a:"<p>p50/p99 divergence signals high-tail latency — something occasional is slow, not a general slowdown. Check: (1) Bedrock calls: are p99 Bedrock latencies spiking (cold quota, model congestion)? (2) Vector store: HNSW under memory pressure causes tail latency; check OpenSearch node CPU/memory. (3) Context length spikes: some requests retrieving many chunks → long prompts → high Bedrock latency. (4) Garbage collection / noisy neighbor in the app containers. (5) Cold starts (ECS/EKS scheduling delays). Fix in order: add Bedrock caching for repeated prompts, bound max-chunks per retrieval, right-size the vector store, size containers for steady state not bursts (Karpenter provisioning latency on cold calls).</p>",
   top1:"They distinguish p99 (tail) from p50 (typical) and enumerate causes methodically — Bedrock quotas, vector store memory pressure, prompt length distribution, cold starts — rather than guessing. They know HNSW tail latency under memory pressure is real and connect max-chunks as a latency control knob, not just a quality one.",
   followups:["How does bounding max retrieved chunks reduce p99 latency?","How does HNSW behave under memory pressure?"]},
  {level:"scenario",q:"Traffic suddenly 10x — your RAG API is returning 429s. Walk through the immediate response.",
   a:"<p>Immediate: confirm the 429s are Bedrock throttles (not app errors) via CloudWatch Bedrock metrics. Activate queuing / backpressure: add SQS in front of Bedrock calls with exponential backoff + jitter so clients aren't busy-waiting. If you have a semantic cache, check the hit rate — burst traffic is often repetitive queries that cache would handle. Contact AWS to request emergency quota increase (quota support ticket). Scale the app layer too (ECS desired count up) but that only helps if the bottleneck isn't just Bedrock. Post-burst: rightsize quotas to match traffic profile, add a quota-utilization alarm to page early, and implement semantic caching proactively.</p>",
   top1:"They know the difference between 'add more containers' (doesn't help Bedrock throttling) and the actual fixes: queuing/backpressure + cache + quota increase. They add exponential backoff + jitter to prevent thundering-herd retry storms and file the quota increase in parallel with mitigation — multi-track incident response.",
   followups:["Why does adding more app containers not help Bedrock throttling?","How does exponential backoff with jitter prevent retry storms?"]},
  {level:"architecture",q:"Design a multi-tenant RAG platform that scales from 10 to 10,000 concurrent users.",
   a:"<p>Layers: <strong>Edge + cache</strong>: CloudFront + API Gateway, semantic cache (ElastiCache) per tenant reducing Bedrock hits. <strong>Orchestration</strong>: EKS + HPA scaling on Bedrock-quota-utilization and request queue depth (not just CPU). <strong>Bedrock</strong>: multiple AWS accounts for higher aggregate quotas; routing layer distributes across accounts. <strong>Vector store</strong>: OpenSearch Serverless per tenant (isolation) or shared with strict namespace/metadata filtering + row-level security. <strong>Async paths</strong>: ingestion and batch summarization go through SQS → ECS workers separate from the query path. <strong>Observability</strong>: per-tenant cost, latency, and quota utilization. Tenant isolation: separate OpenSearch collections or strict namespace enforcement; never let one tenant's filter miss leak data to another.</p>",
   top1:"They use Bedrock quota across accounts to get linear quota scaling (the key insight at very high scale) and make the HPA signal Bedrock-quota-utilization rather than CPU — scaling to what actually matters. They make tenant isolation non-negotiable (data leak is a financial-services disaster) and keep the ingestion path async to protect the query path SLO.",
   followups:["How do multiple accounts give you more aggregate Bedrock quota?","Why scale on Bedrock quota utilization instead of CPU?"]},
 ],
 mistakes:["Scaling app containers to fix Bedrock throttling (wrong layer)","No rate limiter/backpressure in front of Bedrock calls","Synchronous embedding ingestion on the query path","Sizing vector store memory below HNSW index size → tail latency","No semantic cache → every burst causes full Bedrock throughput","No per-tenant cost/quota tracking in a multi-tenant platform"],
 bestPractices:["Measure the actual bottleneck (Bedrock quota? vector store? app?) before scaling","Use SQS + backpressure for Bedrock calls; exponential backoff + jitter","Bedrock Batch Inference for bulk/async workloads","Semantic cache (ElastiCache) for repeated queries","Scale on Bedrock-quota-utilization and queue depth, not just CPU","Multi-account for aggregate quota growth at scale"],
 tradeoffs:["Semantic cache (latency+cost win) vs stale responses","Multiple accounts for quota vs operational overhead","OpenSearch Serverless (auto-scale) vs managed clusters (control, cost)","Async ingestion (throughput) vs real-time freshness","Strict tenant isolation (safety) vs shared resource efficiency"]
},
{id:"incident-handling",name:"Production Incident Handling",ix:20,group:"SRE",
 concept:`<p>Incident response is where your platform engineering credibility is tested. A structured response under pressure—detect, contain, mitigate, resolve, learn—separates senior engineers from everyone else. In an AI/ML platform, incidents include model degradation and agentic runaway, not just infra outages.</p>
 <ul>
 <li><strong>DETECT</strong>: Alerts fire on SLO/SLI violations (error rate, latency p99, availability), not just infra metrics. Your CloudWatch + Grafana/Prometheus stack surfaces real user impact fast.</li>
 <li><strong>COMMUNICATE</strong>: Declare incident severity, start the war-room/Slack channel, assign IC (Incident Commander), update a status page. Communication is as important as the fix.</li>
 <li><strong>CONTAIN & MITIGATE</strong>: Restore service first, root cause second. Roll back a bad deploy, kill a runaway agent, scale up, failover — whatever stops the bleeding. Mitigation ≠ fix.</li>
 <li><strong>RESOLVE</strong>: Implement the real fix with confidence; validate via metrics, not feel.</li>
 <li><strong>POSTMORTEM</strong>: Blameless, time-lined, 5-why root cause, action items with owners and due dates. Without this step the incident was wasted learning.</li>
 <li><strong>AI-specific patterns</strong>: LLM quality degradation (silent — needs eval monitoring), model API deprecation, agent runaway (cost + infra impact), prompt injection incidents.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"What's the order of operations in an incident: fix first or find root cause first?",
   a:"<p><strong>Mitigate first, root cause second.</strong> Your first obligation is to restore service for users. This might mean rolling back a deploy, reverting a config change, restarting containers, or failing over to a healthy region — often before you know exactly why. Simultaneously, preserve evidence: snapshots, logs, don't delete the broken thing. Root cause investigation happens once impact is contained. The postmortem is where the deep analysis goes, with full calmness and all the data.</p>",
   top1:"They articulate the 'mitigation vs fix' distinction clearly — a rollback is a mitigation, not a root cause fix — and they flag evidence preservation as something to do <em>during</em> mitigation, not after, since a rushed fix often destroys forensic evidence. Discipline under pressure is what they demonstrate.",
   followups:["What's the difference between mitigation and a fix?","How do you preserve forensic evidence while moving fast to restore?"]},
  {level:"intermediate",q:"Walk me through how you'd run a war-room for a P1 on your RAG pipeline.",
   a:"<p>Declare P1, open a dedicated Slack channel, assign IC (who drives the process) and scribe (who writes the timeline). IC does NOT fix — they coordinate. Parallel: one person pulls CloudWatch/LangSmith — is it Bedrock errors, vector store failures, or app crashes? Another checks recent deploys/changes (change = prime suspect). Another monitors user impact and updates the status page. IC gates decisions: roll back? scale? failover? Every action is logged with timestamp in the channel. Once mitigated, IC hands off to a smaller group for root cause and schedules the postmortem. No blaming, full timeline.</p>",
   top1:"They separate the IC's job (process, comms, decisions) from the technical responders — the IC not fixing is the non-obvious key to a well-run P1. They enumerate parallel tracks and put status page updates as a first-class action, showing they understand user trust is part of incident response, not an afterthought.",
   followups:["Why shouldn't the most technical person also be the IC?","What goes on the status page during a P1?"]},
  {level:"advanced",q:"How does incident response differ when the failure is 'LLM quality degraded silently' versus 'service is down'?",
   a:"<p>The hard part of LLM quality degradation is <strong>detection</strong> — there's no 500 error. You need: (1) <strong>online eval metrics</strong> — thumbs-down rates, LLM-as-judge quality scores, guardrail hit rates on prod traces (LangSmith/Langfuse → CloudWatch alarm); (2) <strong>A/B or canary baselines</strong> to compare against. Once detected, triage: did a prompt change ship? model version update? retrieval index change? token budget reduction? Each is a rollback target. Mitigation is a config rollback (prompt/model); fix is an eval gate that would have caught it before it shipped. The postmortem action item is: add this failure mode to the eval suite.</p>",
   top1:"They reframe silent quality degradation as a detection problem solved by online evals in the observability pipeline, not manual monitoring. They have a specific rollback for each probable cause (prompt, model, index), and their postmortem output is a new eval test case — closing the loop so the same failure can't silently ship again.",
   followups:["What online metrics would page you on quality degradation?","How do you prevent the same quality regression from shipping again?"]},
  {level:"scenario",q:"3 AM: CloudWatch alarm fires — your RAG API error rate is 40%. Walk through the response.",
   a:"<p>Acknowledge alert, open incident channel, declare severity. Pull CloudWatch: are errors 4xx (client), 5xx (app), or Bedrock errors? App logs for stack traces. Recent deploys in the last 2-4 hours (check your CI/CD deploy log). If a recent deploy — roll back immediately, don't debug first. If no deploy: check Bedrock service health (AWS Health Dashboard), OpenSearch cluster health. If Bedrock is degraded, activate queuing/graceful degradation. Once error rate recovers, add a 'do not page until root-caused' wait — confirm recovery is stable. Write a timeline in the incident channel. 7 AM postmortem planning. The key: rollback is almost always faster than debugging at 3 AM.</p>",
   top1:"They check the deploy log first because a recent change is the most likely cause, and they execute rollback without debugging (3 AM is not root cause time). They check AWS Health Dashboard for Bedrock — a dependency outage, not their code. They plan the postmortem for when people are fresh, not at 3 AM.",
   followups:["Why is rollback often better than debugging a 3 AM incident?","How do you check if Bedrock itself is the failure?"]},
  {level:"architecture",q:"Design an on-call and incident-response system for an AI platform team of 12.",
   a:"<p>On-call rota via PagerDuty/OpsGenie: primary + secondary per week, fair rotation with AHs, on-call runbooks linked from each alarm. Alert routing: severity tiers (P1 pages immediately, P2 emails, P3 tickets) tied to SLO burn rates not arbitrary thresholds. Runbooks for every recurring alert — if there's no runbook, that's a toil action item. War-room: Slack channels by incident, IC role rotation (everyone should lead P1s eventually). AI-specific: alerts for quality degradation (LangSmith metrics), agent cost spikes, Bedrock quota (warn at 70%, page at 90%). Postmortem culture: every P1/P2 gets one, blameless, action items tracked in Jira with owners and SLA. Review toil monthly, eliminate recurring pages.</p>",
   top1:"They tie paging thresholds to SLO burn rates (not arbitrary numbers), make runbooks a requirement (page with no runbook = toil), and include AI-specific alerts most teams miss (quality degradation, Bedrock quota, agent cost). They build postmortem culture systemically — not just when it hurts — and track toil to eliminate it.",
   followups:["How does SLO burn-rate alerting improve on threshold alerting?","What makes a runbook actually useful at 3 AM?"]},
 ],
 mistakes:["Doing root-cause analysis during active P1 instead of mitigating first","No IC role — everyone heroically fixes in parallel, coordination collapses","Not preserving logs/snapshots before rolling back","Blame-y postmortems that create blame culture and hide future incidents","No online quality monitoring for LLM features — silent degradation","Alerts on infra metrics instead of user-impact SLIs (pages for noise, misses real impact)"],
 bestPractices:["Mitigate first (rollback), root cause second","Separate IC (process/comms) from technical responders","Blameless postmortem every P1/P2 with owners and due dates","Alert on SLO burn rates, not arbitrary thresholds","Add quality/eval monitoring for LLM features (not just error rate)","Runbook for every recurring alert; no runbook = toil action item"],
 tradeoffs:["Rollback speed vs understanding root cause","IC role (coordination) vs technical depth in the room","Alert sensitivity (catch everything) vs alert fatigue (miss the real thing)","Postmortem depth vs time cost","Automated mitigation vs human judgment for edge cases"]
},
{id:"sre",name:"SRE Concepts",ix:21,group:"SRE",
 concept:`<p>Site Reliability Engineering turns reliability from a vague goal into a <strong>quantitative, engineered property</strong>. The core toolkit: SLIs, SLOs, error budgets, toil reduction, and alert design. As a platform engineer you apply these across your RAG pipelines, agent frameworks, and infra, and you help other teams adopt them.</p>
 <ul>
 <li><strong>SLI</strong> (Service Level Indicator): a specific measurement of service behavior from the user's perspective — e.g. request success rate, p99 latency, retrieval quality score.</li>
 <li><strong>SLO</strong> (Service Level Objective): the target — "99.5% of RAG requests succeed, p99 latency < 2s, measured over a 30-day rolling window."</li>
 <li><strong>Error budget</strong>: 100% - SLO = what you're allowed to spend on risk/change. 99.5% SLO → 0.5% budget. Deploy when budget is healthy; slow down/freeze when it burns.</li>
 <li><strong>SLA</strong>: the external contract; SLO should be tighter than SLA (internal target gives buffer before breach).</li>
 <li><strong>Toil</strong>: manual, automatable, repetitive operational work that doesn't scale. Identify, measure (% of time), and eliminate. Each recurring manual task is a bug in your platform.</li>
 <li><strong>Burn rate alerting</strong>: alert on how fast the error budget is being consumed relative to the budget window — fast burn in 1h pages P1; slow burn over 6h pages P2. Far more signal than raw threshold alerts.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"What's the difference between SLI, SLO, and SLA?",
   a:"<p><strong>SLI</strong>: the measurement — a ratio or metric you actually collect, like 'fraction of requests returning 2xx within 500ms.' <strong>SLO</strong>: your target for that SLI — '99.5% of requests meet the SLI threshold, over a rolling 30 days.' <strong>SLA</strong>: the external contract with customers — '99% uptime or you get credits.' SLO should be tighter than SLA so you have a buffer to detect and correct before you breach the SLA. The SLI is the raw data; the SLO is the goal; the SLA is the promise.</p>",
   top1:"They explain why SLO > SLA (tighter target = buffer to react) and note that a good SLI is user-facing, not an infra metric — 'CPU < 80%' is not an SLI if it doesn't correlate to user experience. They'd pick 'request success rate' or 'latency p99' over 'disk utilization'.",
   followups:["Why should SLO be tighter than SLA?","What makes a bad SLI? Give an example."]},
  {level:"intermediate",q:"How do you set SLOs for an LLM RAG service that has latency AND quality dimensions?",
   a:"<p>Model each user-facing dimension as a separate SLI/SLO: (1) <strong>Availability SLO</strong>: % of requests returning non-error responses — e.g. 99.5% over 30 days. (2) <strong>Latency SLO</strong>: % of requests completing under a threshold — e.g. 95% under 2s, 99% under 5s (your sub-2s p95 target). (3) <strong>Quality SLO</strong>: % of responses rated 'good' by the LLM-judge or thumbs-up — harder to set initially; baseline from prod data then set a target. Quality SLOs are aspirational first and tighten as the platform matures. Pick a small number of meaningful SLOs (2-4), not one per metric.</p>",
   top1:"They add a quality SLI beyond uptime/latency — specific to LLM services and often missing from teams new to AI platforms. They know quality SLOs start as baselines and tighten over time, and they connect it directly to the p95 latency target from their own RAG pipeline. Showing LLMOps SLO thinking is a differentiator.",
   followups:["How do you operationalize a quality SLO in CloudWatch/Grafana?","Why only 2-4 SLOs rather than many?"]},
  {level:"advanced",q:"Design burn-rate alerting for your RAG pipeline's latency SLO.",
   a:"<p>Burn rate = actual budget spend / expected budget spend for the period. For a 30-day window: if you burn the budget in 1 hour, burn rate = 720x. Use a two-tiered approach: (1) <strong>Fast burn (P1)</strong>: 1h burn rate > 14x (exhausts 5% of budget in an hour) AND 5min window confirms → page immediately. (2) <strong>Slow burn (P2)</strong>: 6h burn rate > 3x AND 1h confirms → notify. This gives fast response to severe incidents without pages for transient blips. Implement in CloudWatch with multiple windows or in Prometheus with recording rules. Connect it to your on-call runbook: fast-burn page always gets a human response within 15 min.</p>",
   top1:"They give the specific burn rate numbers (14x for fast, 3x for slow) with the multi-window confirmation (to avoid flapping) and tie it to on-call response SLA. They know burn-rate alerting by name and design, not just the concept, and they connect it to CloudWatch/Prometheus implementation — operational readiness.",
   followups:["Why two windows (1h + 5min) for fast burn detection?","What's the problem with simple error-rate thresholds vs burn rate?"]},
  {level:"scenario",q:"Your team is spending 40% of sprint time on operational toil. How do you fix it?",
   a:"<p>Measure and categorize first: track every toil item for 2 weeks (on-call log, tickets, manual tasks). Group into: recurring alerts with manual remediation, manual deployments, manual access requests, manual scaling actions. Prioritize by frequency × time cost. Then eliminate in order: (1) automate the runbook action (Lambda/SSM automation triggered by alarm); (2) fix the root cause (why does this alert fire repeatedly? → fix the system); (3) if it can't be automated, document it to reduce cost-per-occurrence. Set a team SLO on toil: <20% of eng time. Celebrate when automation eliminates a recurring page — it's an engineering win, not a chore.",
   top1:"They measure toil before fixing it (otherwise you automate the wrong things) and address both layers: automate the response AND fix the root cause. They set a toil SLO to make it a continuous metric, not a one-time cleanup, and they frame toil elimination as an engineering accomplishment to build team culture around reliability.",
   followups:["How do you prioritize which toil to eliminate first?","What's the difference between automating a runbook and fixing the root cause?"]},
  {level:"architecture",q:"Design reliability practices for an AI platform team owning 20+ services.",
   a:"<p>Standardize via platform: (1) <strong>SLO-by-default</strong> — every new service gets a template SLO (availability + latency) from the paved road; quality SLO for LLM services. (2) <strong>Error budget dashboards</strong> — visible to everyone; gates release velocity when low. (3) <strong>Burn-rate alerting</strong> standard in every service's Terraform module. (4) <strong>Postmortem system</strong> — every P1/P2 gets one, stored in a wiki, reviewed monthly. (5) <strong>Toil tracking</strong> — monthly review; toil-reduction OKR on the team. (6) <strong>Chaos engineering</strong> (gradual): fault injection in lower envs, chaos experiments gated by error budget. For AI: quality SLIs from LangSmith/Langfuse fed into the standard dashboard. The SRE practice is software — ship it as a platform feature.</p>",
   top1:"They make SRE practices infrastructure — deployed, not documented — so every service inherits them. They gate chaos engineering on error budget health (you don't run chaos when you're burning) and include AI-specific quality SLIs in the standard stack. 'The SRE practice is software' is the platform-engineering philosophy that separates architects from advisors.",
   followups:["How does error budget gate release velocity?","How do you include quality SLIs in the standard reliability stack?"]},
 ],
 mistakes:["Alerting on infra metrics (CPU, disk) instead of user-facing SLIs","Setting a single 100% SLO (no error budget, can't take risk)","Treating SLA = SLO (no buffer)","No quality SLI for LLM services — silent degradation goes undetected","Toil tracked nowhere — it grows invisibly","Postmortem only for the most severe incidents, losing learning from P2s"],
 bestPractices:["User-facing SLIs (not infra proxies)","SLO tighter than SLA; 2-4 meaningful SLOs per service","Burn-rate alerting with two windows (fast + slow burn)","Quality SLI/SLO for LLM services (thumbs-down, LLM-judge score)","Measure toil; team SLO on eng time spent on toil","Blameless postmortem every P1/P2; action items with owners"],
 tradeoffs:["Tight SLO (reliable) vs less error budget for innovation/risk","More SLIs (comprehensive) vs operational overhead","Burn-rate (accurate) vs threshold alerting (simpler)","Strict error budget gate (reliable) vs slowing velocity","Automation investment (eliminates toil) vs short-term sprint cost"]
},
{id:"platform-eng",name:"Platform Engineering Best Practices",ix:22,group:"SRE",
 concept:`<p>Platform engineering is the discipline of building internal developer platforms (IDPs) that give product teams paved roads — golden paths, self-service abstractions, and standardized tooling — so they move fast without reinventing or mis-securing the wheel. Your role at S&P and AHEAD is fundamentally platform engineering: CI/CD pipelines, Terraform modules, observability stack, the AI platform itself.</p>
 <ul>
 <li><strong>Internal Developer Platform</strong>: the sum of tooling, services, and workflows the platform team provides. Goal: reduce cognitive load on product teams while enforcing organizational standards.</li>
 <li><strong>Golden path / paved road</strong>: the recommended, pre-built, well-maintained way to do the common things — CI/CD template, service template, Terraform module library, agent runtime. Teams can go off-path, but the path is so good they rarely need to.</li>
 <li><strong>Team Topologies</strong>: stream-aligned teams (build features) enabled by a platform team (reduces cognitive load). The platform team has an internal-product mindset: their customers are developers.</li>
 <li><strong>Product mindset</strong>: treat the platform as a product — developer experience is UX, adoption metrics matter, feedback loops are features, and a platform nobody uses failed.</li>
 <li><strong>Standardization vs autonomy</strong>: too much standardization kills teams' ability to solve problems; too little means every team solves the same problems differently. Paved roads set the floor, not the ceiling.</li>
 </ul>`,
 questions:[
  {level:"beginner",q:"What's the platform team's job, and how is it different from a shared-services or ops team?",
   a:"<p>A <strong>platform team</strong> builds self-service, product-quality tools and paved roads that <em>enable</em> product teams — they're internal product developers with developers as customers. A traditional <strong>ops/shared-services team</strong> is a gatekeeper: teams request things, ops does the work, a bottleneck forms. The platform team's success metric is developer adoption and velocity, not tickets closed. They deliver platforms, not services — meaning teams can self-serve without a ticket or a human approval for routine tasks.</p>",
   top1:"They articulate the fundamental shift: bottleneck → enabler, gatekeeper → paved-road builder. They mention developer experience (DX) as the product metric and note that a platform nobody uses is a failure — adoption is the north star. This framing shows they understand platform engineering as a discipline, not just infrastructure.",
   followups:["How do you measure whether the platform is actually enabling teams?","What makes a paved road that teams actually use?"]},
  {level:"intermediate",q:"You built 20+ Terraform modules. What makes a good internal Terraform module that teams actually adopt?",
   a:"<p>A good module: (1) <strong>solves a real team problem</strong> — built from observed pain, not guess. (2) <strong>sensible defaults</strong> covering 80% of cases; inputs only for what needs to vary; opinionated on security/compliance. (3) <strong>well-documented</strong> — example usage in the README, what variables do, what's created, what's not. (4) <strong>versioned with a changelog</strong> — teams pin a version; breaking changes are major semver. (5) <strong>tested</strong> — Terratest or plan-time checks so modules don't break silently on provider updates. (6) <strong>maintained</strong> — a module nobody owns rots. The best signal: teams choose the module over rolling their own.</p>",
   top1:"They emphasize 'opinionated on security/compliance by default' — the module's defaults should be the secure path, so teams inherit best practices by using it. They own versioning + changelogs as a reliability contract for module consumers, and they measure adoption as the real success signal, echoing platform-as-product thinking.",
   followups:["How do you handle breaking changes in a module used by 10 teams?","Why opinionated defaults rather than maximum flexibility?"]},
  {level:"advanced",q:"How do you prevent platform sprawl where every team is using a different version of everything?",
   a:"<p>Manage it at multiple levels: (1) <strong>Deprecation policy</strong> — old module versions get a sunset window, auto-fail in CI after it, forcing upgrades. (2) <strong>Golden path enforcement</strong> — CI checks pin to allowed module/image versions; drift is caught at build time. (3) <strong>Dependency dashboards</strong> — Renovate/Dependabot with org-wide visibility of who's on which version. (4) <strong>Platform roadmap transparency</strong> — teams know what's coming, can plan upgrades. (5) <strong>Migration tooling</strong> — automated codemods and runbooks for version upgrades reduce the pain of staying current. The goal: keeping current is easier than staying behind, so teams self-update.</p>",
   top1:"They use CI enforcement rather than appeals, automated dependency tracking rather than spreadsheets, and invest in migration tooling to make upgrading easy rather than just mandating it. They balance enforcement (module version gates) with autonomy (teams pick their upgrade timing within the sunset window).",
   followups:["How do you handle a team that can't upgrade by the deprecation deadline?","Why is migration tooling as important as the module itself?"]},
  {level:"scenario",q:"You've launched a new CI/CD paved road but only 2 of 15 teams are using it. How do you drive adoption?",
   a:"<p>First: diagnose. Talk to non-adopters — is it friction (template too hard to use, missing features), lack of awareness, or distrust ('another thing to maintain')? Don't assume. Then: (1) <strong>make it demonstrably better</strong> — benchmark: their pipeline vs yours in setup time, security posture, and error rate. (2) <strong>remove the friction</strong> — migration script, office hours, embed in a team's sprint to demo it live. (3) <strong>find champions</strong> — teams that adopted it can show peers; peer credibility beats platform-team marketing. (4) <strong>make it the path of least resistance</strong> — new services auto-start with the template. (5) <strong>gentle compliance path</strong> — new projects must use it; existing can migrate on their schedule with a sunset. Mandate without value is theater; demonstrate value first.</p>",
   top1:"They diagnose before prescribing — adoption failures are usually a DX or trust problem, not a communication problem. They use peer champions, embed the team as a service, and make new projects auto-adopt so the percentage grows even without migrating old ones. They reserve mandates as a last step after demonstrating value.",
   followups:["How do peer champions differ from platform-team advocacy?","Why make new projects auto-adopt before migrating old ones?"]},
  {level:"architecture",q:"Design the internal developer platform for an ML/AI engineering org of 50 engineers.",
   a:"<p>Pillars: (1) <strong>Service templates</strong>: repo scaffolding (RAG service, agent service, ML inference) with CI/CD, Docker, observability, and SLOs wired by default. (2) <strong>Terraform module library</strong>: ECS/EKS, Bedrock-connected services, OpenSearch, cross-account IAM roles — versioned, documented, tested. (3) <strong>CI/CD paved road</strong>: GitHub Actions + standard eval gates for AI features, security scans, cost gates. (4) <strong>Observability stack</strong>: LangSmith/Langfuse + CloudWatch + Grafana/Prometheus, per-service dashboards auto-generated. (5) <strong>Self-service</strong>: account vending, secret provisioning, environment promotion via PR, no ticket to deploy. (6) <strong>Agent runtime</strong>: standardized Bedrock agent framework with guardrails, cost controls, tracing out of box. (7) <strong>Developer portal</strong>: Backstage (or similar) for service catalog, docs, runbooks. Measure: time-to-production for a new service, adoption %, support tickets per team.</p>",
   top1:"They make every capability self-service (no ticket to deploy) and measure the platform on developer outcomes (time-to-production) not platform-team output. They include an AI-specific agent runtime and LLMOps observability as first-class IDP components — not bolt-ons — showing they're building for an AI-native engineering org.",
   followups:["What metrics prove the IDP is working?","How does the AI agent runtime fit into the standard IDP?"]},
 ],
 mistakes:["Building the platform nobody asked for (build from pain, not ideas)","No versioning/deprecation → modules rot, breaking unknown teams","Gatekeeping instead of self-service — platform team becomes a bottleneck","Mandating adoption before demonstrating value → resentment and workarounds","No developer feedback loop → platform drifts from what teams need","Measuring the platform team on tickets closed, not developer velocity"],
 bestPractices:["Build from observed pain; treat developers as customers","Opinionated secure defaults; self-service automation","Version everything; publish changelogs; sunset with automation tooling","Measure adoption and developer velocity (time-to-production) as north stars","Invest in migration tooling so upgrading is easier than staying behind","Platform-team embeds/office hours → trust and feedback"],
 tradeoffs:["Standardization (consistency, safety) vs developer autonomy","Opinionated defaults (security) vs flexibility for edge cases","Enforcement (compliance) vs developer goodwill","Investment in migration tooling vs accepting version drift","Self-service (velocity) vs gated approvals (control)"]
},
{id:"system-design",name:"System Design Rounds",ix:23,group:"SRE",
 concept:`<p>System design rounds test whether you can translate ambiguous requirements into a concrete, scalable, and operable architecture. For an AI Platform Engineer, expect Bedrock-RAG-agent or MLOps pipeline designs alongside classic distributed systems. Your method matters as much as your answer.</p>
 <ul>
 <li><strong>Framework</strong>: (1) Clarify requirements — scale, latency, consistency, cost. (2) Estimate scale — users, requests/sec, data size, storage. (3) High-level design — components and data flow. (4) Deep dive — where the interviewer points. (5) Tradeoffs and alternatives.</li>
 <li><strong>For AI systems, always cover</strong>: the data plane (ingestion, embedding, indexing), the query plane (retrieval, LLM call, response), the orchestration layer, and the observability/eval layer. Don't forget guardrails, cost controls, and how you'd validate quality.</li>
 <li><strong>Draw while talking</strong>: boxes and arrows externalise thinking; interviewers can redirect you before you go too deep on the wrong area.</li>
 <li><strong>Trade-off first</strong>: every design decision is a tradeoff — state it explicitly. "I'd use OpenSearch Serverless here because… though the alternative is…"</li>
 </ul>`,
 questions:[
  {level:"architecture",q:"Design a production RAG system on AWS for a financial-services firm's internal knowledge base.",
   a:"<p><strong>Clarify</strong>: ~50K documents, 1K concurrent users, sub-2s p95, strict data residency (US regions only), role-based access control. <br><strong>Ingestion</strong>: S3 → Lambda trigger → chunk + embed (Bedrock Titan Embeddings via SQS worker with rate-limiter) → store vectors in OpenSearch Serverless with document metadata (team, sensitivity). <br><strong>Query path</strong>: API Gateway → ECS Fargate service → semantic cache (ElastiCache) check → OpenSearch hybrid kNN+BM25 with metadata filter (user's team/role) → Bedrock Claude for generation → LangSmith trace. <br><strong>Guardrails</strong>: Bedrock Guardrails for PII/hallucination, per-chunk ACL in OpenSearch metadata, audit CloudTrail for every retrieval. <br><strong>Observability</strong>: LangSmith + CloudWatch — availability/latency/quality SLOs, cost-per-request tracking. <br><strong>Scaling</strong>: ECS HPA on Bedrock-quota-utilization; OpenSearch Serverless auto-scales; quotas monitored. <br><strong>Rollback</strong>: prompt/model pinned as config — rollback is a config deploy.</p>",
   top1:"They immediately address financial-services-specific requirements (data residency, RBAC, auditability) that a generic answer misses, and they design the ACL enforcement at the retrieval layer (OpenSearch metadata filter) so one tenant can never see another's data — not in the prompt. They include cost-per-request as a first-class SLI and make rollback a config flip.",
   followups:["How do you enforce RBAC at the retrieval layer?","How does prompt caching help under a 1K concurrent-user burst?"]},
  {level:"architecture",q:"Design a multi-account cost-optimization agent platform (your AgentCore project).",
   a:"<p><strong>Control plane account</strong>: Agent orchestrator (ECS/Lambda) with Bedrock (Claude) as the planner + Bedrock Guardrails. Tool definitions: <code>get_cloudwatch_metrics(account,resource)</code>, <code>describe_ec2(account)</code>, <code>describe_rds(account)</code>, <code>propose_rightsize(account,resource,new_type)</code>. Each tool = Lambda that assumes a least-privilege role in the target account. <br><strong>Per-account role</strong>: deployed via Terraform across all member accounts, trusted by platform account. <br><strong>Persistent memory</strong>: DynamoDB table keyed by account/resource stores prior recommendations and their status (accepted/declined/pending). <br><strong>Human-approval flow</strong>: recommendations > a risk threshold go to SNS → Slack/email; human approves/rejects via a signed URL → Lambda records decision in DDB and (if approved) calls apply tool. <br><strong>Observability</strong>: LangSmith per-run traces, CloudWatch for cost-per-run, cost-savings-realized metric. <br><strong>Guardrails</strong>: Bedrock Guardrails block destructive actions; SCP backstops IAM; max-step/cost budget on every run.</p>",
   top1:"They design the human-approval path first (before automation) because it's the safety critical path for a financial-services infra-mutating system. They make the persistent memory a real DynamoDB schema (not a hand-wave), and they wire cost-savings-realized as an actual metric — the business outcome, not just a capability. The SCP-backstops-IAM defense-in-depth is the architectural fingerprint of security maturity.",
   followups:["Why is the apply path separate from the recommendation path?","How does DynamoDB persistent memory prevent re-recommending declined changes?"]},
  {level:"architecture",q:"Design a CI/CD and MLOps pipeline for a team shipping LLM features weekly.",
   a:"<p><strong>Source</strong>: GitHub mono/multirepo — prompts, model config, retrieval config, and app code all version-controlled, PRs reviewed. <br><strong>CI</strong>: GitHub Actions — lint, unit test, IaC scan (tfsec/Checkov), offline eval suite (golden-set regression + LLM-judge + cost/latency budget), cost estimate (Infracost). PR is blocked on eval regression. <br><strong>Artifact</strong>: Docker image to ECR, prompt/config versioned as a build artifact. <br><strong>CD</strong>: ECS/EKS deploy via ArgoCD — dev auto-deploys, stage requires approval + integration evals, prod requires stage green + manual gate for major changes. <br><strong>Progressive delivery</strong>: canary/shadow for prompt or model changes; feature flags (LaunchDarkly) for user-facing rollout. <br><strong>Observability</strong>: LangSmith + CloudWatch — quality/latency/cost SLOs, production traces feed back into the eval dataset. <br><strong>Rollback</strong>: ArgoCD one-click rollback to previous artifact; model/prompt is config, rolled back independently of code.</p>",
   top1:"They put the eval gate in CI (blocking, not advisory) and make rollback two independent levers (code via ArgoCD, prompt/model via config) — so you can roll back a prompt without a code deploy. The prod-trace-to-eval feedback loop is their LLMOps flywheel: the pipeline gets better with every deploy.",
   followups:["Why decouple prompt rollback from code rollback?","How does the eval dataset grow over time?"]},
  {level:"scenario",q:"Whiteboard: design a real-time fraud detection system for a fintech using ML inference. What changes if inference goes from 100ms SLA to 10ms?",
