<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Python Coding Round — Abhay Lunkad</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0c10;
  --bg2:#0f1218;
  --panel:#151a22;
  --panel2:#1c2330;
  --line:#1e2535;
  --line2:#2a3347;
  --ink:#e2e8f0;
  --muted:#7a8a9e;
  --faint:#3d4f68;
  --green:#3dffa0;
  --green-d:rgba(61,255,160,0.12);
  --cyan:#38d9f5;
  --cyan-d:rgba(56,217,245,0.12);
  --amber:#f5c842;
  --amber-d:rgba(245,200,66,0.12);
  --red:#ff5c7a;
  --red-d:rgba(255,92,122,0.12);
  --purple:#b07cff;
  --purple-d:rgba(176,124,255,0.12);
  --display:'Syne',sans-serif;
  --body:'DM Sans',sans-serif;
  --mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.65;min-height:100vh}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:290px 1fr;min-height:100vh}

/* ── SIDEBAR ── */
.side{position:sticky;top:0;height:100vh;overflow-y:auto;background:var(--bg2);border-right:1px solid var(--line);padding:0 0 60px;scrollbar-width:thin;scrollbar-color:var(--faint) transparent}
.brand{padding:24px 20px 16px;border-bottom:1px solid var(--line)}
.brand h1{font-family:var(--display);font-size:17px;font-weight:800;color:var(--green);letter-spacing:-.01em;line-height:1.2}
.brand .sub{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:5px;letter-spacing:.08em;text-transform:uppercase}
.brand .who{font-size:11px;color:var(--faint);margin-top:6px;line-height:1.4}

/* progress */
.progwrap{padding:14px 20px 10px}
.progbar{height:3px;background:var(--panel);border-radius:99px;overflow:hidden}
.progfill{height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));border-radius:99px;width:0%;transition:.4s ease}
.progtxt{display:flex;justify-content:space-between;margin-top:6px;font-family:var(--mono);font-size:10px;color:var(--muted)}

/* search */
.navsearch{padding:8px 16px 4px}
.navsearch input{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px 12px;font-family:var(--mono);font-size:11px;outline:none}
.navsearch input:focus{border-color:var(--green)}

/* nav items */
.navgrp{margin:8px 0 2px}
.navgrplbl{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--faint);text-transform:uppercase;padding:8px 20px 3px;display:block}
.navitem{display:block;padding:7px 20px;color:var(--muted);font-size:12.5px;border-left:2px solid transparent;cursor:pointer;transition:.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono)}
.navitem:hover{background:var(--panel);color:var(--ink)}
.navitem.active{background:linear-gradient(90deg,var(--green-d),transparent);color:var(--green);border-left-color:var(--green)}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;min-height:100vh}
.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:14px;padding:13px 32px;background:rgba(10,12,16,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.crumb{font-family:var(--display);font-size:16px;font-weight:700;flex:1;color:var(--ink)}
.modes{display:flex;gap:6px}
.mbtn{background:var(--panel);border:1px solid var(--line2);color:var(--muted);font-family:var(--mono);font-size:10px;padding:6px 14px;border-radius:6px;cursor:pointer;letter-spacing:.04em;transition:.15s}
.mbtn:hover,.mbtn.active{background:var(--green-d);border-color:var(--green);color:var(--green)}
.mobnav{display:none}
.wrap{padding:32px;max-width:1000px}

/* ── CARDS ── */
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:28px 32px;margin-bottom:24px}
.card h2{font-family:var(--display);font-size:22px;font-weight:800;margin-bottom:16px;color:var(--ink)}
.card h3{font-family:var(--display);font-size:17px;font-weight:700;margin-bottom:10px}
.concept{line-height:1.75}
.concept p{margin-bottom:12px;color:var(--muted)}
.concept p strong,.concept li strong{color:var(--ink)}
.concept ul,.concept ol{margin:8px 0 14px 20px;color:var(--muted)}
.concept li{margin-bottom:6px}
.concept code{font-family:var(--mono);font-size:12px;background:var(--panel2);color:var(--cyan);padding:2px 6px;border-radius:4px}

/* ── CODE BLOCKS ── */
pre{background:var(--bg);border:1px solid var(--line2);border-radius:10px;padding:20px 22px;margin:14px 0;overflow-x:auto;font-family:var(--mono);font-size:12.5px;line-height:1.7;position:relative}
pre .lang-tag{position:absolute;top:8px;right:12px;font-size:9px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase}
.c{color:var(--faint)} /* comment */
.k{color:var(--purple)} /* keyword */
.s{color:var(--green)} /* string */
.n{color:var(--cyan)} /* function/class name */
.num{color:var(--amber)} /* number */
.d{color:var(--ink)} /* default */

/* ── DIFFICULTY BADGES ── */
.lvl{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:5px;white-space:nowrap}
.easy{background:var(--green-d);color:var(--green);border:1px solid rgba(61,255,160,.25)}
.medium{background:var(--amber-d);color:var(--amber);border:1px solid rgba(245,200,66,.25)}
.hard{background:var(--red-d);color:var(--red);border:1px solid rgba(255,92,122,.25)}
.platform{background:var(--cyan-d);color:var(--cyan);border:1px solid rgba(56,217,245,.25)}
.system{background:var(--purple-d);color:var(--purple);border:1px solid rgba(176,124,255,.25)}

/* ── QUESTIONS ── */
.q{border:1px solid var(--line);border-radius:12px;margin:12px 0;background:var(--bg2);overflow:hidden;transition:.2s}
.q.open{border-color:var(--line2)}
.q.open .qbody{display:block}
.qhead{display:flex;align-items:flex-start;gap:12px;padding:15px 18px;cursor:pointer;user-select:none}
.qhead:hover{background:var(--panel)}
.qtext{flex:1;font-size:14px;color:var(--ink);line-height:1.5}
.qtoggle{font-size:12px;color:var(--faint);padding-top:2px;transition:.2s}
.qbody{display:none;padding:0 20px 20px;border-top:1px solid var(--line)}

/* reveal */
.reveal-prompt{padding:16px 0 8px}
.reveal-btn{background:var(--panel);border:1px solid var(--green);color:var(--green);font-family:var(--mono);font-size:11px;padding:9px 20px;border-radius:8px;cursor:pointer;letter-spacing:.04em;transition:.15s}
.reveal-btn:hover{background:var(--green-d)}

/* answer sections */
.ans-block{margin-top:10px}
.albl{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--green);display:block;margin-bottom:8px}
.top1{background:linear-gradient(135deg,rgba(176,124,255,.08),rgba(56,217,245,.06));border:1px solid rgba(176,124,255,.2);border-radius:10px;padding:14px 18px;margin-top:14px;font-size:13.5px;color:var(--ink)}
.top1 strong{color:var(--purple)}
.followups{background:var(--panel2);border-radius:8px;padding:12px 16px;margin-top:12px;font-size:13px;color:var(--muted)}
.followups ul{margin:6px 0 0 16px}
.followups li{margin-bottom:4px}
.pitfalls{background:linear-gradient(135deg,rgba(255,92,122,.07),transparent);border:1px solid rgba(255,92,122,.2);border-radius:10px;padding:14px 18px;margin-top:12px;font-size:13px;color:var(--muted)}
.pitfalls strong{color:var(--red)}
.selfrate{display:flex;gap:8px;align-items:center;margin-top:16px;flex-wrap:wrap}
.selfrate span{font-family:var(--mono);font-size:10px;color:var(--faint)}
.rate{border:none;font-family:var(--mono);font-size:10px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:.15s}
.sel-good{background:var(--green-d);color:var(--green)}
.sel-mid{background:var(--amber-d);color:var(--amber)}
.sel-bad{background:var(--red-d);color:var(--red)}

/* ── FILTER CHIPS ── */
.qfilter{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0 8px}
.qchip{background:var(--panel);border:1px solid var(--line2);color:var(--muted);font-family:var(--mono);font-size:10px;padding:5px 13px;border-radius:20px;cursor:pointer;transition:.15s}
.qchip:hover{border-color:var(--green);color:var(--green)}
.qchip.active{background:var(--green-d);border-color:var(--green);color:var(--green)}

/* ── MINI CARDS ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px}
.minicard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 18px}
.minicard h4{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.minicard.mistakes h4{color:var(--red)}
.minicard.best h4{color:var(--green)}
.minicard.patterns h4{color:var(--cyan)}
.minicard.complexity h4{color:var(--purple)}
.minicard ul{margin-left:16px;font-size:12.5px;color:var(--muted)}
.minicard li{margin-bottom:5px}

/* ── FLASH ── */
.flash{display:flex;flex-direction:column;align-items:center;padding:40px 20px}
.fcard{width:100%;max-width:600px;min-height:200px;background:var(--panel);border:1px solid var(--line2);border-radius:16px;display:flex;align-items:center;justify-content:center;padding:32px;cursor:pointer;transition:.3s;position:relative;text-align:center}
.fcard:hover{border-color:var(--green);background:var(--panel2)}
.ffront p{font-family:var(--display);font-size:20px;font-weight:700;color:var(--ink)}
.fback{display:none}
.fback p{font-family:var(--mono);font-size:13px;color:var(--green);line-height:1.7}
.fcard.flipped .ffront{display:none}
.fcard.flipped .fback{display:block}
.ffront small{font-family:var(--mono);font-size:10px;color:var(--faint);display:block;margin-top:12px}
.fctrl{display:flex;justify-content:center;gap:14px;align-items:center;margin-top:20px;font-family:var(--mono);font-size:12px;color:var(--muted)}
.bigbtn{background:var(--panel);border:1px solid var(--line2);color:var(--muted);font-family:var(--mono);font-size:11px;padding:10px 22px;border-radius:8px;cursor:pointer;transition:.15s}
.bigbtn:hover{border-color:var(--green);color:var(--green)}

/* ── COMPLEXITY TABLE ── */
.ctable{width:100%;border-collapse:collapse;margin:14px 0;font-family:var(--mono);font-size:12px}
.ctable th{text-align:left;color:var(--faint);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;border-bottom:1px solid var(--line)}
.ctable td{padding:7px 12px;border-bottom:1px solid var(--line);color:var(--muted)}
.ctable td:first-child{color:var(--ink)}
.ctable .good{color:var(--green)}
.ctable .mid{color:var(--amber)}
.ctable .bad{color:var(--red)}

/* ── MOCK ── */
.mock-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:28px 32px;max-width:780px}
.mock-q{font-family:var(--display);font-size:19px;font-weight:700;line-height:1.45;margin:14px 0 20px;color:var(--ink)}
.mock-meta{font-family:var(--mono);font-size:10px;color:var(--faint);margin-bottom:4px}

/* ── MOBILE ── */
@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .side{display:none;position:fixed;z-index:50;width:280px;height:100vh}
  .side.open{display:block}
  .mobnav{display:inline-flex}
  .wrap{padding:20px 16px 80px}
  .grid2{grid-template-columns:1fr}
}
</style>

</div>
<script>
const TOPICS = [
{id:"python-core",name:"Python Core & Internals",ix:1,group:"Foundations",
 concept:`<p>Senior Python interviews probe the <strong>why</strong> behind the language, not just syntax. Know the data model, mutability, memory management, and the GIL — concepts that directly affect your platform scripts and async workloads.</p>
 <ul>
 <li><strong>Mutable vs Immutable</strong>: lists/dicts/sets are mutable (modified in place); tuples/strings/ints are immutable. Default mutable arguments are a classic trap.</li>
 <li><strong>is vs ==</strong>: <code>is</code> checks identity (same object in memory); <code>==</code> checks equality. Small integers (-5 to 256) and interned strings are cached — don't rely on <code>is</code> for value comparison.</li>
 <li><strong>GIL (Global Interpreter Lock)</strong>: CPython allows only one thread to execute Python bytecode at a time. Threading helps for I/O-bound work (network, disk); multiprocessing bypasses GIL for CPU-bound work.</li>
 <li><strong>Memory model</strong>: everything is an object with a reference count. <code>gc</code> module handles reference cycles. <code>__slots__</code> reduces per-instance memory for large-scale objects.</li>
 <li><strong>Dunder methods</strong>: <code>__enter__/__exit__</code> (context managers), <code>__iter__/__next__</code> (iterators), <code>__call__</code> (callable objects) — all used in platform tooling.</li>
 </ul>`,
 questions:[
  {level:"easy",q:"What is the mutable default argument trap? Write an example and fix it.",
   code:`<pre><span class="c"># BUG — list is created once at function definition time</span>
<span class="k">def</span> <span class="n">append_item</span>(item, result=[]):
    result.append(item)
    <span class="k">return</span> result

<span class="n">append_item</span>(<span class="num">1</span>)  <span class="c"># [1]</span>
<span class="n">append_item</span>(<span class="num">2</span>)  <span class="c"># [1, 2]  ← WRONG, same list reused</span>

<span class="c"># FIX — use None as sentinel</span>
<span class="k">def</span> <span class="n">append_item</span>(item, result=<span class="k">None</span>):
    <span class="k">if</span> result <span class="k">is</span> <span class="k">None</span>:
        result = []
    result.append(item)
    <span class="k">return</span> result</pre>`,
   a:"Default arguments are evaluated once at function definition, not on each call. A mutable default (list, dict) is shared across all calls. Fix: use <code>None</code> as the default and create the mutable object inside the function body.",
   top1:"They immediately explain WHY — the default is evaluated at definition time, not call time — and apply the same fix to dict and set defaults. They name the pattern ('None-sentinel') and note it's one of the first things senior interviewers use to filter for Python depth.",
   pitfall:"Thinking this only affects lists — any mutable object (dict, set, custom class) has the same trap.",
   followups:["What other mutable defaults cause this?","How does this relate to class-level vs instance-level attributes?"]},
  {level:"medium",q:"Implement a context manager for temporary AWS credential assumption using __enter__/__exit__.",
   code:`<pre><span class="k">import</span> boto3
<span class="k">from</span> contextlib <span class="k">import</span> contextmanager

<span class="k">class</span> <span class="n">AssumedRole</span>:
    <span class="k">def</span> <span class="n">__init__</span>(self, role_arn: str, session_name: str = <span class="s">"session"</span>):
        self.role_arn = role_arn
        self.session_name = session_name
        self.session = <span class="k">None</span>

    <span class="k">def</span> <span class="n">__enter__</span>(self):
        sts = boto3.client(<span class="s">"sts"</span>)
        creds = sts.assume_role(
            RoleArn=self.role_arn,
            RoleSessionName=self.session_name
        )[<span class="s">"Credentials"</span>]
        self.session = boto3.Session(
            aws_access_key_id=creds[<span class="s">"AccessKeyId"</span>],
            aws_secret_access_key=creds[<span class="s">"SecretAccessKey"</span>],
            aws_session_token=creds[<span class="s">"SessionToken"</span>]
        )
        <span class="k">return</span> self.session

    <span class="k">def</span> <span class="n">__exit__</span>(self, exc_type, exc_val, exc_tb):
        self.session = <span class="k">None</span>
        <span class="k">return</span> <span class="k">False</span>  <span class="c"># don't suppress exceptions</span>

<span class="c"># Usage</span>
<span class="k">with</span> <span class="n">AssumedRole</span>(<span class="s">"arn:aws:iam::123456789:role/CrossAccountRole"</span>) <span class="k">as</span> session:
    ec2 = session.client(<span class="s">"ec2"</span>, region_name=<span class="s">"us-east-1"</span>)
    instances = ec2.describe_instances()</pre>`,
   a:"Implement <code>__enter__</code> (acquire resource, return it) and <code>__exit__</code> (release resource, return False to propagate exceptions). For credential management, <code>__exit__</code> nulls out the session so creds aren't held longer than needed. Returning False from <code>__exit__</code> means exceptions are NOT suppressed — critical for error handling.",
   top1:"They return False explicitly from __exit__ and explain it means 'don't suppress exceptions' — showing they understand the protocol. They also mention the @contextmanager decorator as an alternative (generator-based, more concise) and note that __exit__ receiving exc_type=None means the block completed cleanly.",
   pitfall:"Returning True from __exit__ silently swallows all exceptions — a dangerous default if you forget it.",
   followups:["How does @contextmanager differ from the class-based approach?","How would you add retry logic on AssumeRole failures?"]},
  {level:"medium",q:"What's the difference between __repr__ and __str__? When does each get called?",
   code:`<pre><span class="k">class</span> <span class="n">EC2Instance</span>:
    <span class="k">def</span> <span class="n">__init__</span>(self, instance_id, state):
        self.instance_id = instance_id
        self.state = state

    <span class="k">def</span> <span class="n">__repr__</span>(self):
        <span class="c"># Unambiguous — should ideally recreate the object</span>
        <span class="k">return</span> <span class="s">f"EC2Instance(instance_id={self.instance_id!r}, state={self.state!r})"</span>

    <span class="k">def</span> <span class="n">__str__</span>(self):
        <span class="c"># Human-readable</span>
        <span class="k">return</span> <span class="s">f"Instance {self.instance_id} ({self.state})"</span>

i = <span class="n">EC2Instance</span>(<span class="s">"i-0abc"</span>, <span class="s">"running"</span>)
<span class="n">print</span>(i)           <span class="c"># calls __str__  → "Instance i-0abc (running)"</span>
<span class="n">repr</span>(i)            <span class="c"># calls __repr__ → "EC2Instance(instance_id='i-0abc', state='running')"</span>
[i]                <span class="c"># list uses __repr__ for elements</span></pre>`,
   a:"<code>__str__</code>: human-readable, called by print() and str(). <code>__repr__</code>: unambiguous, called by repr(), in containers (lists, dicts), and in the REPL. If only __repr__ is defined it serves as fallback for both. Goal: __repr__ output should ideally be evaluable Python to recreate the object.",
   top1:"They note that __repr__ is the one you must define (it's the fallback), and they use the !r modifier in f-strings (which calls repr on the value, adding quotes around strings) — a subtle detail that shows real Python fluency.",
   pitfall:"Defining only __str__ means containers (lists, dicts) show unhelpful output like <__main__.EC2Instance object at 0x...> for the elements.",
   followups:["What does the !r modifier do in an f-string?","When would you define __format__ too?"]}
 ],
 mistakes:["Mutable default arguments","Using is to compare values (not identity)","Assuming threads speed up CPU-bound work (GIL prevents it)","Not defining __repr__ — __str__ alone is insufficient for debugging","Modifying a list while iterating over it"],
 patterns:["None-sentinel for mutable defaults","@contextmanager for simple context managers","__slots__ for memory-efficient data classes","Dataclasses for clean data containers"],
 complexity:[]
},
{id:"decorators-generators",name:"Decorators & Generators",ix:2,group:"Foundations",
 concept:`<p>Decorators and generators are the two Python features that separate intermediate from advanced engineers. In platform/MLOps work they appear constantly: retry decorators, caching, log wrappers, and lazy data pipelines over large CloudWatch log streams.</p>
 <ul>
 <li><strong>Decorator</strong>: a function that takes a function and returns a modified version. Under the hood: <code>@decorator</code> is syntactic sugar for <code>func = decorator(func)</code>.</li>
 <li><strong>functools.wraps</strong>: preserves the original function's <code>__name__</code>, <code>__doc__</code>, etc. — always use it in decorators.</li>
 <li><strong>Generator</strong>: a function with <code>yield</code> — suspends execution and returns a value, resuming on next(). Memory-efficient for large sequences (stream log lines, paginate API results).</li>
 <li><strong>Generator expressions</strong>: <code>(x*2 for x in range(1000000))</code> — lazy, unlike list comprehensions.</li>
 <li><strong>send() and two-way generators</strong>: generators can receive values via <code>.send(val)</code> — used in coroutine patterns (pre-asyncio).</li>
 </ul>`,
 questions:[
  {level:"medium",q:"Write a retry decorator with exponential backoff for AWS API calls.",
   code:`<pre><span class="k">import</span> time, functools, random
<span class="k">from</span> botocore.exceptions <span class="k">import</span> ClientError

<span class="k">def</span> <span class="n">retry</span>(max_attempts=<span class="num">3</span>, base_delay=<span class="num">1.0</span>, backoff=<span class="num">2.0</span>,
          exceptions=(ClientError,)):
    <span class="k">def</span> <span class="n">decorator</span>(func):
        @functools.wraps(func)
        <span class="k">def</span> <span class="n">wrapper</span>(*args, **kwargs):
            delay = base_delay
            <span class="k">for</span> attempt <span class="k">in</span> range(max_attempts):
                <span class="k">try</span>:
                    <span class="k">return</span> func(*args, **kwargs)
                <span class="k">except</span> exceptions <span class="k">as</span> e:
                    <span class="k">if</span> attempt == max_attempts - <span class="num">1</span>:
                        <span class="k">raise</span>
                    jitter = random.uniform(<span class="num">0</span>, delay * <span class="num">0.2</span>)
                    time.sleep(delay + jitter)
                    delay *= backoff
        <span class="k">return</span> wrapper
    <span class="k">return</span> decorator

@<span class="n">retry</span>(max_attempts=<span class="num">4</span>, base_delay=<span class="num">0.5</span>)
<span class="k">def</span> <span class="n">describe_instances</span>(ec2_client, **filters):
    <span class="k">return</span> ec2_client.describe_instances(**filters)</pre>`,
   a:"Three-layer function: outer (captures config), decorator (wraps func), wrapper (adds retry logic). Key details: <code>functools.wraps</code> preserves metadata; jitter prevents thundering herd; re-raise on final attempt; catch only specific exceptions.",

   code:`<pre><span class="k">import</span> time, functools
<span class="k">from</span> typing <span class="k">import</span> Any, Callable

<span class="k">class</span> <span class="n">ttl_cache</span>:
    <span class="s">"""Decorator class that caches results for ttl_seconds."""</span>
    <span class="k">def</span> <span class="n">__init__</span>(self, ttl_seconds: float = <span class="num">60</span>):
        self.ttl = ttl_seconds
        self._cache: dict = {}
        self._timestamps: dict = {}

    <span class="k">def</span> <span class="n">__call__</span>(self, func: Callable) -> Callable:
        @functools.wraps(func)
        <span class="k">def</span> <span class="n">wrapper</span>(*args, **kwargs):
            key = (args, tuple(sorted(kwargs.items())))
            now = time.monotonic()
            <span class="k">if</span> (key <span class="k">in</span> self._cache <span class="k">and</span>
                    now - self._timestamps[key] < self.ttl):
                <span class="k">return</span> self._cache[key]
            result = func(*args, **kwargs)
            self._cache[key] = result
            self._timestamps[key] = now
            <span class="k">return</span> result
        wrapper.cache_clear = <span class="k">lambda</span>: (
            self._cache.clear(), self._timestamps.clear()
        )
        <span class="k">return</span> wrapper

@<span class="n">ttl_cache</span>(ttl_seconds=<span class="num">300</span>)
<span class="k">def</span> <span class="n">get_account_instances</span>(account_id: str) -> list:

{id:"async-python",name:"Async Python & Concurrency",ix:3,group:"Foundations",
 concept:`<p>Async Python is essential for platform engineers calling many AWS APIs, Bedrock endpoints, and HTTP services concurrently. The asyncio event loop, async/await, and concurrent execution patterns directly apply to your cross-account agent tooling.</p>
 <ul>
 <li><strong>asyncio event loop</strong>: single-threaded, non-blocking — runs coroutines, switching between them at await points. One thread, many concurrent I/O operations.</li>
 <li><strong>async def / await</strong>: <code>async def</code> defines a coroutine; <code>await</code> suspends it until the awaited thing completes. You can only await inside an async function.</li>
 <li><strong>asyncio.gather()</strong>: runs multiple coroutines concurrently, returns results in order.</li>
 <li><strong>asyncio.Semaphore</strong>: limit concurrent coroutines — critical to avoid rate-limit explosions on AWS APIs.</li>
 <li><strong>Blocking code in async</strong>: calling blocking functions (requests, boto3 sync) inside an async function blocks the entire event loop. Use <code>loop.run_in_executor()</code> or aioboto3.</li>
 <li><strong>Threading vs Multiprocessing vs Async</strong>: Async wins for I/O-bound with many connections. Threading works for I/O-bound with blocking libs. Multiprocessing for CPU-bound (bypasses GIL).</li>
 </ul>`,

   code:`<pre><span class="k">import</span> asyncio, time
<span class="k">from</span> collections <span class="k">import</span> deque
<span class="k">from</span> typing <span class="k">import</span> Callable, Any

<span class="k">class</span> <span class="n">RateLimiter</span>:
    <span class="s">"""Token-bucket rate limiter for async functions."""</span>
    <span class="k">def</span> <span class="n">__init__</span>(self, rps: float):
        self.rps = rps
        self.min_interval = <span class="num">1.0</span> / rps
        self._last_called = <span class="num">0.0</span>
        self._lock = asyncio.Lock()

    <span class="k">async def</span> <span class="n">acquire</span>(self):
        <span class="k">async with</span> self._lock:
            now = time.monotonic()
            wait = self.min_interval - (now - self._last_called)
            <span class="k">if</span> wait > <span class="num">0</span>:
                <span class="k">await</span> asyncio.sleep(wait)
            self._last_called = time.monotonic()

<span class="k">async def</span> <span class="n">call_bedrock</span>(limiter: <span class="n">RateLimiter</span>, prompt: str) -> str:
    <span class="k">await</span> limiter.acquire()
    <span class="c"># actual bedrock call here</span>
    <span class="k">return</span> <span class="s">f"response to: {prompt[:30]}"</span>

<span class="k">async def</span> <span class="n">process_batch</span>(prompts: list, rps: float = <span class="num">5</span>):
    limiter = <span class="n">RateLimiter</span>(rps)
    tasks = [<span class="n">call_bedrock</span>(limiter, p) <span class="k">for</span> p <span class="k">in</span> prompts]
    <span class="k">return await</span> asyncio.gather(*tasks)</pre>`,

{id:"data-structures",name:"Data Structures & Algorithms",ix:4,group:"Algorithms",
 concept:`<p>Platform engineers aren't expected to solve DP-heavy LeetCode Hard — but you must be fluent in the core patterns: sliding window, two pointers, hash maps, BFS/DFS for dependency graphs, and heap for top-K problems. These appear in real platform code (dependency resolution, log analysis, cost ranking).</p>
 <ul>
 <li><strong>Hash map (dict)</strong>: O(1) lookup — frequency counts, memoization, grouping. Most "clever" solutions need a dict.</li>
 <li><strong>Heap (heapq)</strong>: O(log n) insert/extract-min. Use for top-K, scheduling, priority queues. Python's heapq is a min-heap; negate values for max-heap.</li>
 <li><strong>Sliding window</strong>: maintain a window of elements as you scan — O(n) instead of O(n²) for subarray/substring problems.</li>
 <li><strong>Two pointers</strong>: converge from both ends or advance independently — sorted arrays, in-place operations.</li>
 <li><strong>BFS/DFS</strong>: graph traversal — dependency ordering, reachability, shortest path (BFS).</li>
 </ul>`,
 questions:[
  {level:"medium",q:"Find the top K most expensive AWS resources from a cost report. O(n log k) solution.",
   code:`<pre><span class="k">import</span> heapq
<span class="k">from</span> typing <span class="k">import</span> List, Tuple

<span class="k">def</span> <span class="n">top_k_expensive</span>(
    resources: List[Tuple[str, float]], k: int
) -> List[Tuple[str, float]]:
    <span class="s">"""
    resources: list of (resource_id, cost)
    Returns k most expensive, highest first.
    O(n log k) time, O(k) space.
    """</span>
    <span class="c"># Min-heap of size k: heap[0] is the smallest among top-k</span>
    heap = []
    <span class="k">for</span> resource_id, cost <span class="k">in</span> resources:
        heapq.heappush(heap, (cost, resource_id))
        <span class="k">if</span> len(heap) > k:
            heapq.heappop(heap)  <span class="c"># evict smallest</span>

    <span class="c"># Sort descending for output</span>
    <span class="k">return</span> sorted(heap, key=<span class="k">lambda</span> x: -x[<span class="num">0</span>])

<span class="c"># Alternative: heapq.nlargest — same complexity, simpler</span>
<span class="k">def</span> <span class="n">top_k_v2</span>(resources, k):
    <span class="k">return</span> heapq.nlargest(k, resources, key=<span class="k">lambda</span> x: x[<span class="num">1</span>])

<span class="c"># Usage</span>
costs = [(<span class="s">"i-abc"</span>, <span class="num">120.5</span>), (<span class="s">"i-def"</span>, <span class="num">890.0</span>), (<span class="s">"i-ghi"</span>, <span class="num">45.0</span>)]
<span class="n">print</span>(<span class="n">top_k_expensive</span>(costs, k=<span class="num">2</span>))</pre>`,
   a:"Min-heap of size k: push every element, pop the min when heap exceeds k. At the end the heap contains the k largest. O(n log k) time. heapq.nlargest is the clean one-liner for the same result.",
   top1:"They know heapq.nlargest and when to use it (n >> k, use heap; small n, sorted() is fine and clearer). They explain why it's O(n log k) not O(n log n): we only maintain k elements in the heap, so each push/pop is log k. For the platform context: this is exactly how you'd rank 50K resources by cost to build the rightsizing priority list.",
   pitfall:"Sorting the full list (O(n log n)) when only k results are needed — fine for 100 resources, slow for 100K.",
   followups:["When is O(n log n) sort better than heap for top-K?","How would you group the top-K by account?"]},
  {level:"medium",q:"Detect a cycle in a Terraform module dependency graph (directed graph).",
   code:`<pre><span class="k">from</span> typing <span class="k">import</span> Dict, List, Set

<span class="k">def</span> <span class="n">has_cycle</span>(graph: Dict[str, List[str]]) -> bool:
    <span class="s">"""
    graph: {module: [dependencies]}
    Returns True if a circular dependency exists.
    DFS with 3-color marking: white=unvisited, gray=in-stack, black=done
    """</span>
    WHITE, GRAY, BLACK = <span class="num">0</span>, <span class="num">1</span>, <span class="num">2</span>
    color = {node: WHITE <span class="k">for</span> node <span class="k">in</span> graph}

    <span class="k">def</span> <span class="n">dfs</span>(node: str) -> bool:
        color[node] = GRAY  <span class="c"># mark in current DFS path</span>
        <span class="k">for</span> neighbor <span class="k">in</span> graph.get(node, []):
            <span class="k">if</span> color[neighbor] == GRAY:
                <span class="k">return</span> <span class="k">True</span>   <span class="c"># back edge = cycle</span>
            <span class="k">if</span> color[neighbor] == WHITE <span class="k">and</span> dfs(neighbor):
                <span class="k">return</span> <span class="k">True</span>
        color[node] = BLACK  <span class="c"># fully explored</span>
        <span class="k">return</span> <span class="k">False</span>

    <span class="k">return</span> any(dfs(n) <span class="k">for</span> n <span class="k">in</span> graph <span class="k">if</span> color[n] == WHITE)

<span class="c"># Test</span>
graph = {<span class="s">"vpc"</span>: [<span class="s">"subnet"</span>], <span class="s">"subnet"</span>: [<span class="s">"sg"</span>], <span class="s">"sg"</span>: [<span class="s">"vpc"</span>]}
<span class="n">print</span>(<span class="n">has_cycle</span>(graph))  <span class="c"># True</span></pre>`,
   a:"Three-color DFS: GRAY marks nodes in the current DFS stack. Finding a GRAY node from the current path = back edge = cycle. WHITE = unvisited, BLACK = fully explored (safe). Run DFS from every unvisited node to handle disconnected graphs.",
   top1:"They explain why two colors aren't enough: 'visited' vs 'unvisited' can't distinguish nodes in the current path vs nodes in a completed subtree — a back edge to a completed subtree isn't a cycle. The GRAY = in-current-stack distinction is the key. They mention Kahn's algorithm (topological sort via BFS) as an alternative that also detects cycles.",
   pitfall:"Using a simple 'visited' set instead of the three-color approach — falsely reports cycles for DAGs with shared dependencies.",
   followups:["What's Kahn's algorithm and how does it detect cycles?","How would you return the cycle path, not just detect it?"]},
  {level:"medium",q:"Sliding window: find the longest window of CloudWatch metric values staying below a threshold.",
   code:`<pre><span class="k">from</span> typing <span class="k">import</span> List, Tuple

<span class="k">def</span> <span class="n">longest_healthy_window</span>(
    values: List[float], threshold: float
) -> Tuple[int, int, int]:
    <span class="s">"""
    Returns (start, end, length) of the longest window
    where all values <= threshold.
    O(n) time, O(1) space.
    """</span>
    best_start = best_end = <span class="num">0</span>
    best_len = <span class="num">0</span>
    left = <span class="num">0</span>

    <span class="k">for</span> right <span class="k">in</span> range(len(values)):
        <span class="k">if</span> values[right] > threshold:
            left = right + <span class="num">1</span>  <span class="c"># reset window</span>
        <span class="k">else</span>:
            window_len = right - left + <span class="num">1</span>
            <span class="k">if</span> window_len > best_len:
                best_len = window_len
                best_start, best_end = left, right

    <span class="k">return</span> best_start, best_end, best_len

{id:"boto3-aws",name:"boto3 & AWS Automation",ix:5,group:"Platform Engineering",
 concept:`<p>boto3 is your primary Python interface to AWS. Senior platform engineers write idiomatic, resilient boto3 scripts: proper pagination, error handling, cross-account patterns, and efficient bulk operations — exactly what your AgentCore framework uses.</p>
 <ul>
 <li><strong>Paginators</strong>: AWS APIs return pages; always use <code>client.get_paginator()</code> instead of manual NextToken loops.</li>
 <li><strong>Waiters</strong>: poll until a resource reaches a state — <code>ec2.get_waiter('instance_running').wait()</code> instead of sleep loops.</li>
 <li><strong>Resource vs Client</strong>: client is low-level (raw API); resource is higher-level OO wrapper. Use client for full control; resource for convenience.</li>
 <li><strong>Error handling</strong>: catch <code>ClientError</code> and check <code>e.response['Error']['Code']</code> for specific codes (ThrottlingException, ResourceNotFoundException).</li>
 <li><strong>Cross-account</strong>: STS AssumeRole → Session with temp creds → use that session's clients.</li>
 </ul>`,
 questions:[
  {level:"platform",q:"Write a script to find all EC2 instances with CPU < 10% over 7 days across multiple accounts (rightsizing candidate finder).",
   code:`<pre><span class="k">import</span> boto3, json
<span class="k">from</span> datetime <span class="k">import</span> datetime, timedelta, timezone
<span class="k">from</span> typing <span class="k">import</span> List, Dict
<span class="k">from</span> botocore.exceptions <span class="k">import</span> ClientError

<span class="k">def</span> <span class="n">assume_role_session</span>(account_id: str, role_name: str) -> boto3.Session:
    sts = boto3.client(<span class="s">"sts"</span>)
    creds = sts.assume_role(
        RoleArn=<span class="s">f"arn:aws:iam::{account_id}:role/{role_name}"</span>,
        RoleSessionName=<span class="s">"rightsizing-scan"</span>
    )[<span class="s">"Credentials"</span>]
    <span class="k">return</span> boto3.Session(
        aws_access_key_id=creds[<span class="s">"AccessKeyId"</span>],
        aws_secret_access_key=creds[<span class="s">"SecretAccessKey"</span>],
        aws_session_token=creds[<span class="s">"SessionToken"</span>]
    )

<span class="k">def</span> <span class="n">get_underutilized_instances</span>(
    account_id: str, role_name: str, region: str = <span class="s">"us-east-1"</span>,
    cpu_threshold: float = <span class="num">10.0</span>, days: int = <span class="num">7</span>
) -> List[Dict]:
    session = <span class="n">assume_role_session</span>(account_id, role_name)
    ec2 = session.client(<span class="s">"ec2"</span>, region_name=region)
    cw = session.client(<span class="s">"cloudwatch"</span>, region_name=region)
    end = datetime.now(timezone.utc)
    start = end - timedelta(days=days)
    results = []

    paginator = ec2.get_paginator(<span class="s">"describe_instances"</span>)
    <span class="k">for</span> page <span class="k">in</span> paginator.paginate(
        Filters=[{<span class="s">"Name"</span>: <span class="s">"instance-state-name"</span>, <span class="s">"Values"</span>: [<span class="s">"running"</span>]}]
    ):
        <span class="k">for</span> r <span class="k">in</span> page[<span class="s">"Reservations"</span>]:
            <span class="k">for</span> inst <span class="k">in</span> r[<span class="s">"Instances"</span>]:
                iid = inst[<span class="s">"InstanceId"</span>]
                <span class="k">try</span>:
                    resp = cw.get_metric_statistics(
                        Namespace=<span class="s">"AWS/EC2"</span>, MetricName=<span class="s">"CPUUtilization"</span>,
                        Dimensions=[{<span class="s">"Name"</span>: <span class="s">"InstanceId"</span>, <span class="s">"Value"</span>: iid}],
                        StartTime=start, EndTime=end,
                        Period=<span class="num">86400</span>, Statistics=[<span class="s">"Average"</span>]
                    )
                    datapoints = resp[<span class="s">"Datapoints"</span>]
                    <span class="k">if not</span> datapoints:
                        <span class="k">continue</span>
                    avg_cpu = sum(p[<span class="s">"Average"</span>] <span class="k">for</span> p <span class="k">in</span> datapoints) / len(datapoints)
                    <span class="k">if</span> avg_cpu < cpu_threshold:
                        results.append({
                            <span class="s">"account"</span>: account_id, <span class="s">"instance_id"</span>: iid,
                            <span class="s">"type"</span>: inst[<span class="s">"InstanceType"</span>], <span class="s">"avg_cpu"</span>: round(avg_cpu, <span class="num">2</span>),
                            <span class="s">"name"</span>: next((t[<span class="s">"Value"</span>] <span class="k">for</span> t <span class="k">in</span> inst.get(<span class="s">"Tags"</span>, [])
                                          <span class="k">if</span> t[<span class="s">"Key"</span>] == <span class="s">"Name"</span>), <span class="s">""</span>)
                        })
                <span class="k">except</span> ClientError <span class="k">as</span> e:
                    <span class="k">if</span> e.response[<span class="s">"Error"</span>][<span class="s">"Code"</span>] != <span class="s">"ThrottlingException"</span>:
                        <span class="k">raise</span>
    <span class="k">return</span> results</pre>`,
   a:"Pattern: assume role → scoped session → paginate instances → CloudWatch metric per instance → filter by threshold. Key choices: paginator (not manual NextToken), datetime.now(timezone.utc) (not naive datetimes), catch ThrottlingException specifically (retry in production), extract Name tag safely with next().",
   top1:"They use timezone-aware datetimes (timezone.utc) because AWS rejects naive datetimes and the error is confusing. They catch ThrottlingException specifically rather than all ClientErrors — programming bugs should still propagate. They use next() with a default for safe tag extraction rather than crashing on missing tags. This is the exact pattern behind the AgentCore rightsizing tool.",
   pitfall:"Using datetime.utcnow() — returns naive datetime, AWS APIs require timezone-aware. Use datetime.now(timezone.utc).",
   followups:["How would you parallelize this across 50 accounts?","How would you add exponential backoff for ThrottlingException?"]},
  {level:"platform",q:"Write a function to batch-tag EC2 instances with proper error handling and dry-run support.",
   code:`<pre><span class="k">import</span> boto3, logging
<span class="k">from</span> botocore.exceptions <span class="k">import</span> ClientError
<span class="k">from</span> typing <span class="k">import</span> Dict, List

logger = logging.getLogger(__name__)

<span class="k">def</span> <span class="n">batch_tag_instances</span>(
    ec2_client,
    instance_ids: List[str],
    tags: Dict[str, str],
    dry_run: bool = <span class="k">True</span>,
    batch_size: int = <span class="num">20</span>
) -> Dict[str, List[str]]:
    <span class="s">"""Tag instances in batches. dry_run=True by default (safety)."""</span>
    result = {<span class="s">"succeeded"</span>: [], <span class="s">"failed"</span>: []}
    tag_list = [{<span class="s">"Key"</span>: k, <span class="s">"Value"</span>: v} <span class="k">for</span> k, v <span class="k">in</span> tags.items()]

    <span class="k">for</span> i <span class="k">in</span> range(<span class="num">0</span>, len(instance_ids), batch_size):
        batch = instance_ids[i:i + batch_size]
        <span class="k">try</span>:
            ec2_client.create_tags(
                Resources=batch,
                Tags=tag_list,
                DryRun=dry_run
            )
            result[<span class="s">"succeeded"</span>].extend(batch)
            logger.info(<span class="s">f"Tagged {len(batch)} instances"</span>)
        <span class="k">except</span> ClientError <span class="k">as</span> e:
            code = e.response[<span class="s">"Error"</span>][<span class="s">"Code"</span>]
            <span class="k">if</span> code == <span class="s">"DryRunOperation"</span>:
                logger.info(<span class="s">f"DRY RUN OK: would tag {batch}"</span>)
                result[<span class="s">"succeeded"</span>].extend(batch)
            <span class="k">else</span>:
                logger.error(<span class="s">f"Failed to tag {batch}: {e}"</span>)
                result[<span class="s">"failed"</span>].extend(batch)
    <span class="k">return</span> result</pre>`,
   a:"Batch into groups of 20 (AWS limits CreateTags to 1000 resources but smaller batches limit blast radius). dry_run=True by default — safe by default. DryRunOperation is a 'success' error code meaning the call would have worked. Return succeeded/failed lists so callers can act on partial failures.",
   top1:"dry_run=True as the default is the key safety design — the function is safe by default, not dangerous by default. They handle DryRunOperation as a success case (it raises ClientError but means 'would have worked'). Batching limits blast radius: one bad tag name fails 20 instances, not all 500.",
   pitfall:"Not batching — CreateTags with 500 resources fails if any are invalid, and you don't know which ones succeeded.",
   followups:["Why is dry_run=True as the default better than False?","How would you add retry for partial batch failures?"]}
 ],

{id:"oop-patterns",name:"OOP & Design Patterns",ix:6,group:"Foundations",
 concept:`<p>Platform tooling heavily uses OOP — plugin architectures, client factories, configuration objects. Know the patterns that appear in production Python codebases and AWS SDKs.</p>
 <ul>
 <li><strong>dataclass</strong>: <code>@dataclass</code> generates __init__, __repr__, __eq__ automatically. Use for data containers. Add <code>frozen=True</code> for immutable records.</li>
 <li><strong>ABC (Abstract Base Class)</strong>: define an interface that subclasses must implement — useful for plugin systems and provider abstractions.</li>
 <li><strong>Factory pattern</strong>: decouple object creation from usage — a function/class that returns different concrete implementations based on config.</li>
 <li><strong>Singleton</strong>: one instance per class — use sparingly (hard to test). In Python, often replaced by module-level state or dependency injection.</li>
 <li><strong>Strategy pattern</strong>: pass an algorithm as a parameter (often a callable in Python) instead of subclassing.</li>
 </ul>`,
 questions:[
  {level:"medium",q:"Design a pluggable cost-analysis provider using ABC so Bedrock, OpenAI, and custom models can all be analyzed uniformly.",
   code:`<pre><span class="k">from</span> abc <span class="k">import</span> ABC, abstractmethod
<span class="k">from</span> dataclasses <span class="k">import</span> dataclass, field
<span class="k">from</span> typing <span class="k">import</span> Dict, Optional

@dataclass
<span class="k">class</span> <span class="n">UsageRecord</span>:
    model_id: str
    input_tokens: int
    output_tokens: int
    latency_ms: float
    metadata: Dict = field(default_factory=dict)

@dataclass(frozen=<span class="k">True</span>)
<span class="k">class</span> <span class="n">CostBreakdown</span>:
    input_cost: float
    output_cost: float
    total: float
    currency: str = <span class="s">"USD"</span>

<span class="k">class</span> <span class="n">CostAnalyzer</span>(ABC):
    @abstractmethod
    <span class="k">def</span> <span class="n">calculate_cost</span>(self, record: UsageRecord) -> CostBreakdown: ...

    @abstractmethod
    <span class="k">def</span> <span class="n">get_model_id</span>(self) -> str: ...

<span class="k">class</span> <span class="n">BedrockCostAnalyzer</span>(CostAnalyzer):
    PRICES = {  <span class="c"># per 1K tokens</span>
        <span class="s">"anthropic.claude-3-sonnet"</span>: (<span class="num">0.003</span>, <span class="num">0.015</span>),
        <span class="s">"amazon.titan-embed-text-v1"</span>: (<span class="num">0.0001</span>, <span class="num">0.0</span>),
    }
    <span class="k">def</span> <span class="n">__init__</span>(self, model_id: str):
        self._model_id = model_id

    <span class="k">def</span> <span class="n">calculate_cost</span>(self, record: UsageRecord) -> CostBreakdown:
        in_price, out_price = self.PRICES.get(self._model_id, (<span class="num">0</span>, <span class="num">0</span>))
        ic = record.input_tokens / <span class="num">1000</span> * in_price
        oc = record.output_tokens / <span class="num">1000</span> * out_price
        <span class="k">return</span> <span class="n">CostBreakdown</span>(input_cost=ic, output_cost=oc, total=ic+oc)

    <span class="k">def</span> <span class="n">get_model_id</span>(self) -> str: <span class="k">return</span> self._model_id

<span class="k">def</span> <span class="n">make_analyzer</span>(provider: str, model_id: str) -> CostAnalyzer:
    <span class="s">"""Factory — returns the right analyzer by provider."""</span>
    <span class="k">if</span> provider == <span class="s">"bedrock"</span>:
        <span class="k">return</span> <span class="n">BedrockCostAnalyzer</span>(model_id)
    <span class="k">raise</span> ValueError(<span class="s">f"Unknown provider: {provider}"</span>)</pre>`,
   a:"ABC enforces the interface contract at instantiation time — you can't create a CostAnalyzer subclass without implementing calculate_cost and get_model_id. frozen=True dataclass for CostBreakdown makes it immutable (can be dict key). Factory function decouples creation from usage.",
   top1:"They make CostBreakdown frozen=True — a cost result shouldn't be mutated after creation, and frozen dataclasses are hashable (can be used as dict keys). They separate the data containers (dataclasses) from the behavior (ABCs) cleanly. The factory pattern means callers never import concrete classes — easy to add a new provider without changing call sites.",
   pitfall:"Using ABC without @abstractmethod — the method isn't enforced and subclasses can silently skip implementing it.",
   followups:["How would you register new providers without modifying the factory function?","When would you use Protocol instead of ABC?"]},
  {level:"medium",q:"Implement __eq__ and __hash__ correctly for a resource identifier class.",
   code:`<pre><span class="k">from</span> dataclasses <span class="k">import</span> dataclass

@dataclass(frozen=<span class="k">True</span>)  <span class="c"># frozen generates __hash__ automatically</span>
<span class="k">class</span> <span class="n">ResourceId</span>:
    account_id: str
    region: str
    resource_type: str
    resource_id: str

    <span class="k">def</span> <span class="n">__str__</span>(self):
        <span class="k">return</span> <span class="s">f"{self.account_id}/{self.region}/{self.resource_type}/{self.resource_id}"</span>

<span class="c"># Manual implementation (when not using dataclass):</span>
<span class="k">class</span> <span class="n">ResourceIdManual</span>:
    <span class="k">def</span> <span class="n">__init__</span>(self, account_id, region, resource_type, resource_id):
        self.account_id = account_id
        self.region = region
        self.resource_type = resource_type
        self.resource_id = resource_id

    <span class="k">def</span> <span class="n">__eq__</span>(self, other):
        <span class="k">if not</span> isinstance(other, ResourceIdManual):
            <span class="k">return</span> NotImplemented
        <span class="k">return</span> (self.account_id, self.region, self.resource_type, self.resource_id) == \
               (other.account_id, other.region, other.resource_type, other.resource_id)

    <span class="k">def</span> <span class="n">__hash__</span>(self):
        <span class="k">return</span> hash((self.account_id, self.region, self.resource_type, self.resource_id))</pre>`,
   a:"__eq__ and __hash__ must be consistent: if a==b then hash(a)==hash(b). Return NotImplemented (not False) for unknown types — lets Python try the other operand's __eq__. The frozen dataclass approach is preferred: @dataclass(frozen=True) generates both automatically.",
   top1:"They return NotImplemented from __eq__ when the type doesn't match — not False. Returning False would prevent Python from trying the other operand's __eq__, which breaks symmetric comparison. They know that defining __eq__ without __hash__ makes the class unhashable (Python sets __hash__=None when you define __eq__).",

 ],

{id:"testing",name:"Testing with pytest",ix:7,group:"Platform Engineering",
 concept:`<p>Production platform code requires tests. pytest is the de-facto Python test framework. Senior engineers write tests that are fast, isolated, and actually catch bugs — not tests that just check happy-paths.</p>
 <ul>
 <li><strong>fixtures</strong>: reusable setup/teardown via <code>@pytest.fixture</code>. Scope: function (default), class, module, session.</li>
 <li><strong>parametrize</strong>: run one test with many inputs — <code>@pytest.mark.parametrize</code>. Replaces copy-paste test variants.</li>
 <li><strong>monkeypatch / mock</strong>: replace real dependencies (boto3 clients, HTTP calls) with controlled stubs. <code>unittest.mock.patch</code> or <code>pytest-mock</code>.</li>
 <li><strong>moto</strong>: AWS mock library — spins up a fake in-memory AWS environment for boto3 calls. No real API calls in tests.</li>
 <li><strong>Testing async</strong>: <code>pytest-asyncio</code> for async test functions.</li>
 </ul>`,

 concept:`<p>Python is the primary language for LLM application development. Your role requires writing production-grade Bedrock clients, streaming handlers, prompt pipelines, and embedding workflows.</p>
 <ul>
 <li><strong>Bedrock invoke</strong>: <code>bedrock-runtime</code> client, <code>invoke_model</code> for sync and <code>invoke_model_with_response_stream</code> for streaming.</li>
 <li><strong>Converse API</strong>: higher-level multi-turn API that handles message formatting consistently across models.</li>
 <li><strong>Embeddings</strong>: call Titan/Cohere embed model, get a float vector, store in OpenSearch.</li>
 <li><strong>Streaming</strong>: parse the event stream — yield tokens as they arrive for real-time UX.</li>
 <li><strong>Token counting</strong>: estimate tokens before calling to stay within context limits — use tiktoken or model-specific tokenizers.</li>
 </ul>`,
 questions:[
  {level:"platform",q:"Write a production Bedrock streaming client with error handling, retry, and token tracking.",
   code:`<pre><span class="k">import</span> boto3, json, logging
<span class="k">from</span> typing <span class="k">import</span> Iterator, Optional
<span class="k">from</span> botocore.exceptions <span class="k">import</span> ClientError
<span class="k">from</span> dataclasses <span class="k">import</span> dataclass, field

logger = logging.getLogger(__name__)

@dataclass
<span class="k">class</span> <span class="n">StreamResult</span>:
    text: str = <span class="s">""</span>
    input_tokens: int = <span class="num">0</span>
    output_tokens: int = <span class="num">0</span>

<span class="k">def</span> <span class="n">bedrock_stream</span>(
    prompt: str,
    model_id: str = <span class="s">"anthropic.claude-3-sonnet-20240229-v1:0"</span>,
    max_tokens: int = <span class="num">1024</span>,
    region: str = <span class="s">"us-east-1"</span>
) -> Iterator[str]:
    <span class="s">"""Yields text chunks from Bedrock streaming. Raises on error."""</span>
    client = boto3.client(<span class="s">"bedrock-runtime"</span>, region_name=region)
    body = json.dumps({
        <span class="s">"anthropic_version"</span>: <span class="s">"bedrock-2023-05-31"</span>,
        <span class="s">"max_tokens"</span>: max_tokens,
        <span class="s">"messages"</span>: [{<span class="s">"role"</span>: <span class="s">"user"</span>, <span class="s">"content"</span>: prompt}]
    })
    <span class="k">try</span>:
        resp = client.invoke_model_with_response_stream(
            modelId=model_id, body=body,
            contentType=<span class="s">"application/json"</span>, accept=<span class="s">"application/json"</span>
        )
        <span class="k">for</span> event <span class="k">in</span> resp[<span class="s">"body"</span>]:
            chunk = json.loads(event[<span class="s">"chunk"</span>][<span class="s">"bytes"</span>].decode())
            <span class="k">if</span> chunk[<span class="s">"type"</span>] == <span class="s">"content_block_delta"</span>:
                <span class="k">yield</span> chunk[<span class="s">"delta"</span>].get(<span class="s">"text"</span>, <span class="s">""</span>)
            <span class="k">elif</span> chunk[<span class="s">"type"</span>] == <span class="s">"message_delta"</span>:
                usage = chunk.get(<span class="s">"usage"</span>, {})
                logger.info(<span class="s">f"Tokens: in={usage.get('input_tokens',0)} out={usage.get('output_tokens',0)}"</span>)
    <span class="k">except</span> ClientError <span class="k">as</span> e:
        code = e.response[<span class="s">"Error"</span>][<span class="s">"Code"</span>]
        logger.error(<span class="s">f"Bedrock error {code}: {e}"</span>)
        <span class="k">raise</span>

<span class="c"># Usage</span>
<span class="k">for</span> chunk <span class="k">in</span> <span class="n">bedrock_stream</span>(<span class="s">"Explain Terraform count vs for_each"</span>):
    <span class="n">print</span>(chunk, end=<span class="s">""</span>, flush=<span class="k">True</span>)</pre>`,
   a:"Parse the event stream: content_block_delta events carry text chunks; message_delta carries final token usage. Yield chunks immediately for real-time output. Log token usage for cost tracking. Re-raise ClientErrors after logging — callers need to handle throttling.",
   top1:"They log token usage from the message_delta event (not estimated — actual usage) for cost tracking. They flush=True in print so streaming actually appears in real-time. They re-raise the ClientError so the caller can implement retry with backoff rather than silently failing.",
   pitfall:"Not parsing the event type — content_block_start and message_start events don't have text and will KeyError if you blindly access chunk['delta']['text'].",
   followups:["How would you add retry with backoff for ThrottlingException?","How do you accumulate the full response while still streaming?"]},
  {level:"platform",q:"Write a batch embedding function that embeds 1000 documents efficiently using Titan Embeddings.",
   code:`<pre><span class="k">import</span> boto3, json, time
<span class="k">from</span> typing <span class="k">import</span> List
<span class="k">from</span> botocore.exceptions <span class="k">import</span> ClientError

<span class="k">def</span> <span class="n">embed_documents</span>(
    texts: List[str],
    model_id: str = <span class="s">"amazon.titan-embed-text-v1"</span>,
    rps_limit: float = <span class="num">5.0</span>
) -> List[List[float]]:
    <span class="s">"""
    Embed texts with rate limiting. Returns list of embedding vectors.
    Titan has a max ~8192 tokens per call, no batch API — call per text.
    """</span>
    client = boto3.client(<span class="s">"bedrock-runtime"</span>)
    embeddings = []
    interval = <span class="num">1.0</span> / rps_limit

    <span class="k">for</span> i, text <span class="k">in</span> enumerate(texts):
        start = time.monotonic()
        <span class="k">try</span>:
            resp = client.invoke_model(
                modelId=model_id,
                body=json.dumps({<span class="s">"inputText"</span>: text[:<span class="num">8000</span>]}),  <span class="c"># truncate at token limit</span>
                contentType=<span class="s">"application/json"</span>, accept=<span class="s">"application/json"</span>
            )
            body = json.loads(resp[<span class="s">"body"</span>].read())
            embeddings.append(body[<span class="s">"embedding"</span>])
        <span class="k">except</span> ClientError <span class="k">as</span> e:
            <span class="k">if</span> e.response[<span class="s">"Error"</span>][<span class="s">"Code"</span>] == <span class="s">"ThrottlingException"</span>:
                time.sleep(<span class="num">2</span>)
                embeddings.append(<span class="k">None</span>)  <span class="c"># handle caller-side</span>
            <span class="k">else</span>:
                <span class="k">raise</span>
        elapsed = time.monotonic() - start
        <span class="k">if</span> elapsed < interval:
            time.sleep(interval - elapsed)

    <span class="k">return</span> embeddings</pre>`,
   a:"Titan has no batch API — call per document with rate limiting. Truncate input to stay within token limit. Rate-limit by measuring call elapsed time and sleeping the remainder of the interval. Return None for throttled items so the caller can retry them specifically.",

   pitfall:"Not truncating input — Titan returns a 400 error for oversized documents, which is hard to debug if you don't know the limit.",
   followups:["How would you make this async for higher throughput?","How would you handle None embeddings in the result list?"]}
 ],

{id:"file-data",name:"File & Data Processing",ix:9,group:"Foundations",
 concept:`<p>Platform engineers regularly process log files, CSVs, JSON dumps, and CloudTrail records. Python has excellent stdlib tools — know when to use each and how to handle large files without loading everything into memory.</p>
 <ul>
 <li><strong>json / csv</strong>: stdlib modules for common formats. For large files, iterate line by line.</li>
 <li><strong>pathlib.Path</strong>: modern, OO path handling — prefer over os.path.</li>
 <li><strong>collections</strong>: Counter (frequency), defaultdict (grouping), deque (sliding window).</li>
 <li><strong>Large files</strong>: generator-based line iteration — never read all into memory. For S3, stream with get_object()['Body'].iter_lines().</li>
 <li><strong>pandas</strong>: for tabular data — but know when NOT to use it (overkill for simple filtering, slow startup).</li>
 </ul>`,
 questions:[
  {level:"platform",q:"Parse a large CloudTrail JSON log file line by line, extract failed API calls, and write a CSV report.",
   code:`<pre><span class="k">import</span> json, csv
<span class="k">from</span> pathlib <span class="k">import</span> Path
<span class="k">from</span> collections <span class="k">import</span> Counter
<span class="k">from</span> typing <span class="k">import</span> Iterator, Dict

<span class="k">def</span> <span class="n">stream_cloudtrail_events</span>(path: Path) -> Iterator[Dict]:
    <span class="s">"""Yield one CloudTrail event at a time (large file friendly)."""</span>
    <span class="k">with</span> path.open() <span class="k">as</span> f:
        data = json.load(f)  <span class="c"># CloudTrail files are one JSON object</span>
        <span class="k">yield from</span> data.get(<span class="s">"Records"</span>, [])

<span class="k">def</span> <span class="n">failed_calls_report</span>(log_path: Path, output_path: Path):
    error_counter = Counter()
    failed_events = []

    <span class="k">for</span> event <span class="k">in</span> <span class="n">stream_cloudtrail_events</span>(log_path):
        <span class="k">if</span> <span class="s">"errorCode"</span> <span class="k">in</span> event:
            error_counter[event[<span class="s">"errorCode"</span>]] += <span class="num">1</span>
            failed_events.append({
                <span class="s">"time"</span>: event[<span class="s">"eventTime"</span>],
                <span class="s">"user"</span>: event.get(<span class="s">"userIdentity"</span>, {}).get(<span class="s">"arn"</span>, <span class="s">"unknown"</span>),
                <span class="s">"action"</span>: event[<span class="s">"eventName"</span>],
                <span class="s">"error"</span>: event[<span class="s">"errorCode"</span>],
                <span class="s">"message"</span>: event.get(<span class="s">"errorMessage"</span>, <span class="s">""</span>)[:200]
            })

    <span class="k">with</span> output_path.open(<span class="s">"w"</span>, newline=<span class="s">""</span>) <span class="k">as</span> csvf:
        <span class="k">if</span> failed_events:
            writer = csv.DictWriter(csvf, fieldnames=failed_events[<span class="num">0</span>].keys())
            writer.writeheader()
            writer.writerows(failed_events)

    <span class="n">print</span>(<span class="s">"Top errors:"</span>, error_counter.most_common(<span class="num">5</span>))
    <span class="k">return</span> len(failed_events), error_counter</pre>`,

<span class="k">def</span> <span class="n">extract_allowed_actions</span>(policies: List[dict]) -> Set[str]:
    <span class="s">"""

{id:"system-scripts",name:"System Design in Code",ix:10,group:"Platform Engineering",
 concept:`<p>Coding interviews for senior platform roles often give open-ended system scripts: 'write a script that does X across our AWS org.' These aren't algorithm puzzles — they're architecture-in-code. Structure, error handling, and operability matter as much as correctness.</p>
 <ul>
 <li><strong>argparse / click</strong>: CLI interfaces for scripts that need to be run by others.</li>
 <li><strong>logging over print</strong>: structured logging with levels — easy to silence in production or redirect to CloudWatch.</li>
 <li><strong>Exit codes</strong>: return sys.exit(1) on error — scripts called by CI/CD must signal failure correctly.</li>
 <li><strong>Idempotency</strong>: running the script twice should be safe. Check before creating/modifying.</li>
 <li><strong>Dry run flag</strong>: always offer --dry-run for destructive scripts.</li>
 </ul>`,
 questions:[
  {level:"system",q:"Write a CLI script that scans all accounts in an AWS Org for publicly accessible S3 buckets and outputs a JSON report.",
   code:`<pre><span class="k">#!/usr/bin/env python3</span>
<span class="k">import</span> argparse, boto3, json, logging, sys
<span class="k">from</span> botocore.exceptions <span class="k">import</span> ClientError
<span class="k">from</span> datetime <span class="k">import</span> datetime, timezone

logging.basicConfig(level=logging.INFO, format=<span class="s">"%(levelname)s %(message)s"</span>)
logger = logging.getLogger(__name__)

<span class="k">def</span> <span class="n">list_org_accounts</span>() -> list:
    client = boto3.client(<span class="s">"organizations"</span>)
    paginator = client.get_paginator(<span class="s">"list_accounts"</span>)
    <span class="k">return</span> [a <span class="k">for</span> page <span class="k">in</span> paginator.paginate()
            <span class="k">for</span> a <span class="k">in</span> page[<span class="s">"Accounts"</span>] <span class="k">if</span> a[<span class="s">"Status"</span>] == <span class="s">"ACTIVE"</span>]

<span class="k">def</span> <span class="n">is_bucket_public</span>(s3_client, bucket: str) -> bool:
    <span class="k">try</span>:
        pab = s3_client.get_public_access_block(Bucket=bucket)
        cfg = pab[<span class="s">"PublicAccessBlockConfiguration"</span>]
        <span class="k">return not</span> all(cfg.values())
    <span class="k">except</span> ClientError <span class="k">as</span> e:
        <span class="k">if</span> e.response[<span class="s">"Error"</span>][<span class="s">"Code"</span>] == <span class="s">"NoSuchPublicAccessBlockConfiguration"</span>:
            <span class="k">return</span> <span class="k">True</span>  <span class="c"># no block config = potentially public</span>
        <span class="k">raise</span>

<span class="k">def</span> <span class="n">scan_account</span>(account_id: str, role_name: str) -> list:
    sts = boto3.client(<span class="s">"sts"</span>)
    creds = sts.assume_role(
        RoleArn=<span class="s">f"arn:aws:iam::{account_id}:role/{role_name}"</span>,
        RoleSessionName=<span class="s">"s3-public-scan"</span>
    )[<span class="s">"Credentials"</span>]
    s3 = boto3.client(<span class="s">"s3"</span>,
        aws_access_key_id=creds[<span class="s">"AccessKeyId"</span>],
        aws_secret_access_key=creds[<span class="s">"SecretAccessKey"</span>],
        aws_session_token=creds[<span class="s">"SessionToken"</span>])
    findings = []
    <span class="k">for</span> bucket <span class="k">in</span> s3.list_buckets()[<span class="s">"Buckets"</span>]:
        name = bucket[<span class="s">"Name"</span>]
        <span class="k">try</span>:
            <span class="k">if</span> <span class="n">is_bucket_public</span>(s3, name):
                findings.append({<span class="s">"account"</span>: account_id, <span class="s">"bucket"</span>: name,
                    <span class="s">"scanned_at"</span>: datetime.now(timezone.utc).isoformat()})
        <span class="k">except</span> Exception <span class="k">as</span> e:
            logger.warning(<span class="s">f"Skipping {name}: {e}"</span>)
    <span class="k">return</span> findings

<span class="k">def</span> <span class="n">main</span>():
    p = argparse.ArgumentParser(description=<span class="s">"Scan org for public S3 buckets"</span>)
    p.add_argument(<span class="s">"--role"</span>, default=<span class="s">"SecurityAuditRole"</span>)
    p.add_argument(<span class="s">"--output"</span>, default=<span class="s">"public_buckets.json"</span>)
    args = p.parse_args()
    all_findings = []
    accounts = <span class="n">list_org_accounts</span>()
    logger.info(<span class="s">f"Scanning {len(accounts)} accounts"</span>)
    <span class="k">for</span> acct <span class="k">in</span> accounts:
        <span class="k">try</span>:
            all_findings.extend(<span class="n">scan_account</span>(acct[<span class="s">"Id"</span>], args.role))
        <span class="k">except</span> Exception <span class="k">as</span> e:
            logger.error(<span class="s">f"Account {acct['Id']} failed: {e}"</span>)
    <span class="k">with</span> open(args.output, <span class="s">"w"</span>) <span class="k">as</span> f:
        json.dump(all_findings, f, indent=<span class="num">2</span>)
    logger.info(<span class="s">f"Found {len(all_findings)} public buckets → {args.output}"</span>)
    sys.exit(<span class="num">1</span> <span class="k">if</span> all_findings <span class="k">else</span> <span class="num">0</span>)

<span class="k">if</span> __name__ == <span class="s">"__main__"</span>: <span class="n">main</span>()</pre>`,
   a:"Production script structure: argparse CLI, proper logging, per-account error isolation (one account failing doesn't stop others), timezone-aware timestamps, exit code 1 if findings found (so CI fails on public buckets). NoSuchPublicAccessBlockConfiguration treated as potentially public — correct security posture.",
