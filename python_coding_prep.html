 {q:"How to handle ThrottlingException in boto3?",a:"Catch ClientError, check e.response['Error']['Code'] == 'ThrottlingException', then sleep and retry with exponential backoff + jitter."},
 {q:"datetime.utcnow() vs datetime.now(timezone.utc)?",a:"utcnow() returns a naive datetime — AWS APIs reject it. now(timezone.utc) returns timezone-aware. Always use the latter."},
 {q:"What is moto used for?",a:"In-memory mock of AWS services for pytest — boto3 calls are intercepted without hitting real AWS. No credentials, no cost, no side effects."},
 {q:"@pytest.mark.parametrize — what does it do?",a:"Runs the same test function with multiple input sets. Each set is a separate test case with its own pass/fail in output."},
 {q:"Patch where it's used, not defined — why?",a:"unittest.mock.patch replaces the name in the module under test. If you patch the original definition, the module under test still holds its own reference."},
 {q:"heapq in Python — min or max heap?",a:"Min-heap. For max-heap, negate the values on insert and negate back on extract."},
 {q:"heapq.nlargest vs sorting for top-K?",a:"nlargest is O(n log k) — better than O(n log n) sort when k << n. For small n or k ≈ n, sort may be simpler."},
 {q:"3-color DFS — what are the three states?",a:"WHITE = unvisited, GRAY = in current DFS stack (back edge to GRAY = cycle), BLACK = fully explored."},
 {q:"Sliding window complexity?",a:"O(n) time, O(1) space — each element is visited at most twice (once when right advances, once when left advances past it)."},
 {q:"Generator vs list comprehension — when to choose generator?",a:"Generator when: result is consumed once, very large, or consumed partially (break early). List when: need random access, len(), or reuse."},
 {q:"yield from — what does it do?",a:"Delegates to a sub-generator, yielding all its values. Equivalent to 'for item in sub: yield item' but more efficient and propagates send/throw."},
 {q:"frozen=True in @dataclass — what does it add?",a:"Makes instances immutable (raises FrozenInstanceError on attribute set) and generates __hash__ so instances can be dict keys and set members."},
 {q:"ABC vs Protocol?",a:"ABC: explicit inheritance required (class Foo(MyABC)). Protocol: structural subtyping — any class with the right methods qualifies, no inheritance needed (duck typing with type checking)."},
 {q:"Why sys.exit(1) in a platform script?",a:"CI/CD systems check exit codes. Exit 0 = success. Exit 1 = failure. Without it, the pipeline can't tell if the script found problems."},
 {q:"Bedrock streaming — which event type has the text?",a:"content_block_delta events. message_delta has the final token usage. message_start and content_block_start have metadata only."},
 {q:"How do you make a Python class callable?",a:"Define __call__(self, ...) — then instances can be called like functions: obj()"},
 {q:"What is __slots__?",a:"Replaces the instance __dict__ with a fixed set of attributes — reduces memory by ~30-50% for classes with many instances."},
 {q:"Counter.most_common(n) complexity?",a:"O(n) for all elements, O(n log k) for top-k (uses heapq.nlargest internally)."},
 {q:"pathlib.Path vs os.path?",a:"Path is OO and chainable (Path('dir') / 'file.txt'). os.path is functional. Both work; Path is more readable for modern Python."},
 {q:"csv.writer — what is the newline='' for?",a:"Required on Windows — without it, the csv module adds an extra \\r\\n making blank lines between rows. Always open CSV files with newline=''."},
 {q:"What does __enter__ return in a context manager?",a:"The value bound to 'as' in the 'with' statement. Return self to expose the manager itself, or return a different resource object."},
 {q:"When does __exit__ suppress an exception?",a:"When it returns a truthy value. Returning False (or None) lets the exception propagate. Most context managers should return False."},
 {q:"concurrent.futures ThreadPoolExecutor vs ProcessPoolExecutor?",a:"ThreadPoolExecutor: I/O bound, shared memory, GIL limits CPU parallelism. ProcessPoolExecutor: CPU bound, separate processes/memory, bypasses GIL."},
 {q:"How do you run a blocking function inside async?",a:"loop.run_in_executor(None, blocking_func, *args) — runs it in a thread pool without blocking the event loop."},
 {q:"What is asyncio.Lock used for?",a:"Mutual exclusion inside async code — ensures only one coroutine executes a critical section at a time. Use asyncio.Lock (not threading.Lock) in async context."},
 {q:"Big-O of dict lookup, insert, delete in Python?",a:"Average O(1) for all three. Worst case O(n) due to hash collisions (rare in practice)."},
 {q:"Two-sum with hash map — complexity?",a:"O(n) time, O(n) space. Iterate once, for each element check if (target - element) is in the hash map."},
 {q:"BFS vs DFS — when to prefer BFS?",a:"BFS for shortest path (unweighted graphs) and level-by-level traversal. DFS for cycle detection, topological sort, and deep-first exploration."},
 {q:"Topological sort — what does it produce?",a:"A linear ordering of nodes in a DAG where each node comes before its dependents. Kahn's algorithm (BFS-based) detects cycles by checking if all nodes were visited."},
 {q:"What is Bedrock's Converse API?",a:"A unified multi-turn chat API that handles message formatting consistently across all Bedrock models — preferred over model-specific invoke payloads."},
 {q:"How do you make a generator resumable after failure?",a:"Checkpoint state (last processed index/key) to storage (file, DynamoDB) at intervals. On restart, skip already-processed items by loading the checkpoint."}
];

// ─── APP STATE ────────────────────────────────────────────────────────────────
let currentMode = 'study';
let currentTopic = null;
let activeFilter = 'all';
let flashIdx = 0;
let flashFlipped = false;
let mockPool = [];
let mockIdx = 0;
let progress = {};

async function loadProgress(){
  try{
    if(window.storage){ const r = await window.storage.get('py_prep_progress'); if(r&&r.value) progress=JSON.parse(r.value); }
    else{ const ls=localStorage.getItem('py_prep_progress'); if(ls) progress=JSON.parse(ls); }
  }catch(e){ progress={}; }
}
async function saveProgress(){
  try{
    const data=JSON.stringify(progress);
    if(window.storage) await window.storage.set('py_prep_progress',data);
    else localStorage.setItem('py_prep_progress',data);
  }catch(e){}
}
function markSeen(id){ if(!progress[id])progress[id]={good:0,mid:0,bad:0,seen:0}; progress[id].seen++; updateProgressBar(); saveProgress(); }
function rateQ(id,rating){ if(!progress[id])progress[id]={good:0,mid:0,bad:0,seen:0}; progress[id][rating]++; saveProgress(); }
function updateProgressBar(){
  const seen=TOPICS.filter(t=>progress[t.id]&&progress[t.id].seen>0).length;
  const pct=Math.round((seen/TOPICS.length)*100);
  document.getElementById('progfill').style.width=pct+'%';
  document.getElementById('progcount').textContent=seen+'/'+TOPICS.length+' done';
  document.getElementById('progpct').textContent=pct+'%';
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function buildNav(){
  const groups={};
  TOPICS.forEach(t=>{ if(!groups[t.group])groups[t.group]=[]; groups[t.group].push(t); });
  const nav=document.getElementById('nav'); nav.innerHTML='';
  Object.entries(groups).forEach(([g,ts])=>{
    const grpEl=document.createElement('div'); grpEl.className='navgrp';
    grpEl.innerHTML='<span class="navgrplbl">'+g+'</span>';
    ts.forEach(t=>{
      const li=document.createElement('div'); li.className='navitem'; li.dataset.id=t.id;
      li.textContent=t.ix+'. '+t.name;
      li.onclick=()=>showTopic(t.id); grpEl.appendChild(li);
    });
    nav.appendChild(grpEl);
  });
  const specEl=document.createElement('div'); specEl.className='navgrp';
  specEl.innerHTML='<span class="navgrplbl">Practice Modes</span>';
  [{id:'mock-mode',label:'🎤 Mock Interview'},{id:'flash-mode',label:'⚡ Flash Cards'}].forEach(e=>{
    const li=document.createElement('div'); li.className='navitem'; li.dataset.id=e.id;
    li.textContent=e.label; li.onclick=()=>{ if(e.id==='mock-mode') setMode('mock'); else setMode('flash'); };
    specEl.appendChild(li);
  });
  nav.appendChild(specEl);
}

function setActiveNav(id){ document.querySelectorAll('.navitem').forEach(el=>el.classList.toggle('active',el.dataset.id===id)); }

document.getElementById('navsearch').addEventListener('input',function(){
  const q=this.value.toLowerCase();
  document.querySelectorAll('.navitem').forEach(el=>el.style.display=(!q||el.textContent.toLowerCase().includes(q))?'':'none');
  document.querySelectorAll('.navgrplbl').forEach(lbl=>{
    const grp=lbl.parentElement;
    const visible=[...grp.querySelectorAll('.navitem')].some(el=>el.style.display!=='none');
    grp.style.display=visible?'':'none';
  });
});

// ─── TOPIC RENDER ─────────────────────────────────────────────────────────────
function lvlLabel(l){ return({easy:'Easy',medium:'Medium',hard:'Hard',platform:'Platform',system:'System Design'})[l]||l; }

function showTopic(id){
  currentMode='study'; currentTopic=id; setActiveNav(id);
  const t=TOPICS.find(x=>x.id===id); if(!t)return;
  markSeen(id);
  document.getElementById('crumb').textContent=t.name;
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mode-study').classList.add('active');
  activeFilter='all';

  const levels=[...new Set(t.questions.map(q=>q.level))];
  const filterHTML='<div class="qfilter"><button class="qchip active" onclick="filterQs(this,\'all\')">All</button>'+
    levels.map(l=>'<button class="qchip" onclick="filterQs(this,\''+l+'\')">'+lvlLabel(l)+'</button>').join('')+'</div>';

  const qHTML=t.questions.map((q,i)=>`
    <div class="q qlvl-${q.level}" data-lvl="${q.level}">
      <div class="qhead" onclick="toggleQ(this)">
        <span class="lvl ${q.level}">${lvlLabel(q.level)}</span>
        <span class="qtext">${q.q}</span>
        <span class="qtoggle">▸</span>
      </div>
      <div class="qbody">
        <div class="reveal-prompt">
          <p style="color:var(--muted);font-size:13px;margin:0 0 12px">Think through your answer, then reveal.</p>
          <button class="reveal-btn" onclick="revealAnswer(this)">🔍 Reveal Answer & Code</button>
        </div>
        <div class="answer-section" style="display:none">
          ${q.code||''}
          <div class="ans-block"><span class="albl">Explanation</span><p style="color:var(--muted);font-size:14px">${q.a}</p></div>
          <div class="top1"><strong>🏆 Top 1% signal:</strong> ${q.top1}</div>
          ${q.pitfall?'<div class="pitfalls"><strong>⚠️ Common Pitfall:</strong> '+q.pitfall+'</div>':''}
          ${q.followups&&q.followups.length?'<div class="followups"><strong>🔍 Follow-ups:</strong><ul>'+q.followups.map(f=>'<li>'+f+'</li>').join('')+'</ul></div>':''}
          <div class="selfrate">
            <span>Rate yourself:</span>
            <button class="rate sel-good" onclick="rateQ('${id}','good')">✅ Got it</button>
            <button class="rate sel-mid" onclick="rateQ('${id}','mid')">😐 Partial</button>
            <button class="rate sel-bad" onclick="rateQ('${id}','bad')">❌ Missed</button>
          </div>
        </div>
      </div>
    </div>`).join('');

  const ctHTML=t.complexity&&t.complexity.length?`
    <div class="card" style="margin-top:20px">
      <h3>⏱ Complexity Reference</h3>
      <table class="ctable"><thead><tr><th>Operation</th><th>Average</th><th>Worst</th></tr></thead><tbody>
      ${t.complexity.map(c=>`<tr><td>${c.op}</td><td class="good">${c.avg}</td><td class="${c.worst.includes('n²')||c.worst.includes('n log n')?'mid':'good'}">${c.worst}</td></tr>`).join('')}
      </tbody></table></div>`:'' ;

  const miniHTML=`<div class="grid2">
    <div class="minicard mistakes"><h4>⚠️ Common Mistakes</h4><ul>${t.mistakes.map(m=>'<li>'+m+'</li>').join('')}</ul></div>
    <div class="minicard best"><h4>✅ Key Patterns</h4><ul>${t.patterns.map(p=>'<li>'+p+'</li>').join('')}</ul></div>
  </div>`;

  document.getElementById('view').innerHTML='<div class="card concept"><h2>'+t.name+'</h2>'+t.concept+'</div>'+filterHTML+qHTML+ctHTML+miniHTML;
}

function toggleQ(el){
  const card=el.closest('.q'); const icon=el.querySelector('.qtoggle');
  const open=card.classList.toggle('open'); icon.textContent=open?'▾':'▸';
}
function revealAnswer(btn){
  const wrap=btn.closest('.qbody');
  wrap.querySelector('.reveal-prompt').style.display='none';
  wrap.querySelector('.answer-section').style.display='block';
}
function filterQs(btn,lvl){
  document.querySelectorAll('.qchip').forEach(c=>c.classList.remove('active')); btn.classList.add('active');
  document.querySelectorAll('.q').forEach(q=>q.style.display=(lvl==='all'||q.dataset.lvl===lvl)?'':'none');
}

// ─── FLASH ───────────────────────────────────────────────────────────────────
function renderFlash(){
  const c=FLASH[flashIdx%FLASH.length];
  return`<div class="flash">
    <div class="fcard ${flashFlipped?'flipped':''}" onclick="flipFlash()">
      <div class="ffront"><p>${c.q}</p><small>Click to flip</small></div>
      <div class="fback"><p>${c.a}</p></div>
    </div>
    <div class="fctrl">
      <button class="bigbtn" onclick="navFlash(-1)">← Prev</button>
      <span>${(flashIdx%FLASH.length)+1} / ${FLASH.length}</span>
      <button class="bigbtn" onclick="navFlash(1)">Next →</button>
    </div>
    <div class="fctrl" style="margin-top:10px"><button class="bigbtn" onclick="shuffleFlash()">🔀 Shuffle</button></div>
  </div>`;
}
function flipFlash(){ flashFlipped=!flashFlipped; document.getElementById('view').innerHTML=renderFlash(); }
function navFlash(d){ flashIdx=(flashIdx+d+FLASH.length)%FLASH.length; flashFlipped=false; document.getElementById('view').innerHTML=renderFlash(); }
function shuffleFlash(){ FLASH.sort(()=>Math.random()-0.5); flashIdx=0; flashFlipped=false; document.getElementById('view').innerHTML=renderFlash(); }

// ─── MOCK ────────────────────────────────────────────────────────────────────
function renderMock(){
  if(mockIdx>=mockPool.length) return`<div class="mock-card"><h2>✅ Done! ${mockPool.length} questions complete.</h2><p style="margin:14px 0;color:var(--muted)">Review missed questions by going back to individual topics.</p><button class="bigbtn" onclick="setMode('mock')">Restart</button></div>`;
  const q=mockPool[mockIdx];
  return`<div class="mock-card">
    <div class="mock-meta">Question ${mockIdx+1} of ${mockPool.length} · ${q.topic}</div>
    <span class="lvl ${q.level}" style="margin:10px 0;display:inline-block">${lvlLabel(q.level)}</span>
    <div class="mock-q">${q.q}</div>
    <div id="mock-answer" style="display:none">
      ${q.code||''}
      <div class="ans-block"><span class="albl">Explanation</span><p style="color:var(--muted);font-size:14px">${q.a}</p></div>
      <div class="top1"><strong>🏆 Top 1%:</strong> ${q.top1}</div>
      ${q.pitfall?'<div class="pitfalls"><strong>⚠️ Pitfall:</strong> '+q.pitfall+'</div>':''}
      <div class="selfrate">
        <span>Rate:</span>
        <button class="rate sel-good" onclick="mockRate()">✅ Got it</button>
        <button class="rate sel-mid" onclick="mockRate()">😐 Partial</button>
        <button class="rate sel-bad" onclick="mockRate()">❌ Missed</button>
      </div>
    </div>
    <div id="mock-reveal"><button class="reveal-btn" style="margin-top:18px" onclick="revealMock()">🔍 Reveal Answer</button></div>
  </div>`;
}
function revealMock(){ document.getElementById('mock-answer').style.display='block'; document.getElementById('mock-reveal').style.display='none'; }
function mockRate(){ mockIdx++; document.getElementById('view').innerHTML=renderMock(); }

// ─── MODE ────────────────────────────────────────────────────────────────────
function setMode(mode){
  currentMode=mode;
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mode-'+mode).classList.add('active');
  document.getElementById('crumb').textContent=mode==='study'?'Select a topic':mode==='mock'?'Mock Interview':'Flash Cards';
  if(mode==='study'){ showTopic(TOPICS[0].id); }
  if(mode==='mock'){
    setActiveNav('mock-mode');
    mockPool=TOPICS.flatMap(t=>t.questions.map(q=>({topic:t.name,...q}))).sort(()=>Math.random()-0.5).slice(0,50);
    mockIdx=0; document.getElementById('view').innerHTML=renderMock();
  }
  if(mode==='flash'){ setActiveNav('flash-mode'); flashIdx=0; flashFlipped=false; document.getElementById('view').innerHTML=renderFlash(); }
}

// ─── INIT ────────────────────────────────────────────────────────────────────
(async function init(){
  await loadProgress(); buildNav(); updateProgressBar(); showTopic(TOPICS[0].id);
})();
</script>
</body>
</html>
